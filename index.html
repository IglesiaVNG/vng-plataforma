.login-card{background:transparent;border:none;border-radius:0;padding:2rem;width:100%;max-width:340px;box-shadow:none;text-align:center;position:relative;z-index:1}
.login-logo{font-size:52px;margin-bottom:12px}
.login-title{font-size:22px;font-weight:700;color:#1F4E79;margin-bottom:4px}
.login-input{background:rgba(255,255,255,0.92)!important;border:none!important;border-radius:10px!important;padding:11px 14px!important;font-size:14px!important;color:#1F2937!important;box-shadow:0 2px 8px rgba(0,0,0,0.2)!important}
.login-sub{color:#fff;font-size:13px;margin-bottom:16px;text-shadow:0 1px 4px rgba(0,0,0,0.6);font-weight:600;letter-spacing:0.05em}
.login-err{font-size:12px;color:#DC2626;min-height:16px;margin-bottom:8px}

/* ── HOME ── */
.home-wrap{max-width:700px;margin:0 auto;padding:1.5rem 1rem}
.home-topbar{display:flex;align-items:center;gap:10px;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid #E5E7EB}
.home-avatar{width:40px;height:40px;border-radius:50%;background:#1F4E79;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.home-greeting{flex:1}
.home-greeting-name{font-weight:600;font-size:15px}
.home-greeting-role{font-size:12px;color:#6B7280;margin-top:2px}
.home-section-title{font-size:13px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:1rem}
.modules-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem;margin-bottom:2rem}
.module-card{background:rgba(255,255,255,0.93);border:1px solid rgba(255,255,255,0.7);border-radius:14px;padding:1.5rem;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.module-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1);border-color:#2E75B6}
.module-icon{font-size:36px;margin-bottom:12px}
.module-name{font-size:16px;font-weight:700;color:#1F4E79;margin-bottom:6px}
.module-desc{font-size:13px;color:#6B7280;line-height:1.5}
.module-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600;margin-top:10px}
.tag-blue{background:#DBEAFE;color:#1E40AF}
.tag-purple{background:#EDE9FE;color:#5B21B6}
.tag-green{background:#D1FAE5;color:#065F46}
.coming-soon{opacity:.5;cursor:default}
.coming-soon:hover{transform:none;box-shadow:0 1px 4px rgba(0,0,0,.05);border-color:#E5E7EB}

/* ── APP SHELL ── */
.app-shell{display:none;flex-direction:column;min-height:100vh}
.app-shell.show{display:flex}
.app-topbar{background:rgba(31,78,121,0.95);color:#fff;padding:10px 1rem;display:flex;align-items:center;gap:10px;flex-shrink:0;backdrop-filter:blur(4px)}
.app-topbar-back{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-family:Arial,sans-serif}
.app-topbar-back:hover{background:rgba(255,255,255,.25)}
.app-topbar-title{flex:1;font-size:15px;font-weight:600}
.app-topbar-user{font-size:12px;opacity:.8}
.app-content{flex:1;overflow-y:auto}

/* ── SHARED COMPONENTS ── */
.btn{font-family:Arial,sans-serif;font-size:13px;padding:8px 16px;border-radius:8px;border:1px solid #D1D5DB;background:#fff;cursor:pointer;color:#374151;font-weight:500}
.btn:hover{background:#F9FAFB}
.btn-primary{background:#1F4E79;color:#fff;border-color:#1F4E79}
.btn-primary:hover{background:#163a5c}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{color:#DC2626;border-color:#FCA5A5}
.btn-success{background:#16A34A;color:#fff;border-color:#16A34A}
input,select,textarea{font-family:Arial,sans-serif;font-size:13px;border:1px solid rgba(255,255,255,0.6);border-radius:8px;padding:7px 10px;background:rgba(255,255,255,0.92);color:#1F2937;width:100%;box-shadow:0 1px 4px rgba(0,0,0,0.15)}
input:focus,select:focus,textarea:focus{outline:none;border-color:#2E75B6}

/* ══ GRUPOS DE VIDA STYLES ══ */
.gdv-app{max-width:720px;margin:0 auto;padding:1rem}
.card{background:rgba(255,255,255,0.93);border:1px solid rgba(255,255,255,0.7);border-radius:12px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.card-title{font-size:15px;font-weight:600;color:#1F4E79;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1rem}
.stat{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:14px;text-align:center}
.stat-val{font-size:26px;font-weight:700;display:block;color:#1F4E79}
.stat-lbl{font-size:12px;color:#6B7280;margin-top:3px}
.nav{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap;border-bottom:1px solid #E5E7EB;padding-bottom:1rem}
.nav-btn{padding:7px 12px;border-radius:8px;border:1px solid #D1D5DB;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#6B7280;font-family:Arial,sans-serif}
.nav-btn.active{background:#1F4E79;color:#fff;border-color:#1F4E79}
.member-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;margin-bottom:6px;border:1px solid #E5E7EB;background:#FAFAFA}
.member-name{flex:1;font-size:14px}
.toggle-btn{padding:6px 14px;border-radius:8px;border:1px solid;cursor:pointer;font-size:12px;font-weight:600;min-width:84px;text-align:center;font-family:Arial,sans-serif}
.presente{background:#D1FAE5;color:#065F46;border-color:#6EE7B7}
.ausente{background:#FEE2E2;color:#991B1B;border-color:#FCA5A5}
.badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:999px;font-weight:600}
.b-ok{background:#D1FAE5;color:#065F46}
.b-warn{background:#FEF3C7;color:#92400E}
.b-info{background:#DBEAFE;color:#1E40AF}
.b-muted{background:#F3F4F6;color:#6B7280}
.b-danger{background:#FEE2E2;color:#991B1B}
.row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:6px;border:1px solid #E5E7EB;font-size:13px;background:#FAFAFA}
.pbar-bg{background:#E5E7EB;border-radius:999px;height:8px;flex:1;overflow:hidden}
.pbar-fill{height:8px;border-radius:999px;background:#1F4E79}

.section-tab{display:none}.section-tab.on{display:block}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.alert-ok{background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7}
.alert-err{background:#FEE2E2;color:#991B1B;border:1px solid #FCA5A5}
.divider{border:none;border-top:1px solid #E5E7EB;margin:1rem 0}

<script>

// ── Funciones de formato de fecha — expuestas globalmente ──
window.fmtFnac = function(el){
  var pos=el.selectionStart;
  var raw=el.value.replace(/\D/g,'').slice(0,6);
  var out='';
  for(var i=0;i<raw.length;i++){
    if(i===2||i===4) out+='/';
    out+=raw[i];
  }
  el.value=out;
  try{ el.setSelectionRange(out.length,out.length); }catch(e){}
};
window.fmtFnacM = function(el){ window.fmtFnac(el); };
window.fmtFechaIngreso = function(el){ window.fmtFnac(el); };
window.pnvFmtFnac = function(el){ window.fmtFnac(el); };
window.validarFnac = function(val){
  if(!val) return true;
  var p=val.split('/');
  if(p.length!==3) return false;
  var d=parseInt(p[0]),m=parseInt(p[1]),a=parseInt(p[2]);
  if(isNaN(d)||isNaN(m)||isNaN(a)) return false;
  if(d<1||d>31||m<1||m>12||a<0||a>99) return false;
  if(p[0].length!==2||p[1].length!==2||p[2].length!==2) return false;
  return true;
};
window.markFieldError = function(el, msg){
  if(!el) return;
  el.style.border='2px solid #DC2626';
  el.style.background='#FEF2F2';
  el.title=msg||'Campo inválido';
  el.focus();
  setTimeout(function(){ el.style.border=''; el.style.background=''; el.title=''; }, 4000);
};

// ── Instant session restore (runs before any other script) ──
(function(){
  try{
    var cu=localStorage.getItem('vng_cu');
    if(cu){
      var u=JSON.parse(cu);
      if(u&&u.id){
        // Mark session as valid — boot() will use this
        window._savedSession=u;
      }
    }
  }catch(e){}
})();
// Error handler removed
</script>

    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">

        <input type="text" id="rm-nombre" placeholder="Ej: Ujier">

        <label style="font-size:13px;color:#4B5563;display:block;margin-bottom:4px">Color</label>

          <option value="#7C3AED">Violeta</option>
          <option value="#059669">Verde</option>
          <option value="#D97706">Naranja</option>
          <option value="#DC2626">Rojo</option>
          <option value="#BE185D">Rosa</option>
          <option value="#0891B2">Cian</option>
          <option value="#4F46E5">Índigo</option>
          <option value="#9333EA">Púrpura</option>
        </select>
      </div>
    </div>
    <label style="font-size:13px;color:#4B5563;display:block;margin:10px 0 4px">Descripción (opcional)</label>

  </div>
</div>

<script type="module">
// ── FIREBASE INTEGRATION ──────────────────────────────────
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

// Detect environment: PROD only if exact production URL, everything else = DEV
const _PROD_HOSTS = ['vng-plataforma.vercel.app', 'iglesiavng.vercel.app'];
const _isProd = _PROD_HOSTS.includes(window.location.hostname);
const VNG_COL = _isProd ? 'vng' : 'vng_dev';

const firebaseConfig = {
  apiKey: "AIzaSyCuyEMfRh_It13tBv71itzXW_OT1kliGMY",
  authDomain: "vng-plataforma.firebaseapp.com",
  projectId: "vng-plataforma",
  storageBucket: "vng-plataforma.firebasestorage.app",
  messagingSenderId: "146170505190",
  appId: "1:146170505190:web:0e3f37573da35cab7ad827"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);

// Autenticación anónima — requerida por reglas de seguridad Firestore
try {
  await signInAnonymously(auth);
  console.log('Firebase: auth anónima OK');
} catch(authErr) {
  console.error('Firebase: error auth', authErr);
  window.showToast && window.showToast('⚠️ Sin conexión Firebase — datos no se sincronizarán', '#DC2626');
}

// ── Keys grouped by document (max ~900KB each) ──
const KEY_GROUPS = {
  'config':  ['gdv_u5','gdv_g5','gdv_roles5','gdv_qr_actualizar'], // gdv_permisos se maneja via fbSavePermisos con su propio timestamp
  'members': ['gdv_m5'],
  'records': ['gdv_r5'],
  'disc':    ['gdv_disc_pasos','gdv_disc_records'],
  'ng':      ['gdv_ng5','gdv_ng_records'],
  'modules': ['gdv_modules5'],
  'of':      ['of5_alumnos','of5_pagos','of5_encuentros','of5_asist',
               'of5_part','of5_obspart','of5_obspago','of5_materias'],
};

// ── Upload: one Firestore doc per group ──
// Safety check: only upload if we have real member data (not empty/default)
function fbHasRealData() {
  const members = localStorage.getItem('gdv_m5');
  if(!members) return false;
  try {
    const arr = JSON.parse(members);
    return Array.isArray(arr) && arr.length > 5; // more than 5 members = real data
  } catch(e) { return false; }
}

window.fbUpload = async function(force) {
  if(!force && !fbHasRealData()) {
    console.log('Firebase: upload skipped — no real data in localStorage');
    return;
  }
  try {
    const uploadTs=Date.now();
    localStorage.setItem('_vng_last_upload', String(uploadTs));
    const promises = Object.entries(KEY_GROUPS).map(async ([docName, keys]) => {
      const data = { _ts: uploadTs };
      // Update local timestamps so download won't overwrite what we just uploaded
      keys.forEach(function(k){ localStorage.setItem('_local_ts_'+k, String(uploadTs)); });
      keys.forEach(k => {
        const v = localStorage.getItem(k);
        if(v) data[k] = v;
      });
      await setDoc(doc(db, VNG_COL, docName), data, {merge:true});
    });
    await Promise.all(promises);
    window.showToast && window.showToast('☁️ Datos guardados en la nube', '#16A34A');
    if(typeof window.markSynced==='function') window.markSynced();
    console.log('Firebase: upload OK');
  } catch(e) {
    console.error('Firebase upload error:', e);
    window.showToast && window.showToast('⚠️ Error Firebase: ' + e.message, '#DC2626');
  }
};

// ── Download: read all docs and merge to localStorage ──
// Merge genérico por id+_ts: gana el registro más reciente de cada id
// Funciona para members, records, discRecords, ngRecords, etc.
function mergeByTs(localStr, cloudStr){
  try{
    const local=JSON.parse(localStr||'[]');
    const cloud=JSON.parse(cloudStr||'[]');
    const localMap={};
    local.forEach(function(m){ localMap[m.id]=m; });
    const cloudMap={};
    cloud.forEach(function(m){ cloudMap[m.id]=m; });
    const allIds=new Set([
      ...local.map(function(m){return m.id;}),
      ...cloud.map(function(m){return m.id;})
    ]);
    const merged=[];
    allIds.forEach(function(id){
      const l=localMap[id];
      const c=cloudMap[id];
      if(!l){ merged.push(c); return; }
      if(!c){ merged.push(l); return; }
      // Ambos existen: gana el más reciente por _ts
      const lTs=parseInt(l._ts||l.ts&&new Date(l.ts).getTime()||'0');
      const cTs=parseInt(c._ts||c.ts&&new Date(c.ts).getTime()||'0');
      merged.push(lTs>cTs ? l : c);
    });
    return JSON.stringify(merged);
  }catch(e){ return cloudStr; }
}

async function cleanMembers(){
  // Remove any null/undefined entries from S.members
  if(!S.members) return;
  S.members=S.members.filter(m=>m&&m.id);
  // Merge legacy m.barrio (from QR update form) into m.dir (Barrio/Ciudad field)
  let changed=false;
  S.members.forEach(m=>{
    if(m.barrio && !m.dir){ m.dir=m.barrio; changed=true; }
    if(m.barrio){ delete m.barrio; changed=true; }
  });
  // Migration: fix truly blank/undefined condicion (but NEVER change valid conditions)
  const VALID_CONDICIONES=['Miembro','Asistente Bautizado','Asistente NO Bautizado','Nuevo','Historico'];
  S.members.forEach(m=>{
    if(!m.condicion || !VALID_CONDICIONES.includes(m.condicion)){
      m.condicion='Miembro'; // only fix blank/invalid, never override valid ones
      changed=true;
    }
  });
  // Ensure every 'Nuevo' contact has a fechaRegistro (set today if missing)
  S.members.forEach(m=>{
    if(m.condicion==='Nuevo' && !m.fechaRegistro){
      m.fechaRegistro=todayAA();
      changed=true;
    }
  });
  if(changed) await saveK(SK.members, S.members);

  // Fix discRecords: if an attendance entry has a member ID that no longer exists
  // but matches a current member by name, update the ID to the current one.
  let discChanged=false;
  (S.discRecords||[]).forEach(r=>{
    const newAtt={};
    let recChanged=false;
    Object.entries(r.asistencia||{}).forEach(([oldId,att])=>{
      const stillExists=S.members.some(m=>String(m.id)===String(oldId));
      if(!stillExists && att.name){
        // Find current member with matching name (normalize accents)
        const match=S.members.find(m=>normName(fullName(m))===normName(att.name));
        if(match){
          newAtt[match.id]=att;
          recChanged=true;
          console.log('discRecords fix: '+att.name+' ID '+oldId+' → '+match.id);
        } else {
          newAtt[oldId]=att; // keep as-is
        }
      } else {
        newAtt[oldId]=att;
      }
    });
    if(recChanged){
      r.asistencia=newAtt;
      discChanged=true;
    }
  });
  if(discChanged) await saveK(SK.discRecords, S.discRecords);

  // Same fix for discPasos.miembros arrays

  (S.discPasos||[]).forEach(paso=>{

      if(S.members.some(m=>m.id===oldId)) return oldId;
      return oldId; // keep, can't resolve without name
    });
    paso.miembros=fixedMiembros;
  });
}

// ── Week helpers ──────────────────────────────────────────
function getWeekDates(offsetWeeks=0){
  // Week: Sunday → Saturday
  const d=new Date();
  d.setDate(d.getDate() - d.getDay() + (offsetWeeks*7)); // Sunday
  const start=new Date(d);
  const end=new Date(d); end.setDate(end.getDate()+6);
  return {start,end};
}
function dateToStr(d){return d.toISOString().split('T')[0];}
function getWeekLabel(offsetWeeks=0){
  const {start,end}=getWeekDates(offsetWeeks);
  const fmtD=d=>`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
  return `${fmtD(start)} al ${fmtD(end)}/${String(end.getFullYear()).slice(2)}`;
}
function getISOWeek(d){
  const dt=new Date(d);
  dt.setHours(0,0,0,0);
  dt.setDate(dt.getDate()+3-(dt.getDay()+6)%7);
  const week1=new Date(dt.getFullYear(),0,4);
  return 1+Math.round(((dt-week1)/86400000-3+(week1.getDay()+6)%7)/7);
}
function recordInWeek(fechaStr, offsetWeeks=0){
  const {start,end}=getWeekDates(offsetWeeks);
  const d=new Date(fechaStr);
  return d>=start && d<=end;
}

async function initStorage(){
  // NUNCA borrar gdv_permisos al iniciar — el Super Admin configura permisos que deben persistir
  S.users      =load(SK.users,      DEFAULT_USERS);
  S.groups     =load(SK.groups,     DEFAULT_GROUPS);
  S.records    =load(SK.records,    []);
  S.members    =load(SK.members,    DEFAULT_MEMBERS);
  S.roles      =load(SK.roles,      DEFAULT_ROLES);
  S.discPasos  =load(SK.discPasos,  DEFAULT_DISC_PASOS);
  S.discRecords=load(SK.discRecords,[]);
  await cleanMembers();
  loadPermisos();
  // ── Migrar roles nuevos si no existen ──
  var missingRoles=[
    {id:'contactar',name:'Contactar',color:'#D97706',desc:'Agrega nuevos contactos y se autoasigna seguimiento'}
  ];
  // Also ensure contactar permissions are initialized if missing
  // Run permissions migration for any new keys
  await migratePermisos();
  var migrated=false;
  missingRoles.forEach(function(nr){
    if(!S.roles.find(function(r){return r.id===nr.id;})){
      S.roles.push(nr); migrated=true;
    }
  });
  if(migrated) await saveK(SK.roles,S.roles);
  try{if(typeof window.syncNow==="function")window.syncNow();}catch(_e){}
}

function today(){return new Date().toISOString().split('T')[0];}
function fmt(d){return fmtAA(d);}
function todayAA(){var d=new Date();return fmtAA(d.toISOString().slice(0,10));}
function initials(n){return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function pct(a,b){return b?Math.round(a/b*100):0;}
function fullName(m){return `${m.nombre} ${m.apellido}`.trim();}
function listName(m){return [m.apellido,m.nombre].filter(Boolean).join(' ');}
function groupMembers(gid){
  return S.members.filter(m=>m.estado==='Activo' && (Number(m.grupoId)===Number(gid) || (m.grupoIds||[]).map(Number).includes(Number(gid))));
}
function roleChips(roles){
  if(!roles||!roles.length) return '';
  return roles.map(rid=>{
    const r=S.roles.find(x=>x.id===rid);
    return r?`<span class="role-chip" style="background:${r.color};color:#fff">${r.name}</span>`:'';
  }).join('');
}

function ngTab(tab,btn){
  document.querySelectorAll('.nav-btn[onclick*="ngTab"]').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  else {
    document.querySelectorAll('.nav-btn[onclick*="ngTab"]').forEach(function(b){
      if(b.textContent.toLowerCase().includes(tab.slice(0,4))) b.classList.add('active');
    });
  }
  var c=document.getElementById('ng-tab-content');
  if(!c) return;
  if(tab==='dashboard') ngRenderDashboard(c);
  else if(tab==='cargar') ngRenderCargar(c);
  else if(tab==='registros') ngRenderRegistros(c);
}

function ngIsLiderOColab(){
  if(!currentUser) return false;
  var linked=S.members.find(function(m){return fullName(m).toLowerCase()===currentUser.name.toLowerCase();});
  if(!linked) return false;
  return (S.ngComunidades||[]).some(function(ng){
    return (ng.liderIds||[]).includes(linked.id)||(ng.colaboradorIds||[]).includes(linked.id);
  });
}

function ngGetMisComunidades(){
  if(isSuperAdmin()) return S.ngComunidades||[];
  var linked=S.members.find(function(m){return fullName(m).toLowerCase()===currentUser.name.toLowerCase();});
  if(!linked) return [];
  return (S.ngComunidades||[]).filter(function(ng){
    return (ng.liderIds||[]).some(function(id){return Number(id)===Number(linked.id);})||
           (ng.colaboradorIds||[]).some(function(id){return Number(id)===Number(linked.id);});
  });
}

function ngGetMembersOfComunidad(cid){
  return (S.members||[]).filter(function(m){
    return m.estado!=='Baja'&&(Number(m.grupoId)===Number(cid)||(m.grupoIds||[]).map(Number).includes(Number(cid)));
  });
}

function ngGetFilteredRecords(){
  var recs=S.ngRecords||[];
  if(ngFilDesde) recs=recs.filter(function(r){return r.fecha>=ngFilDesde;});
  if(ngFilHasta) recs=recs.filter(function(r){return r.fecha<=ngFilHasta;});
  if(ngFilComunidad) recs=recs.filter(function(r){return Number(r.comunidadId)===Number(ngFilComunidad);});
  // 'lideres' is handled separately in stats — don't filter records by it here
  if(ngFilSexo&&ngFilSexo!=='lideres') recs=recs.filter(function(r){
    return Object.entries(r.asistencia||{}).some(function(e){
      var m=S.members.find(function(x){return Number(x.id)===Number(e[0]);});
      return m&&m.genero===ngFilSexo&&e[1].state==='presente';
    });
  });
  return recs;
}

function ngGetStatData(){
  var recs=ngGetFilteredRecords().filter(function(r){return !r.sinEncuentro;});
  var allLiderIds=new Set();
  (S.ngComunidades||[]).forEach(function(ngx){
    (ngx.liderIds||[]).forEach(function(id){allLiderIds.add(Number(id));});
    (ngx.colaboradorIds||[]).forEach(function(id){allLiderIds.add(Number(id));});
  });
  var coms=new Set(recs.map(function(r){return r.comunidadId;}));
  var varones=0,chicas=0,presTotal=0,varNuevos=0,chkNuevas=0;
  recs.forEach(function(r){
    Object.entries(r.asistencia||{}).forEach(function(e){
      var a=e[1];
      if(a.esLider||a.esColab) return;
      if(a.state!=='presente') return;
      presTotal++;
      if(a.genero==='H') varones++;
      else if(a.genero==='M') chicas++;
    });
    (r.visitsNew||[]).forEach(function(n){
      // Simple heuristic: can't determine gender from name easily
      varNuevos++;  // show total as varones nuevos for now
    });
  });
  var totalPartic=new Set();
  recs.forEach(function(r){Object.keys(r.asistencia||{}).forEach(function(id){if(!allLiderIds.has(Number(id))) totalPartic.add(id);});});
  return {comunidades:coms.size,participantes:totalPartic.size,varones,chicas,presTotal,varNuevos,chkNuevas};
}

function ngRenderSemanas(){
  var p=document.getElementById('ng-panel-semanas');
  if(!p) return;
  var recs=ngGetFilteredRecords().sort(function(a,b){return b.fecha.localeCompare(a.fecha);});
  var coms=(ngFilComunidad?S.ngComunidades.filter(function(c){return Number(c.id)===Number(ngFilComunidad);}):S.ngComunidades)||[];
  if(!coms.length||!recs.length){p.innerHTML='<div class="empty">Sin datos</div>';return;}
  // Get unique weeks
  var weeks=[];
  var weekSet={};
  recs.forEach(function(r){var w=getWeekKey(r.fecha);if(!weekSet[w]){weekSet[w]=true;weeks.push(w);}});
  weeks.sort(function(a,b){return b.localeCompare(a);});
  var html='<div class="card"><div class="card-title">📋 Estado por semana</div>';
  weeks.forEach(function(wk){
    html+='<div style="margin-bottom:16px"><div style="font-size:12px;font-weight:700;color:#6B7280;margin-bottom:8px;border-bottom:1px solid #F3F4F6;padding-bottom:4px">Semana del '+wk+'</div>';
    coms.forEach(function(com){
      var comRecs=recs.filter(function(r){return Number(r.comunidadId)===Number(com.id)&&getWeekKey(r.fecha)===wk;});
      if(!comRecs.length){
        html+='<div style="display:flex;align-items:center;gap:10px;padding:6px 0">'+
          '<span style="font-size:13px;font-weight:600;flex:1">'+com.name+'</span>'+
          '<span style="font-size:12px;color:#9CA3AF;background:#F3F4F6;padding:3px 10px;border-radius:6px">Sin registro</span>'+
        '</div>';
        return;
      }
      comRecs.forEach(function(r){
        if(r.sinEncuentro){
          html+='<div style="display:flex;align-items:center;gap:10px;padding:6px 0">'+
            '<span style="font-size:13px;font-weight:600;flex:1">'+com.name+(r.encuentroNum===2?' (2°)':'')+'</span>'+
            '<span style="font-size:12px;color:#92400E;background:#FEF3C7;padding:3px 10px;border-radius:6px">Sin encuentro</span>'+
          '</div>';
          return;
        }
        var att=Object.values(r.asistencia||{});
        var main=att.filter(function(a){return !a.esLider&&!a.esColab;});
        var pres=main.filter(function(a){return a.state==='presente';}).length;
        var tot=main.length;
        var pct=tot?Math.round(pres/tot*100):0;
        var col=pct>=75?'#16A34A':pct>=50?'#D97706':'#DC2626';
        var bg=pct>=75?'#DCFCE7':pct>=50?'#FEF3C7':'#FEE2E2';
        html+='<div style="padding:6px 0">'+
          '<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">'+
            '<span style="font-size:13px;font-weight:600;flex:1">'+com.name+(r.encuentroNum===2?' (2°)':'')+'</span>'+
            '<span style="font-size:12px;font-weight:700;color:'+col+';background:'+bg+';padding:3px 10px;border-radius:6px">'+pres+'/'+tot+' — '+pct+'%</span>'+
          '</div>'+
          '<div style="height:6px;background:#F3F4F6;border-radius:4px"><div style="height:6px;background:'+col+';border-radius:4px;width:'+pct+'%"></div></div>'+
        '</div>';
      });
    });
    html+='</div>';
  });
  html+='</div>';
  p.innerHTML=html;
}

function ngRenderEvolucion(){
  var p=document.getElementById('ng-panel-evolucion');
  if(!p) return;
  var recs=ngGetFilteredRecords().filter(function(r){return !r.sinEncuentro;}).sort(function(a,b){return a.fecha.localeCompare(b.fecha);});
  if(!recs.length){p.innerHTML='<div class="empty">Sin datos</div>';return;}
  // Group by date, count presentes
  var byDate={};
  recs.forEach(function(r){
    if(!byDate[r.fecha]) byDate[r.fecha]={pres:0,aus:0,new:0};
    Object.values(r.asistencia||{}).forEach(function(a){
      if(a.esLider||a.esColab) return;
      if(a.state==='presente') byDate[r.fecha].pres++;
      else byDate[r.fecha].aus++;
    });
    byDate[r.fecha].new+=(r.visitsNew||[]).length;
  });
  var dates=Object.keys(byDate).sort();
  if(!dates.length){p.innerHTML='<div class="empty">Sin datos</div>';return;}
  var maxPres=Math.max.apply(null,dates.map(function(d){return byDate[d].pres;}));
  var html='<div class="card"><div class="card-title">📈 Evolución — Presentes por encuentro</div>'+
    '<div style="overflow-x:auto"><div style="display:flex;align-items:flex-end;gap:6px;min-height:180px;padding:8px 0">';
  dates.forEach(function(d){
    var v=byDate[d];
    var h=maxPres>0?Math.round((v.pres/maxPres)*140):0;
    var pct=Math.round((v.pres/(v.pres+v.aus||1))*100);
    var col=pct>=75?'#16A34A':pct>=50?'#1F4E79':'#DC2626';
    html+='<div style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:44px">'+
      '<span style="font-size:11px;font-weight:700;color:'+col+'">'+pct+'%</span>'+
      '<div style="width:36px;background:'+col+';border-radius:4px 4px 0 0;height:'+h+'px;min-height:4px"></div>'+
      '<span style="font-size:10px;color:#9CA3AF;writing-mode:vertical-rl;transform:rotate(180deg);max-height:60px">'+d.slice(5)+'</span>'+
    '</div>';
  });
  html+='</div></div>';
  // Summary table
  html+='<table style="margin-top:8px"><thead><tr><th>Fecha</th><th>Presentes</th><th>Ausentes</th><th>% Asist.</th><th>Nuevos</th></tr></thead><tbody>';
  dates.slice().reverse().forEach(function(d){
    var v=byDate[d];
    var pct=Math.round((v.pres/(v.pres+v.aus||1))*100);
    var col=pct>=75?'#16A34A':pct>=50?'#D97706':'#DC2626';
    html+='<tr><td>'+d+'</td><td style="text-align:center;color:#16A34A">'+v.pres+'</td>'+
      '<td style="text-align:center;color:#DC2626">'+v.aus+'</td>'+
      '<td style="text-align:center;font-weight:700;color:'+col+'">'+pct+'%</td>'+
      '<td style="text-align:center;color:#7C3AED">'+v.new+'</td></tr>';
  });
  html+='</tbody></table></div>';
  p.innerHTML=html;
}

function ngRenderMiembrosPanel(){
  var p=document.getElementById('ng-panel-miembros');
  if(!p) return;
  var recs=ngGetFilteredRecords().filter(function(r){return !r.sinEncuentro;});
  var allLiderIds=new Set();
  (S.ngComunidades||[]).forEach(function(ngx){
    (ngx.liderIds||[]).forEach(function(id){allLiderIds.add(Number(id));});
    (ngx.colaboradorIds||[]).forEach(function(id){allLiderIds.add(Number(id));});
  });
  // Build member stats DIRECTLY from records (not from grupoId lookup)
  var memberData={}; // memberId -> {pres, enc, comId}
  var encPerCom={};
  recs.forEach(function(r){
    var cid=Number(r.comunidadId);
    encPerCom[cid]=(encPerCom[cid]||0)+1;
    Object.entries(r.asistencia||{}).forEach(function(e){
      var mid=Number(e[0]);
      var a=e[1];
      if(ngFilSexo==='lideres'&&!allLiderIds.has(mid)) return;
      if(ngFilSexo!=='lideres'&&ngFilSexo!==''&&allLiderIds.has(mid)) return;
      if(!memberData[mid]) memberData[mid]={pres:0,enc:0,comId:cid,genero:a.genero||''};
      memberData[mid].enc++;
      if(a.state==='presente') memberData[mid].pres++;
    });
  });
  var stats=[];
  Object.entries(memberData).forEach(function(e){
    var mid=Number(e[0]);
    var d=e[1];
    var m=S.members.find(function(x){return Number(x.id)===mid;});
    if(!m||m.estado==='Baja') return;
    if(ngFilSexo&&ngFilSexo!=='lideres'&&m.genero!==ngFilSexo) return;
    if(ngFilComunidad&&d.comId!==Number(ngFilComunidad)) return;
    var totalEnc=encPerCom[d.comId]||d.enc;
    var ngx=S.ngComunidades.find(function(x){return Number(x.id)===d.comId;});
    var pct=totalEnc?Math.round(d.pres/totalEnc*100):0;

function ngRenderDashboardStats(){
  var d=document.getElementById('ng-dash-content');
  if(!d) return;
  var recs=ngGetFilteredRecords().filter(function(r){return !r.sinEncuentro;});
  var total=recs.length;
  var totalAtt=0,totalPres=0,totalNew=0;
  recs.forEach(function(r){
    Object.values(r.asistencia||{}).forEach(function(a){
      if(a.esLider||a.esColab) return; // exclude leaders from main stats
      totalAtt++;
      if(a.state==='presente') totalPres++;
    });
    totalNew+=(r.visitsNew||[]).length;
  });
  var pctPres=totalAtt?Math.round(totalPres/totalAtt*100):0;
  var stats=[
    {label:'Encuentros',val:total,icon:'📅'},
    {label:'Promedio asistencia',val:total?Math.round(totalPres/total):0,icon:'👥'},
    {label:'% Asistencia',val:pctPres+'%',icon:'📊'},
    {label:'Personas nuevas',val:totalNew,icon:'🌱'},
  ];
  d.innerHTML=
    '<div class="stat-grid" style="margin-bottom:1rem">'+
      stats.map(function(s){
        return '<div class="stat-card"><div style="font-size:1.5rem">'+s.icon+'</div>'+
          '<div style="font-size:1.5rem;font-weight:700;color:#1F4E79">'+s.val+'</div>'+
          '<div style="font-size:12px;color:#6B7280">'+s.label+'</div></div>';
      }).join('')+
    '</div>'+
    ngRenderAsistenciaMiembros(recs);
}

function ngRenderAsistenciaMiembros(recs){
  if(!recs.length) return '<div class="card" style="text-align:center;padding:1.5rem;color:#9CA3AF">Sin registros para el período seleccionado</div>';
  var memberStats=[];
  var encPerCom={};
  recs.forEach(function(r){
    var cid=Number(r.comunidadId);
    encPerCom[cid]=(encPerCom[cid]||0)+1;
  });
  // Build leader IDs across all NG communities
  var allLiderIds=new Set();
  (S.ngComunidades||[]).forEach(function(ngx){
    (ngx.liderIds||[]).forEach(function(id){allLiderIds.add(Number(id));});
    (ngx.colaboradorIds||[]).forEach(function(id){allLiderIds.add(Number(id));});
  });
  // For leaders filter: look at ALL records' asistencia for leader ids
  var leaderRecs=ngFilSexo==='lideres'?ngGetFilteredRecords().filter(function(r){return !r.sinEncuentro;}):[];
  var leaderEncPerCom={};
  leaderRecs.forEach(function(r){var cid=Number(r.comunidadId);leaderEncPerCom[cid]=(leaderEncPerCom[cid]||0)+1;});

  // Build a map of leader → community for lookup
  var liderComMap={};
  (S.ngComunidades||[]).forEach(function(ngx){
    (ngx.liderIds||[]).concat(ngx.colaboradorIds||[]).forEach(function(id){
      liderComMap[Number(id)]=Number(ngx.id);
    });
  });
  S.members.filter(function(m){
    if(m.estado==='Baja') return false;
    if(ngFilSexo==='lideres') return allLiderIds.has(Number(m.id));
    return m.grupoId&&encPerCom[Number(m.grupoId)]>0&&!allLiderIds.has(Number(m.id));
  }).forEach(function(m){
    if(ngFilSexo&&ngFilSexo!=='lideres'&&m.genero!==ngFilSexo) return;
    // For community filter: leaders use liderComMap, members use grupoId
    var memberComId=ngFilSexo==='lideres'?(liderComMap[Number(m.id)]||Number(m.grupoId)):Number(m.grupoId);
    if(ngFilComunidad&&memberComId!==Number(ngFilComunidad)) return;
    // Find this member's community (for leaders: via liderIds/colaboradorIds; for members: via grupoId)
    var myCid=Number(m.grupoId);
    if(ngFilSexo==='lideres'){
      var myCom2=(S.ngComunidades||[]).find(function(ngx){
        return (ngx.liderIds||[]).map(Number).includes(Number(m.id))||
               (ngx.colaboradorIds||[]).map(Number).includes(Number(m.id));
      });
      if(myCom2) myCid=Number(myCom2.id);
    }
    // Count encounters for this community
    var useRecs2=ngFilSexo==='lideres'?leaderRecs:recs;
    var comRecs2=useRecs2.filter(function(r){return Number(r.comunidadId)===myCid;});
    var totalEnc=comRecs2.length;
    if(!totalEnc) return;
    // Count presencias for this member
    var presencias=comRecs2.reduce(function(acc,r){
      var att=r.asistencia||{};
      var entry=att[m.id]||att[String(m.id)];
      return acc+(entry&&entry.state==='presente'?1:0);
    },0);
    var ngx2=S.ngComunidades.find(function(x){return Number(x.id)===myCid;});
    memberStats.push({nombre:m.nombre,apellido:m.apellido,comunidad:ngx2?ngx2.name:'—',presencias,totalEnc,pct:totalEnc?Math.round(presencias/totalEnc*100):0});
  });
  memberStats.sort(function(a,b){return b.pct-a.pct||b.presencias-a.presencias;});
  if(!memberStats.length) return '<div class="card" style="text-align:center;padding:1.5rem;color:#9CA3AF">Sin datos de asistencia para los filtros seleccionados</div>';
  return '<div class="card" style="padding:0;overflow:hidden">'+
    '<table><thead><tr>'+
      '<th>Nombre</th><th>Comunidad</th><th>Presencias</th><th>Encuentros</th><th>%</th>'+
    '</tr></thead><tbody>'+
    memberStats.map(function(s){
      var color=s.pct>=75?'#16A34A':s.pct>=50?'#D97706':'#DC2626';
      return '<tr>'+
        '<td style="font-weight:600">'+s.apellido+', '+s.nombre+'</td>'+
        '<td style="font-size:12px;color:#6B7280">'+s.comunidad+'</td>'+
        '<td style="text-align:center">'+s.presencias+'</td>'+
        '<td style="text-align:center">'+s.totalEnc+'</td>'+
        '<td style="text-align:center;font-weight:700;color:'+color+'">'+s.pct+'%</td>'+
      '</tr>';
    }).join('')+
    '</tbody></table></div>';
}

function ngCheckExistingRecord(){
  var fecha=document.getElementById('ng-fecha')?.value;
  var cid=ngCurrentComunidadId;
  if(!fecha||!cid) return;
  var semana=getWeekKey(fecha);
  var existing=S.ngRecords.filter(function(r){
    return Number(r.comunidadId)===Number(cid)&&getWeekKey(r.fecha)===semana&&!r.sinEncuentro;
  });
  var alert2=document.getElementById('ng-pending-alert');
  var numSel=document.getElementById('ng-encuentro-num');
  if(existing.length>=1){
    if(alert2){
      alert2.style.display='block';
      alert2.textContent='⚠️ Ya hay '+existing.length+' encuentro'+( existing.length>1?'s':'')+' registrado'+( existing.length>1?'s':'')+' esta semana ('+existing.map(function(r){return r.fecha;}).join(', ')+').'+( existing.length<2?' Podés cargar el segundo encuentro.':' Ya se cargaron 2 encuentros esta semana.');
    }
    if(numSel) numSel.value=String(Math.min(existing.length+1,2));
    if(existing.length>=2&&numSel) numSel.disabled=true;
  } else {
    if(alert2) alert2.style.display='none';
    if(numSel){numSel.value='1';numSel.disabled=false;}
  }
}

function ngBuildAsistList(cid){
  var ng=S.ngComunidades.find(function(x){return Number(x.id)===Number(cid);});
  var members=ngGetMembersOfComunidad(cid).sort(function(a,b){return listName(a).localeCompare(listName(b));});
  var liderIds=((ng&&ng.liderIds)||[]).map(Number);
  var colabIds=((ng&&ng.colaboradorIds)||[]).map(Number);
  var roleIds=new Set([].concat(liderIds,colabIds));
  var roleMembros=Array.from(roleIds).map(function(id){
    return S.members.find(function(m){return Number(m.id)===Number(id);});
  }).filter(function(m){return m&&m.estado!=='Baja';});
  var mainMembers=members.filter(function(m){return !roleIds.has(Number(m.id));});
  ngFacAtt={};
  mainMembers.forEach(function(m){ngFacAtt[m.id]={name:fullName(m),genero:m.genero,state:'ausente',esLider:false};});
  roleMembros.forEach(function(m){
    ngFacAtt[m.id]={name:fullName(m),genero:m.genero,state:'ausente',
      esLider:liderIds.includes(Number(m.id)),esColab:colabIds.includes(Number(m.id))};
  });
  var list=document.getElementById('ng-asist-list');
  if(!list) return;
  window.ngToggleBtn=function(id,btn){
    var n=ngFacAtt[id].state==='presente'?'ausente':'presente';
    ngFacAtt[id].state=n;
    btn.className='toggle-btn '+n;
    btn.textContent=n==='presente'?'Presente':'Ausente';
  };
  function buildRow(m,rol){
    var genBg=m.genero==='H'?'#DBEAFE':'#FCE7F3';
    var genCol=m.genero==='H'?'#1E40AF':'#9D174D';
    var rolBadge=rol?'<span style="font-size:10px;background:#D1FAE5;color:#065F46;padding:1px 6px;border-radius:4px;margin-left:4px">'+rol+'</span>':'';
    return '<div class="member-row">'+
      '<span style="font-size:11px;padding:2px 7px;border-radius:4px;background:'+genBg+';color:'+genCol+';font-weight:600;flex-shrink:0">'+m.genero+'</span>'+
      '<span class="member-name">'+listName(m)+rolBadge+'</span>'+
      '<button class="toggle-btn ausente" onclick="ngToggleBtn('+m.id+',this)">Ausente</button>'+
    '</div>';
  }
  var html='';
  if(mainMembers.length){
    html+='<div style="font-size:12px;font-weight:600;color:#6B7280;margin:8px 0 4px">Integrantes ('+mainMembers.length+')</div>';
    html+=mainMembers.map(function(m){return buildRow(m,'');}).join('');
  }
  if(roleMembros.length){
    html+='<div style="font-size:12px;font-weight:600;color:#6B7280;margin:12px 0 4px">Líderes y Colaboradores</div>';
    html+=roleMembros.map(function(m){
      return buildRow(m,liderIds.includes(Number(m.id))?'Líder':'Colaborador');
    }).join('');
  }
  if(!html) html='<div style="color:#F59E0B;font-size:13px;padding:8px">No hay personas asignadas.</div>';
  list.innerHTML=html;
}

function getWeekKey(fecha){
  var d=new Date(fecha+'T00:00:00');
  var day=d.getDay();
  var monday=new Date(d);
  monday.setDate(d.getDate()-(day===0?6:day-1));
  return monday.toISOString().slice(0,10);
}

async function ngSaveRecord(){
  var fecha=document.getElementById('ng-fecha')?.value;
  var cid=ngCurrentComunidadId;
  var sinEnc=document.getElementById('ng-sin-enc')?.checked;
  var encNum=parseInt(document.getElementById('ng-encuentro-num')?.value)||1;
  if(!fecha||!cid){alert('Seleccioná la comunidad y la fecha');return;}
  // Check for duplicate
  var semana=getWeekKey(fecha);
  var existing=S.ngRecords.filter(function(r){return Number(r.comunidadId)===Number(cid)&&getWeekKey(r.fecha)===semana&&!r.sinEncuentro;});
  if(existing.length>=2&&!sinEnc){
    alert('Ya hay 2 encuentros registrados esta semana para esta comunidad.');
    return;
  }
  if(existing.length>=1&&!sinEnc){
    if(!confirm('Ya hay un encuentro registrado esta semana. ¿Confirmás agregar el segundo encuentro del '+fecha+'?')) return;
  }
  // State already updated via ngToggleBtn - no need to re-read from DOM
  // Tag each entry with esLider flag for dashboard filtering
  var rec={
    id:Date.now(),
    comunidadId:cid,
    fecha:fecha,
    encuentroNum:encNum,
    asistencia:Object.assign({},ngFacAtt),
    visitsNew:[...ngVisitsNew],
    sinEncuentro:!!sinEnc,
    ts:new Date().toISOString(),
    _ts:Date.now()
  };
  S.ngRecords.push(rec);
  await saveK(SK.ngRecords,S.ngRecords);
  try{
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
  }catch(e){
    S.ngRecords.pop();
    var al=document.getElementById('ng-alert');
    if(al){al.textContent='❌ Error al guardar. Verificá tu conexión.';al.classList.remove('hidden');}
    return;
  }
  var al=document.getElementById('ng-alert');
  if(al){
    al.textContent=sinEnc?'⏸ Encuentro registrado sin asistencia.':'✅ Asistencia guardada ☁️';
    al.style.background=sinEnc?'#FEF3C7':'';
    al.style.color=sinEnc?'#92400E':'';
    al.classList.remove('hidden');
    setTimeout(function(){al.classList.add('hidden');al.style='';},4000);
  }
  ngVisitsNew=[];
  ngFacAtt={};
  ngRenderCargar(document.getElementById('ng-tab-content'));
}

function ngRenderRegistros(c){
  if(!c) c=document.getElementById('ng-tab-content');
  var hoy=today();
  var d2w=(function(){var d=new Date();d.setDate(d.getDate()-14);return d.toISOString().slice(0,10);})();
  var coms=isSuperAdmin()?S.ngComunidades:ngGetMisComunidades();
  var comOpts=coms.map(function(ng){return '<option value="'+ng.id+'">'+ng.name+'</option>';}).join('');
  c.innerHTML=
    '<div class="card" style="margin-bottom:1rem">'+
      '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">'+
        '<div><label style="font-size:12px;color:#6B7280;display:block;margin-bottom:3px">Comunidad</label>'+
          '<select id="ng-rf-com" onchange="ngRenderRegistrosList()" style="min-width:140px"><option value="">Todas</option>'+comOpts+'</select></div>'+
        '<div><label style="font-size:12px;color:#6B7280;display:block;margin-bottom:3px">Desde</label>'+
          '<input type="date" id="ng-rf-desde" value="'+d2w+'" onchange="ngRenderRegistrosList()"></div>'+
        '<div><label style="font-size:12px;color:#6B7280;display:block;margin-bottom:3px">Hasta</label>'+
          '<input type="date" id="ng-rf-hasta" value="'+hoy+'" onchange="ngRenderRegistrosList()"></div>'+
        '<button class="btn btn-sm" onclick="ngResetRegFiltros()">🔄</button>'+
      '</div>'+
    '</div>'+
    '<div id="ng-registros-list"></div>';
  ngRenderRegistrosList();
}

function ngResetRegFiltros(){
  var d2w=(function(){var d=new Date();d.setDate(d.getDate()-14);return d.toISOString().slice(0,10);})();
  var el;
  if((el=document.getElementById('ng-rf-desde'))) el.value=d2w;
  if((el=document.getElementById('ng-rf-hasta'))) el.value=today();
  if((el=document.getElementById('ng-rf-com'))) el.value='';
  ngRenderRegistrosList();
}

function ngRenderRegistrosList(){
  var list=document.getElementById('ng-registros-list');
  if(!list) return;
  var desde=document.getElementById('ng-rf-desde')?.value||'';
  var hasta=document.getElementById('ng-rf-hasta')?.value||'';
  var comFil=document.getElementById('ng-rf-com')?.value?parseInt(document.getElementById('ng-rf-com').value):null;
  var recs=(S.ngRecords||[]).filter(function(r){
    if(desde&&r.fecha<desde) return false;
    if(hasta&&r.fecha>hasta) return false;
    if(comFil&&Number(r.comunidadId)!==Number(comFil)) return false;
    return true;
  }).sort(function(a,b){return b.fecha.localeCompare(a.fecha)||b.ts.localeCompare(a.ts||'');});
  if(!recs.length){
    list.innerHTML='<div class="card" style="text-align:center;padding:2rem;color:#9CA3AF">Sin registros para el período seleccionado</div>';
    return;
  }
  list.innerHTML=recs.map(function(r){
    var ng=S.ngComunidades.find(function(x){return Number(x.id)===Number(r.comunidadId);});
    var comName=ng?ng.name:'—';
    var presentes=Object.values(r.asistencia||{}).filter(function(a){return a.state==='presente';}).length;
    var total=Object.keys(r.asistencia||{}).length;
    var nuevos=(r.visitsNew||[]).length;
    var encuentroLabel=r.encuentroNum===2?'2° Encuentro':'1° Encuentro';
    return '<div class="card" style="margin-bottom:8px;padding:12px 16px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">'+
        '<div>'+
          '<div style="font-weight:700;color:#1F4E79;font-size:14px">'+comName+' — '+r.fecha+(r.sinEncuentro?' <span style="color:#92400E">(Sin encuentro)</span>':' · '+encuentroLabel)+'</div>'+
          (!r.sinEncuentro?'<div style="font-size:12px;color:#6B7280">✅ '+presentes+'/'+total+' presentes'+(nuevos?' · 🌱 '+nuevos+' nuevo'+(nuevos>1?'s':''):'')+'</div>':'')+
        '</div>'+
        (isSuperAdmin()?'<button class="btn btn-sm" style="color:#DC2626;border-color:#FECACA" onclick="ngDeleteRecord('+r.id+')">🗑️</button>':'')+
      '</div>'+
      (!r.sinEncuentro?ngRenderAsistRow(r):'')+
    '</div>';
  }).join('');
}

function ngRenderAsistRow(r){
  var presentes=Object.entries(r.asistencia||{}).filter(function(e){return e[1].state==='presente';}).map(function(e){
    var m=S.members.find(function(x){return Number(x.id)===Number(e[0]);});
    return m?listName(m):e[1].name||'?';
  });
  var ausentes=Object.entries(r.asistencia||{}).filter(function(e){return e[1].state!=='presente';}).map(function(e){
    var m=S.members.find(function(x){return Number(x.id)===Number(e[0]);});
    return m?listName(m):e[1].name||'?';
  });
  return '<div style="margin-top:8px;font-size:12px">'+
    (presentes.length?'<div style="color:#16A34A;margin-bottom:4px">✅ '+presentes.join(', ')+'</div>':'')+
    (ausentes.length?'<div style="color:#DC2626">❌ '+ausentes.join(', ')+'</div>':'')+
    ((r.visitsNew||[]).length?'<div style="color:#7C3AED;margin-top:4px">🌱 Nuevos: '+(r.visitsNew||[]).join(', ')+'</div>':'')+
  '</div>';
}

async function ngDeleteRecord(id){
  if(!isSuperAdmin()) return;
  if(!confirm('¿Eliminar este registro? Esta acción no se puede deshacer.')) return;
  var idx=S.ngRecords.findIndex(function(r){return Number(r.id)===Number(id);});
  if(idx<0) return;
  var removed=S.ngRecords.splice(idx,1)[0];
  await saveK(SK.ngRecords,S.ngRecords);
  try{
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
    ngRenderRegistrosList();
    showToast('🗑️ Registro eliminado','#DC2626');
  }catch(e){
    S.ngRecords.splice(idx,0,removed);
    alert('No se pudo eliminar. Verificá tu conexión.');
  }
}

// ── Role helper ────────────────────────────────────────────
function userRoles(){
  const linked=S.members.find(m=>fullName(m).toLowerCase()===currentUser.name.toLowerCase());
  return linked?linked.roles:[];
}
function hasRole(...rols){ const r=userRoles(); return rols.some(x=>r.includes(x)||currentUser.role===x); }

// ── Permission functions ────────────────────────────────────
// SUPER ADMIN: todo
// PASTOR: GdV (ver, no cargar), Miembros (ver+editar), Nuevos, OF — NO Config, NO cargar asistencia
// ADMIN GdV: GdV completo, Miembros (solo ver), Nuevos — NO Config, NO OF
// FACILITADOR: solo su grupo GdV (cargar+ver) — nada más
// LIDER: GdV (ver todos), Nuevos — nada más

function canAccessGdV(){
  return isSuperAdmin() ||
    canScreen('gdv_dashboard') || canScreen('gdv_cargar') || canScreen('gdv_registros');
}
function isSuperAdmin(){
  return currentUser && currentUser.role==='super_admin';
}
function canGestionarNuevos(){
  // Configurable: ejecuta on nuevos means full management
  return isSuperAdmin() || canEjecutar('nuevos');
}
function isContactar(){
  return currentUser && currentUser.role==='contactar';
}

function canAccessOF(){
  return isSuperAdmin() || canScreen('of');
}

function normName(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,''); }
function getFacilitadorGroupIds(){
  // Returns ALL group ids this user is responsible for (can be more than one)
  const ids=new Set();
  if(currentUser.groupId) ids.add(Number(currentUser.groupId));

  // Find linked member: by memberId, or by accent-normalized name
  let linked=null;
  if(currentUser.memberId) linked=S.members.filter(Boolean).find(m=>Number(m.id)===Number(currentUser.memberId));
  if(!linked) linked=S.members.filter(Boolean).find(m=>normName(fullName(m))===normName(currentUser.name));

  if(linked){
    // Member's primary + extra groups
    if(linked.grupoId) ids.add(Number(linked.grupoId));
    (linked.grupoIds||[]).forEach(g=>ids.add(Number(g)));
    // Any group where this member is the assigned Facilitador
    S.groups.forEach(g=>{ if(Number(g.facId)===Number(linked.id)) ids.add(Number(g.id)); });
  }
  return [...ids];
}
function getFacilitadorGroupId(){
  // Backward-compat: returns the first/primary group id, or null
  const ids=getFacilitadorGroupIds();
  return ids.length?ids[0]:null;
}
function isGdVScoped(){
  if(isSuperAdmin()) return false;
  // Facilitador role: always scoped if they have a group assigned (via user or group record)
  if(currentUser.role==='facilitador') return !!getFacilitadorGroupId();
  // Other roles: configurable via permission
  return canEjecutar('gdv_scope_grupo') && !!currentUser.groupId;
}
function isGdVAdmin(){
  if(isSuperAdmin()) return true;
  if(isGdVScoped()) return false; // scoped roles are not full admins
  return canEjecutar('gdv_cargar');
}
function isGdVFacilitador(){
  // Any scoped role with a group assigned
  return !isSuperAdmin() && isGdVScoped();
}

function doLogin(){
  const u=document.getElementById('inp-user').value.trim();
  const p=document.getElementById('inp-pass').value;
  const found=S.users.find(x=>x.user===u&&x.pass===p);
  const al=document.getElementById('login-alert');
  if(!found){al.textContent='Usuario o contraseña incorrectos';return;}
  al.textContent='';
  currentUser={id:found.id,name:found.name,role:found.role,groupId:found.groupId||null};
  var sess=JSON.stringify(currentUser);
  try{localStorage.setItem('vng_cu',sess);}catch(e){}
  try{sessionStorage.setItem('vng_cu',sess);}catch(e){}
  document.getElementById('screen-login').style.display='none';
  resetInactivityTimer();
  showHome();
}

function doLogout(){
  currentUser=null;
  localStorage.removeItem('vng_cu');
  document.getElementById('screen-login').style.display='';
  document.getElementById('screen-home').classList.add('hidden');
  document.getElementById('screen-app').classList.remove('show');
  document.getElementById('inp-user').value='';
  document.getElementById('inp-pass').value='';
}

  {key:'config',     icon:'⚙️',  name:'Configuración',         desc:'Gestión de grupos, usuarios del sistema y roles. Solo accesible para Super Admin.',   tag:'Solo Super Admin', tagClass:'tag-green', action:'openConfig'},
];

function getModulesConfig(){
  // Merge saved config with defaults (defaults provide action/icon/tagClass)
  var saved=S.modulesConfig&&S.modulesConfig.length?S.modulesConfig:[];
  return DEFAULT_MODULES.map(function(def){
    var override=saved.find(function(s){return s.key===def.key;});
    return Object.assign({},def,override?{name:override.name,desc:override.desc}:{});
  });
}

async function saveModulesConfig(modules){
  // Only save name+desc overrides (not icon/action which are hardcoded)
  var toSave=modules.map(function(m){return {key:m.key,name:m.name,desc:m.desc};});
  S.modulesConfig=toSave;
  await saveK(SK.modulesConfig, S.modulesConfig);
  try{
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
  }catch(e){
    alert('No se pudo guardar en la nube. Verificá tu conexión.');
    return false;
  }
  return true;
}

function renderModulesGrid(){
  const mgEl=document.getElementById('modules-grid');
    if(!mgEl) return;
  var allMods=getModulesConfig();
  var modules=[];
  var accessMap={
    miembros:canAccessMiembros(), nuevos:canAccessNuevos(),
    gdv:canAccessGdV(), ng:canAccessNG(),
    disc:canAccessDisc(), of:canAccessOF(), config:canAccessConfig()
  };
  allMods.forEach(function(mod){
    if(accessMap[mod.key]) modules.push(mod);
  });

  document.getElementById('modules-grid').innerHTML=modules.map(m=>`
    <div class="module-card${m.comingSoon?' coming-soon':''}" ${m.action?`onclick="${m.action}()"`:''}>
      <div class="module-icon">${m.icon}</div>
      <div class="module-name">${m.name}</div>
      <div class="module-desc">${m.desc}</div>
      <span class="module-tag ${m.tagClass}">${m.tag}</span>
    </div>`).join('');
  // Render upcoming birthdays
  setTimeout(renderHomeCumples, 50);
  // Render Export/Import only for Super Admin
  var exportWrap=document.getElementById('home-export-wrap');
  if(exportWrap){
    if(isSuperAdmin()){
      exportWrap.innerHTML=
        '<div style="display:flex;gap:10px;justify-content:center;margin-top:1.5rem;flex-wrap:wrap">'+
        '<button class="btn btn-sm" onclick="exportarTodo()" style="background:#EFF6FF;border-color:#BFDBFE;color:#1E40AF;font-weight:600">💾 Exportar datos</button>'+
        '<label style="padding:6px 14px;background:#F0FDF4;border:1px solid #BBF7D0;color:#166534;font-weight:600;border-radius:8px;cursor:pointer;font-size:13px">'+
        '📂 Importar datos<input type="file" accept=".json" style="display:none" onchange="importarTodo(this)">'+
        '</label>'+
        '</div>';
    } else {
      exportWrap.innerHTML='';
    }
  }
}

function saCopyActualizarLink(){
  var input=document.getElementById('sa-actualizar-link');
  var btn=document.getElementById('sa-copy-link-btn');
  if(!input) return;
  var done=function(){
    if(btn){var t=btn.textContent;btn.textContent='✅ Copiado';setTimeout(function(){btn.textContent=t;},1500);}
  };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(input.value).then(done).catch(function(){
      input.select();document.execCommand('copy');done();
    });
  } else {
    input.select();document.execCommand('copy');done();
  }
}

function saCalcEdad(fnac){
  if(!fnac) return '—';
  const hoy=new Date();
  let nac;
  if(fnac.indexOf('/')>=0){
    // DD/MM/AA or DD/MM/AAAA
    const p=fnac.split('/');
    if(p.length<3) return '—';
    let yy=parseInt(p[2]);
    if(yy<100){
      const curYY=hoy.getFullYear()%100;
      yy += (yy>curYY) ? 1900 : 2000;
    }
    nac=new Date(yy,parseInt(p[1])-1,parseInt(p[0]));
  } else {
    // ISO format YYYY-MM-DD
    nac=new Date(fnac);
  }
  if(isNaN(nac.getTime())) return '—';
  let edad=hoy.getFullYear()-nac.getFullYear();
  const m=hoy.getMonth()-nac.getMonth();
  if(m<0||(m===0&&hoy.getDate()<nac.getDate())) edad--;
  if(edad<0||edad>120) return '—';
  return edad+' años';
}

function saFmtDate(d){
  if(!d) return '—';
  return fmtAA(d)||'—';
}

// Universal date → DD/MM/AA, handles ISO (YYYY-MM-DD), DD/MM/AAAA, DD/MM/AA
function fmtAA(d){
  if(!d) return '';
  d=String(d).trim();
  // ISO: 2025-06-01
  if(/^\d{4}-\d{2}-\d{2}/.test(d)){
    const p=d.split('-');
    return p[2].slice(0,2)+'/'+p[1]+'/'+p[0].slice(2);
  }
  // DD/MM/AAAA or DD/MM/AA
  const p=d.split('/');
  if(p.length===3){
    const yy=p[2].length===4?p[2].slice(2):p[2];
    return p[0].padStart(2,'0')+'/'+p[1].padStart(2,'0')+'/'+yy;
  }
  return d;
}

function renderFormacionGrid(){
  const wrap=document.getElementById('sa-formacion-grid-wrap');
  if(!wrap) return;
  const pasos=(S.discPasos||[]).filter(p=>p.estado==='Activo').sort((a,b)=>a.id-b.id);
  const members=(window._saMembrosFiltered||[]).filter(m=>m.condicion!=='Nuevo'&&m.condicion!=='Historico');
  if(!pasos.length){
    wrap.innerHTML='<div class="empty" style="padding:2rem">Sin Pasos de Discipulado configurados.</div>';
    return;
  }
  // Separar pasos por nivel para encabezado agrupado
  const pasosInic=pasos.filter(p=>!/intermedio|avanzado/i.test(p.nombre));
  const pasosProx=pasos.filter(p=>/intermedio|avanzado/i.test(p.nombre));

  // Fila 1: grupos de nivel
  const grupoHeader=
    (pasosInic.length?`<th colspan="${pasosInic.length}" style="text-align:center;padding:6px 4px;background:#DBEAFE;color:#1E40AF;font-size:11px;font-weight:700;border-bottom:2px solid #93C5FD;letter-spacing:.04em">🔵 INICIAL</th>`:'')
    +(pasosProx.map(p=>{
        const isAdv=/avanzado/i.test(p.nombre);
        return `<th style="text-align:center;padding:6px 4px;background:${isAdv?'#FCE7F3':'#EDE9FE'};color:${isAdv?'#9D174D':'#5B21B6'};font-size:11px;font-weight:700;border-bottom:2px solid ${isAdv?'#F9A8D4':'#C4B5FD'};letter-spacing:.04em">${isAdv?'🩷 AVANZADO':'🟣 INTERMEDIO'}</th>`;
      }).join(''));

  // Fila 2: nombres individuales de cada paso
  const headerCols=
    pasosInic.map(p=>`<th style="min-width:90px;text-align:center;font-size:11px;padding:7px 4px;background:#F0F9FF;color:#0369A1;font-weight:600">${p.nombre}</th>`).join('')
    +pasosProx.map(p=>'/').join(''); // placeholder, se reemplaza abajo por celda vacía en fila 2
  // (construimos las filas de header separadas)
  const header2Cols=
    pasosInic.map(p=>`<th style="min-width:90px;text-align:center;font-size:11px;padding:7px 4px;background:#F0F9FF;color:#0369A1;font-weight:600">${p.nombre}</th>`).join('')
    +pasosProx.map(p=>{
        const isAdv=/avanzado/i.test(p.nombre);
        return `<th style="min-width:100px;text-align:center;font-size:11px;padding:7px 4px;background:${isAdv?'#FDF2F8':'#FAF5FF'};color:${isAdv?'#9D174D':'#5B21B6'};font-weight:600">${p.nombre}</th>`;
      }).join('');
  const rows=members.map(m=>{
    const isBaja=m.estado==='Baja';
    const rowStyle=isBaja?'opacity:0.55;background:#FEF2F2':'';
    const cols=pasos.map(p=>{
      const entry=(m.formacion||[]).find(f=>String(f.pasoId)===String(p.id));
      if(entry){
        // Completado ✓
        const badge=entry.fuente==='auto'
          ?`<span style="font-size:9px;background:#D1FAE5;color:#065F46;padding:1px 5px;border-radius:99px;display:block;margin-top:2px">Auto</span>`
          :`<span style="font-size:9px;background:#E0F2FE;color:#0369A1;padding:1px 5px;border-radius:99px;display:block;margin-top:2px">Manual</span>`;
        return `<td style="text-align:center;font-size:11px;color:#065F46;font-weight:600;padding:6px 4px;background:#F0FDF4">${fmtAA(entry.fechaCompletado)||'✓'}${badge}</td>`;
      } else {
        // ¿En Curso? → tiene registros pero no está completado
        const enCurso=S.discRecords.some(r=>String(r.pasoId)===String(p.id)&&r.asistencia&&r.asistencia[m.id]);
        if(enCurso){
          return `<td style="text-align:center;font-size:11px;color:#92400E;font-weight:600;padding:6px 4px;background:#FFFBEB">🟡 En curso</td>`;
        }
        // Próximamente solo para pasos cuyo nombre incluye "Intermedio" o "Avanzado"
        const esProx=/intermedio|avanzado/i.test(p.nombre);
        if(esProx){
          return `<td style="text-align:center;font-size:10px;color:#C4B5FD;padding:6px 4px">🚧 Próximamente</td>`;
        }
        return `<td style="text-align:center;font-size:11px;color:#D1D5DB;padding:6px 4px">Pendiente</td>`;
      }
    }).join('');
    return `<tr style="${rowStyle}">
      <td style="min-width:150px;max-width:180px;padding:7px 8px">
        <span style="cursor:pointer;color:#1F4E79;font-weight:600;font-size:13px" onclick="saShowDetail(${m.id},event)">${listName(m)}</span>
      </td>
      ${cols}
    </tr>`;
  }).join('');
  wrap.innerHTML=`<table style="width:100%;border-collapse:collapse;font-size:13px">
    <thead>
      <tr>
        <th rowspan="2" style="min-width:150px;text-align:left;padding:8px;background:#F9FAFB;border-bottom:2px solid #E5E7EB;position:sticky;left:0;z-index:1;vertical-align:middle">Nombre y Apellido</th>
        ${grupoHeader}
      </tr>
      <tr>${header2Cols}</tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;
}

  const fRol=document.getElementById('sa-mfil-rol')?.value||'';
  const fCond=document.getElementById('sa-mfil-condicion')?.value||'';
  const fEstado=document.getElementById('sa-mfil-estado')?.value;
  // Estado filter — default shows all

  const gsel=document.getElementById('sa-mfil-grupo');
  if(gsel&&gsel.options.length<=1||(gsel&&gsel.options.length>1&&!Array.from(gsel.options).some(o=>o.value==='nogroup'))){
    while(gsel.options.length>1) gsel.remove(1); // reset keeping first "Todos" option
    S.groups.forEach(g=>{const o=document.createElement('option');o.value=g.id;o.textContent=g.name;gsel.appendChild(o);});
    (S.ngComunidades||[]).forEach(function(ng){
      const o=document.createElement('option');o.value=ng.id;o.textContent='🌱 '+ng.name;gsel.appendChild(o);
    });
    const nogrp=document.createElement('option');nogrp.value='nogroup';nogrp.textContent='Sin grupo asignado';gsel.appendChild(nogrp);
  }
  const rsel=document.getElementById('sa-mfil-rol');
  if(rsel&&rsel.options.length<=1) S.roles.forEach(r=>{const o=document.createElement('option');o.value=r.id;o.textContent=r.name;rsel.appendChild(o);});

  // Only show Asistente and Miembro - Nuevos have their own module
  let members=S.members.filter(m=>m.condicion!=='Nuevo');
  if(search) members=members.filter(m=>fullName(m).toLowerCase().includes(search));
  if(fGrupo==='nogroup'){
    const _allGrps=[...(S.groups||[]),...(S.ngComunidades||[])];
    members=members.filter(function(m){
      if(!m.grupoId) return true; // explicitly no group
      // also include members whose group no longer exists
      return !_allGrps.find(function(g){return Number(g.id)===Number(m.grupoId);});
    });
  }
  else if(fGrupo) members=members.filter(m=>Number(m.grupoId)===Number(fGrupo) || (m.grupoIds||[]).map(Number).includes(Number(fGrupo)));
  if(fGen)   members=members.filter(m=>m.genero===fGen);
  if(fTipoGrupo==='gdv'){
    var gdvIds=new Set((S.groups||[]).map(function(g){return Number(g.id);}));
    members=members.filter(function(m){return m.grupoId&&gdvIds.has(Number(m.grupoId));});
  } else if(fTipoGrupo==='ng'){
    var ngIds=new Set((S.ngComunidades||[]).map(function(ng){return Number(ng.id);}));
    members=members.filter(function(m){return m.grupoId&&ngIds.has(Number(m.grupoId));});
  }
  if(fRol)   members=members.filter(m=>(m.roles||[]).includes(fRol));
  if(fCond)  members=members.filter(m=>m.condicion===fCond);
  // Estado filter
  if(fEstado==='Activo') members=members.filter(m=>m.estado!=='Baja');
  else if(fEstado==='Baja') members=members.filter(m=>m.estado==='Baja');
  // '' = todos

  // Orden alfabético por Nombre
  members=members.slice().sort((a,b)=>((a.apellido||'')+(a.nombre||'')).localeCompare((b.apellido||'')+(b.nombre||''),'es',{sensitivity:'base'}));

  const activos=S.members.filter(m=>m.estado!=='Baja').length;
  const countEl=document.getElementById('sa-member-count');
  if(countEl) countEl.textContent=activos;
  window._saMembrosFiltered=members; // share with other tabs

  const tbody=document.getElementById('sa-member-tbody');
  if(!tbody) return;

  tbody.innerHTML=members.map(m=>{
    const allGids=[m.grupoId,...(m.grupoIds||[])].filter(Boolean).map(Number);
    const allAvailableGroups=[...(S.groups||[]),...(S.ngComunidades||[]).map(function(ng){return {id:ng.id,name:'🌱 '+ng.name};})];
    const memberGroups=allGids.map(gid=>allAvailableGroups.find(x=>Number(x.id)===gid)).filter(Boolean);
    const genBg=m.genero==='H'?'#DBEAFE':'#FCE7F3';
    const genColor=m.genero==='H'?'#1E40AF':'#9D174D';
    const isBaja=m.estado==='Baja';
    // Check for missing critical data: Apellido (or "(Nuevo)"-style placeholder), Celular, Fecha Nacimiento
    const apellidoLimpio=(m.apellido||'').replace(/\([^)]*\)/g,'').trim();
    const telLimpio=(m.tel||'').replace(/[^0-9]/g,'');
    const faltaDatos=!apellidoLimpio || !telLimpio || !m.fnac;
    let rowStyle=isBaja?'opacity:0.55;background:#FEF2F2':'';
    if(!isBaja&&faltaDatos) rowStyle='background:#FFF0F5';
    return `<tr style="${rowStyle}">
      <td style="max-width:160px">
        <span style="cursor:pointer;color:#1F4E79;font-weight:600;text-decoration:underline dotted;word-break:break-word" onclick="saShowDetail(${m.id},event)">${listName(m)}</span>
        ${isBaja?`<div style="font-size:11px;color:#DC2626;margin-top:2px">Baja: ${saFmtDate(m.fechaBaja||'')}</div>`:''}
      </td>
      <td><span style="background:${genBg};color:${genColor};padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600">${m.genero}</span></td>
      <td style="color:#6B7280;font-size:12px">${memberGroups.length?memberGroups.map(gr=>`<div>${gr.name}</div>`).join(''):'<span style="color:#F59E0B;font-size:11px">Sin grupo</span>'}</td>
      <td style="max-width:180px"><div style="display:flex;flex-wrap:wrap;gap:3px;max-height:52px;overflow:hidden">${roleChips(m.roles||[])}</div></td>
      <td>${saCondicionBadge(m.condicion)}</td>
      <td><span class="badge ${m.estado==='Activo'?'b-ok':m.estado==='Baja'?'b-danger':'b-muted'}">${m.estado||'Activo'}</span></td>
      <td style="font-size:12px;color:#6B7280">${saFmtDate(m.fechaIngreso)||'—'}</td>
    </tr>`;
  }).join('');

  // Populate preview tables for Formación / Servicio / Historial (dimmed, read-only)
  ['formacion','servicio','historial'].forEach(function(tab){
    const tb=document.getElementById('sa-member-tbody-'+tab);
    if(!tb) return;
    tb.innerHTML=members.map(function(m){
      const isBaja=m.estado==='Baja';
      const apl=(m.apellido||'').replace(/\([^)]*\)/g,'').trim();
      const tel=(m.tel||'').replace(/[^0-9]/g,'');
      const falta=!apl||!tel||!m.fnac;
      let rs=isBaja?'opacity:0.55;background:#FEF2F2':'';
      if(!isBaja&&falta) rs='background:#FFF0F5';
      const mGroups=[m.grupoId,...(m.grupoIds||[])].filter(Boolean).map(Number)
        .map(gid=>S.groups.find(x=>Number(x.id)===gid)).filter(Boolean);
      return '<tr style="'+rs+'">'
        +'<td style="max-width:160px"><span style="color:#1F4E79;font-weight:600">'+fullName(m)+'</span></td>'
        +'<td style="font-size:12px;color:#6B7280">'+(mGroups.length?mGroups.map(gr=>'<div>'+gr.name+'</div>').join(''):'—')+'</td>'
        +'<td>'+roleChips(m.roles||[])+'</td>'
        +'<td>'+saCondicionBadge(m.condicion)+'</td>'
        +'<td><span class="badge '+(m.estado==='Activo'?'b-ok':'b-danger')+'">'+m.estado+'</span></td>'
        +'</tr>';
    }).join('');
  });

  // Re-render personales tab if it's active
  if(document.getElementById('sa-panel-personales')&&document.getElementById('sa-panel-personales').style.display!=='none'){
    renderMiembrosPersonales();
  }
}

function saDetailLabel(text,html,fullWidth){
  return `<div${fullWidth?' style="grid-column:1/-1"':''}><div style="font-size:11px;color:#6B7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">${text}</div><div style="font-size:13px;font-weight:500">${html}</div></div>`;
}

async function saAddFormacion(memberId){
  var m=S.members.find(x=>Number(x.id)===Number(memberId));
  if(!m) return;
  var pasoId=document.getElementById('sa-form-add-paso-'+memberId)?.value;
  var fecha=document.getElementById('sa-form-add-fecha-'+memberId)?.value;
  if(!pasoId||!fecha){showToast('Seleccioná el Paso y la Fecha','#D97706');return;}
  var paso=S.discPasos.find(p=>String(p.id)===String(pasoId));
  if(!m.formacion) m.formacion=[];
  var yaExiste=m.formacion.find(f=>String(f.pasoId)===String(pasoId)&&f.fuente==='manual');
  if(yaExiste){showToast('Ya existe ese Paso en Formación','#D97706');return;}
  m.formacion.push({pasoId,pasoNombre:paso?paso.nombre:'Paso desconocido',fechaCompletado:fmtAA(fecha),fuente:'manual'});
  await saveK(SK.members,S.members);
  // Re-render formacion tab
  saShowDetail(memberId,null);
  saDetailTab('formacion',document.querySelectorAll('#sa-detail-panel .nav-btn')[2]);
  showToast('✅ Formación agregada','#16A34A');
}

async function saDeleteFormacion(memberId, key){
  var m=S.members.find(x=>Number(x.id)===Number(memberId));
  if(!m||!m.formacion) return;
  if(!confirm('¿Eliminar este paso de Formación?')) return;
  m.formacion=m.formacion.filter(f=>!(f.fuente==='manual'&&(f.pasoId+'_'+f.fechaCompletado)===key));
  await saveK(SK.members,S.members);
  try{
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
  }catch(e){
    console.error('saDeleteFormacion Firebase error:',e);
    showToast('⚠️ Guardado sin sincronizar — verificá tu conexión','#DC2626');
  }
  saShowDetail(memberId,null);
  saDetailTab('formacion',document.querySelectorAll('#sa-detail-panel .nav-btn')[2]);
  showToast('🗑 Eliminado','#DC2626');
}

function saToggleEstadoHistorial(){
  const el=document.getElementById('sa-estado-historial');
  if(el) el.style.display=(el.style.display==='none')?'block':'none';
}
function saDetailTab(tab,btn){
  document.querySelectorAll('#sa-detail-panel .nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  ['generales','personales','formacion','servicio','historial'].forEach(t=>{
    const el=document.getElementById('sa-detail-'+t);
    if(!el) return;
    if(t===tab) el.style.display=(t==='generales'||t==='personales')?'grid':'block';
    else el.style.display='none';
  });
}

function saShowDetail(id,event){
  if(saDetailMemberId===id){saCloseDetail();return;}
  saDetailMemberId=id;
  const mid=Number(id);
  const m=S.members.find(x=>Number(x.id)===mid);
  if(!m) return;
  const g=S.groups.find(x=>Number(x.id)===Number(m.grupoId));
  document.getElementById('sa-detail-name').textContent=fullName(m);

  // ── Tab 1: Datos Generales (institucional) ──
  document.getElementById('sa-detail-generales').innerHTML=
    saDetailLabel('Grupo', g?g.name:'<span style="color:#F59E0B">Sin grupo asignado</span>')
    + `<div><div style="font-size:11px;color:#6B7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Condición</div>${saCondicionBadge(m.condicion)}</div>`
    + `<div><div style="font-size:11px;color:#6B7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Estado</div><span class="badge ${m.estado==='Activo'?'b-ok':m.estado==='Baja'?'b-danger':'b-muted'}">${m.estado||'Activo'}</span></div>`
    + saDetailLabel('Fecha de ingreso', saFmtDate(m.fechaIngreso)||'—')
    + ((m.roles||[]).length?`<div style="grid-column:1/-1"><div style="font-size:11px;color:#6B7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Función</div>${roleChips(m.roles)}</div>`:'')
    + (m.estado==='Baja'?`<div style="grid-column:1/-1"><div style="font-size:11px;color:#DC2626;margin-bottom:4px">Fecha de baja</div><div style="font-size:13px;font-weight:500;color:#DC2626">${saFmtDate(m.fechaBaja||'')}</div></div>`:'')
    + (m.estadoMotivo?`<div style="grid-column:1/-1">
        <div style="font-size:11px;color:#6B7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Motivo (último cambio de estado — ${saFmtDate(m.estadoMotivoFecha||'')})</div>
        <div style="font-size:13px;font-weight:500">${m.estadoMotivo}</div>
        ${(m.estadoHistorial&&m.estadoHistorial.length>1)?`<span style="font-size:12px;color:#1F4E79;cursor:pointer;text-decoration:underline" onclick="saToggleEstadoHistorial()">Ver historial completo (${m.estadoHistorial.length})</span>
        <div id="sa-estado-historial" style="display:none;margin-top:6px;border-top:1px solid #F3F4F6;padding-top:6px">
          ${m.estadoHistorial.slice().reverse().map(h=>`<div style="font-size:12px;color:#4B5563;margin-bottom:4px"><strong>${saFmtDate(h.fecha)}</strong> — ${h.de} → ${h.a}: ${h.motivo}</div>`).join('')}
        </div>`:''}
      </div>`:'');

  // ── Tab 2: Datos Personales (contacto/demográfico) ──
  document.getElementById('sa-detail-personales').innerHTML=
    saDetailLabel('Género', m.genero==='H'?'Hombre':'Mujer')
    + saDetailLabel('Teléfono', m.tel||'—')
    + saDetailLabel('Fecha nacimiento', saFmtDate(m.fnac)||'—')
    + saDetailLabel('Edad', saCalcEdad(m.fnac))
    + saDetailLabel('Barrio / Ciudad', m.dir||'—', true);

  // ── Tabs 3-5: en construcción ──
  // ── Tab 3: Formación ──
  const formacion=m.formacion||[];
  const canAddForm=isSuperAdmin()||canEjecutar('disc_pasos');
  const pasoOpts=S.discPasos.map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('');
  document.getElementById('sa-detail-formacion').innerHTML=`
    <div style="padding:.75rem 0">
      ${formacion.length===0?'<div style="color:#9CA3AF;font-size:13px;padding:4px 0">Sin formación registrada.</div>':''}
      ${formacion.slice().sort((a,b)=>(b.fechaCompletado||'').localeCompare(a.fechaCompletado||'')).map(f=>`
        <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #F3F4F6">
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600;color:#1F4E79">${f.pasoNombre}</div>
            <div style="font-size:11px;color:#6B7280">${fmtAA(f.fechaCompletado)||'—'}</div>
          </div>
          <span style="font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;background:${f.fuente==='auto'?'#D1FAE5':'#E0F2FE'};color:${f.fuente==='auto'?'#065F46':'#0369A1'}">${f.fuente==='auto'?'Auto':'Manual'}</span>
          ${canAddForm&&f.fuente==='manual'?`<button onclick="saDeleteFormacion(${m.id},'${f.pasoId}_${f.fechaCompletado}')" style="background:none;border:none;color:#DC2626;cursor:pointer;font-size:14px">🗑</button>`:''}
        </div>`).join('')}
      ${canAddForm?`
      <div style="margin-top:12px;border-top:1px solid #E5E7EB;padding-top:12px">
        <div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:6px">+ Agregar Paso completado</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <select id="sa-form-add-paso-${m.id}" style="flex:1;padding:6px;border:1px solid #E5E7EB;border-radius:6px;font-size:12px">
            <option value="">— Paso —</option>${pasoOpts}
          </select>
          <input type="date" id="sa-form-add-fecha-${m.id}" style="flex:1;padding:6px;border:1px solid #E5E7EB;border-radius:6px;font-size:12px">
          <button onclick="saAddFormacion(${m.id})" class="btn btn-primary btn-sm">Guardar</button>
        </div>
      </div>`:''}
    </div>`;

  document.getElementById('sa-detail-servicio').innerHTML='<div class="empty" style="padding:1.5rem 0">🤝 Servicio — 🚧 Próximamente</div>';
  document.getElementById('sa-detail-historial').innerHTML='<div class="empty" style="padding:1.5rem 0">📜 Historial — 🚧 Próximamente</div>';

  // Reset to first tab
  saDetailTab('generales', document.querySelector('#sa-detail-panel .nav-btn'));

  const panel=document.getElementById('sa-detail-panel');
  const backdrop=document.getElementById('sa-backdrop');
  // Show centered fixed overlay
  panel.style.position='fixed';
  panel.style.top='50%';
  panel.style.left='50%';
  panel.style.transform='translate(-50%,-50%)';
  panel.style.maxHeight='90vh';
  panel.style.overflowY='auto';
  panel.style.display='block';
  backdrop.style.display='block';
}

function saBuildRoleSelector(selected){
  saSelectedRoles=[...(selected||[])];
  const wrap=document.getElementById('sa-mf-roles');
  if(!wrap) return;
  wrap.innerHTML=S.roles.map(r=>`
    <div class="role-option ${saSelectedRoles.includes(r.id)?'selected':''}" onclick="saToggleRole('${r.id}',this)">
      <span style="width:10px;height:10px;border-radius:50%;background:${r.color};display:inline-block;flex-shrink:0"></span>${r.name}
    </div>`).join('');
}

function saToggleRole(rid,el){
  const idx=saSelectedRoles.indexOf(rid);
  if(idx>=0){saSelectedRoles.splice(idx,1);el.classList.remove('selected');}
  else{saSelectedRoles.push(rid);el.classList.add('selected');}
}

let saSelectedGruposExtra=[];
function saOpenGrupoSelector(){
  const sel=document.getElementById('sa-grupo-selector');
  const view=document.getElementById('sa-grupo-view');
  if(sel) sel.style.display='';
  if(view) view.style.display='none';
  saFilterGrupoOpts('');
}
function saSelectGrupo(gid, gname){
  const inp=document.getElementById('sa-mf-grupo');
  if(inp) inp.value=gid||'';
  const chip=document.getElementById('sa-grupo-chip');
  if(chip){ chip.textContent=gname||'Sin grupo'; chip.style.background=gid?'#DBEAFE':'#F3F4F6'; chip.style.color=gid?'#1E40AF':'#6B7280'; }
  const sel=document.getElementById('sa-grupo-selector');
  if(sel) sel.style.display='none';
  const view=document.getElementById('sa-grupo-view');
  if(view) view.style.display='flex';
  saBuildGruposExtra(saSelectedGruposExtra);
}
function saFilterGrupoOpts(q){
  q=(q||'').toLowerCase();
  const opts=document.getElementById('sa-grupo-opts');
  if(!opts) return;
  const current=parseInt(document.getElementById('sa-mf-grupo')?.value)||null;
  const allGrps=[{id:'',name:'Sin grupo (por asignar)'},...(S.groups||[]),...(S.ngComunidades||[]).map(function(ng){return {id:ng.id,name:'🌱 '+ng.name};})];
  const rows=allGrps.filter(g=>!q||g.name.toLowerCase().includes(q));
  opts.innerHTML=rows.map(g=>{
    const active=Number(g.id)===current||(g.id===''&&!current);
    return `<div onclick="saSelectGrupo('${g.id||''}','${g.name||''}')" style="padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #F9FAFB;background:${active?'#EFF6FF':'#fff'};color:${active?'#1D4ED8':'#374151'};font-weight:${active?'600':'400'}">${g.name}</div>`;
  }).join('');
}
function saBuildGruposExtra(selected){
  saSelectedGruposExtra=(selected||[]).map(Number);
  const wrap=document.getElementById('sa-mf-grupos-extra');
  if(!wrap) return;
  // Default: show only selected groups as chips + an "Agregar" button
  saRenderGruposExtraView();
}
function saRenderGruposExtraView(){
  const wrap=document.getElementById('sa-mf-grupos-extra');
  if(!wrap) return;
  const primaryGid=parseInt(document.getElementById('sa-mf-grupo')?.value)||null;
  // Chips for selected groups
  const chips=saSelectedGruposExtra.map(gid=>{
    const g=S.groups.find(x=>Number(x.id)===gid);
    return g?`<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:#DBEAFE;color:#1E40AF;border-radius:99px;font-size:12px;font-weight:600">${g.name}<span onclick="saRemoveGrupoExtra(${g.id})" style="cursor:pointer;font-size:14px;line-height:1;margin-left:2px;color:#93C5FD">×</span></span>`:'';
  }).join('');
  // Agregar button
  const addBtn=`<button type="button" onclick="saOpenGruposExtraSelector()" style="font-size:12px;color:#6B7280;border:1px solid #E5E7EB;border-radius:6px;padding:3px 10px;background:#F9FAFB;cursor:pointer">+ Agregar</button>`;
  // Selector (hidden by default)
  const availableGroups=S.groups.filter(g=>Number(g.id)!==primaryGid&&!saSelectedGruposExtra.includes(Number(g.id)));
  const selectorHtml=`<div id="sa-grupos-extra-sel" style="display:none;margin-top:6px;border:1px solid #E5E7EB;border-radius:8px;overflow:hidden;max-height:180px;overflow-y:auto">`
    +availableGroups.map(g=>`<div onclick="saAddGrupoExtra(${g.id})" style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #F9FAFB;color:#374151">${g.name}</div>`).join('')
    +(availableGroups.length===0?'<div style="padding:8px 12px;font-size:12px;color:#9CA3AF">No hay más grupos disponibles</div>':'')
    +`</div>`;
  wrap.innerHTML=`<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">${chips}${addBtn}</div>${selectorHtml}`;
}
function saOpenGruposExtraSelector(){
  const sel=document.getElementById('sa-grupos-extra-sel');
  if(sel) sel.style.display=sel.style.display==='none'?'':'none';
}
function saAddGrupoExtra(id){
  id=Number(id);
  if(!saSelectedGruposExtra.includes(id)) saSelectedGruposExtra.push(id);
  saRenderGruposExtraView();
}
function saRemoveGrupoExtra(id){
  saSelectedGruposExtra=saSelectedGruposExtra.filter(x=>x!==Number(id));
  saRenderGruposExtraView();
}
function saToggleGrupoExtra(gid,el){
  gid=Number(gid);
  const idx=saSelectedGruposExtra.indexOf(gid);
  if(idx>=0){saSelectedGruposExtra.splice(idx,1);el.classList.remove('selected');}
  else{saSelectedGruposExtra.push(gid);el.classList.add('selected');}
}

function saOpenNewMember(){
  saEditingMemberId=null;
  document.getElementById('sa-mf-title').textContent='Nueva persona';
  ['sa-mf-nombre','sa-mf-apellido','sa-mf-tel','sa-mf-dir'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const fnac=document.getElementById('sa-mf-fnac');if(fnac)fnac.value='';
  const dniReset=document.getElementById('sa-mf-dni');if(dniReset)dniReset.value='';
  document.getElementById('sa-mf-genero').value='H';
  document.getElementById('sa-mf-condicion').value='Asistente';
  document.getElementById('sa-mf-estado').value='Activo';
  const grpSel=document.getElementById('sa-mf-grupo');
