let saOriginalEstado='Activo';
function saCheckEstadoChange(){
  const sel=document.getElementById('sa-mf-estado');
  const row=document.getElementById('sa-mf-motivo-row');
  if(!sel||!row) return;
  if(sel.value!==saOriginalEstado) row.style.display='block';
  else row.style.display='none';
}

function saEditMember(id){
  const m=S.members.find(x=>Number(x.id)===Number(id));
  if(!m){alert('Miembro no encontrado (id='+id+')');return;}
  saEditingMemberId=id;
  document.getElementById('sa-mf-title').textContent='Editar — '+fullName(m);
  document.getElementById('sa-mf-nombre').value=m.nombre;
  document.getElementById('sa-mf-apellido').value=m.apellido;
  document.getElementById('sa-mf-genero').value=m.genero;
  // Set grupo chip
  const _grpObj=S.groups.find(g=>Number(g.id)===Number(m.grupoId));
  saSelectGrupo(m.grupoId||'', _grpObj?_grpObj.name:'Sin grupo');
  document.getElementById('sa-mf-condicion').value=m.condicion||'Asistente';
  saOriginalEstado=m.estado==='Baja'?'Baja':'Activo';
  document.getElementById('sa-mf-estado').value=saOriginalEstado;
  document.getElementById('sa-mf-tel').value=m.tel||'';
  document.getElementById('sa-mf-dir').value=m.dir||'';
  const fnac=document.getElementById('sa-mf-fnac');if(fnac)fnac.value=m.fnac?fmtAA(m.fnac):'';
  const dniEl=document.getElementById('sa-mf-dni');if(dniEl)dniEl.value=m.dni||'';
  saBuildRoleSelector(m.roles||[]);
  saBuildGruposExtra(m.grupoIds||[]);
  // Motivo: oculto hasta que cambien el Estado
  const motivoRow=document.getElementById('sa-mf-motivo-row');
  const motivoInput=document.getElementById('sa-mf-motivo');
  if(motivoRow) motivoRow.style.display='none';
  if(motivoInput) motivoInput.value='';
  // Fecha de ingreso: solo visible/editable para Super Admin
  const fiRow=document.getElementById('sa-mf-fechaingreso-row');
  const fiInput=document.getElementById('sa-mf-fechaingreso');
  if(fiRow&&fiInput){
    if(isSuperAdmin()){
      fiRow.style.display='block';
      fiInput.value=m.fechaIngreso?fmtAA(m.fechaIngreso):'';
    } else {
      fiRow.style.display='none';
    }
  }
  saCloseDetail();
  const overlay=document.getElementById('sa-member-modal-overlay');
  overlay.style.display='flex';
}

async function saSaveMember(){
  const nombre=document.getElementById('sa-mf-nombre').value.trim();
  const apellido=document.getElementById('sa-mf-apellido').value.trim();
  if(!nombre){alert('Ingresá el nombre');return;}

  const nuevoEstado=document.getElementById('sa-mf-estado').value;
  const estadoCambio=nuevoEstado!==saOriginalEstado;
  let motivo='';
  if(estadoCambio){
    motivo=(document.getElementById('sa-mf-motivo')?.value||'').trim();
    if(motivo.length<10){
      alert('Para cambiar el Estado, indicá un Motivo de al menos 10 caracteres.');
      return;
    }
  }

  const primaryGid=document.getElementById('sa-mf-grupo').value?parseInt(document.getElementById('sa-mf-grupo').value):null;
  const data={
    nombre,apellido,
    genero:document.getElementById('sa-mf-genero').value,
    grupoId:primaryGid,
    grupoIds:saSelectedGruposExtra.filter(gid=>gid!==primaryGid),
    condicion:document.getElementById('sa-mf-condicion').value,
    estado:nuevoEstado,
    tel:document.getElementById('sa-mf-tel').value.trim(),
    dir:document.getElementById('sa-mf-dir').value.trim(),
    fnac:(function(){
      var v=document.getElementById('sa-mf-fnac')?.value||'';
      if(v&&!validarFnac(v)){markFieldError(document.getElementById('sa-mf-fnac'),'Usá el formato dd/mm/aa (ej: 15/03/90)');alert('Fecha de nacimiento inválida. Usá el formato dd/mm/aa (ej: 15/03/90)');return '__INVALID__';}
      return v;
    })(),
    roles:[...saSelectedRoles],
    dni:(document.getElementById('sa-mf-dni')?.value||'').trim(),
    _ts:Date.now()
  };
  // Fecha de ingreso: solo Super Admin puede modificarla
  if(isSuperAdmin()){
    const fiInput=document.getElementById('sa-mf-fechaingreso');
    if(fiInput) data.fechaIngreso=fiInput.value||'';
  }

  if(data.fnac==='__INVALID__') return; // fnac inválido — alert ya mostrado
  data.fnac=data.fnac||'';
  let target;
  if(saEditingMemberId){
    target=S.members.find(x=>Number(x.id)===Number(saEditingMemberId));
    if(target) Object.assign(target,data);
  } else {
    target={id:Date.now(),...data};
    S.members.push(target);
  }

  // Registrar el cambio de estado en el historial
  if(estadoCambio&&target){
    target.estadoHistorial=target.estadoHistorial||[];
    target.estadoHistorial.push({
      fecha:new Date().toISOString().slice(0,10),
      de:saOriginalEstado,
      a:nuevoEstado,
      motivo
    });
    target.estadoMotivo=motivo;
    target.estadoMotivoFecha=new Date().toISOString().slice(0,10);
    if(nuevoEstado==='Baja') target.fechaBaja=new Date().toISOString().slice(0,10);
  }

  await saveK(SK.members,S.members);
  try{
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
  }catch(e){
    // Firebase failed — don't close the form
    const errMsg='No se pudo guardar en la nube. Verificá tu conexión e intentá de nuevo.';
    alert(errMsg);
    // Restore the original member data in memory so nothing is half-saved
    return;
  }
  // Only reach here if Firebase confirmed
  saCloseMemberForm();
  renderMiembrosStandalone();
  showToast('✅ Guardado','#16A34A');
}

async function saDeleteMember(id){
  const m=S.members.find(x=>Number(x.id)===Number(id));
  if(!m) return;
  if(!confirm('¿Eliminar definitivamente a '+fullName(m)+'? Esta acción no se puede deshacer.')) return;
  S.members=S.members.filter(x=>Number(x.id)!==Number(id));
  await saveK(SK.members,S.members);
  try{
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
  }catch(e){
    S.members.push(m); // revert
    await saveK(SK.members,S.members);
    alert('No se pudo eliminar en la nube. Verificá tu conexión.');
    return;
  }
  saCloseDetail();
  renderMiembrosStandalone();
  showToast('🗑️ Eliminado','#DC2626');
}

async function saDarDeBaja(id){
  const m=S.members.find(x=>x.id===id);
  if(!m) return;
  var motivo=prompt('Motivo de baja para '+fullName(m)+' (mínimo 10 caracteres):','');
  if(motivo===null) return; // cancelled
  if(!motivo||motivo.trim().length<10){
    alert('El motivo de baja es obligatorio y debe tener al menos 10 caracteres.');
    return;
  }
  const hoy=new Date().toISOString().split('T')[0];
  Object.assign(m,{estado:'Baja',fechaBaja:hoy,motivoBaja:motivo.trim()});
  await saveK(SK.members,S.members);
  saCloseDetail();
  renderMiembrosStandalone();
}

async function saReactivar(id){
  const m=S.members.find(x=>x.id===id);
  if(!m) return;
  if(!confirm(`¿Reactivar a ${fullName(m)}?`)) return;
  Object.assign(m,{estado:'Activo',fechaBaja:''});
  await saveK(SK.members,S.members);
  renderMiembrosStandalone();
}

function saCloseMemberForm(){
  document.getElementById('sa-member-modal-overlay').style.display='none';
  saEditingMemberId=null;
}

  // plain string check used in buildPublicActualizarForm.
  await saveK('gdv_qr_actualizar', !!enabled);
  try{
    if(typeof window.fbUpload==='function') await window.fbUpload(true);

    console.error('cfgToggleQrActualizar Firebase error:',e);
    showToast('⚠️ Guardado sin sincronizar — verificá tu conexión','#DC2626');
  }
  const label=document.getElementById('cfg-qr-actualizar-label');
  if(label) label.textContent=enabled?'Habilitado':'Inhabilitado';
}

async function ngSaveComunidad(){
  const nombre=(document.getElementById('ng-f-nombre')?.value||'').trim();
  const tipo=document.getElementById('ng-f-tipo')?.value||'';
  const dia=document.getElementById('ng-f-dia')?.value||'';
  const horario=document.getElementById('ng-f-horario')?.value||'';
  if(!nombre||!tipo){ alert('Completá Nombre y Tipo'); return; }
  var l1=document.getElementById('ng-f-lider1')?.value||'';
  var l2=document.getElementById('ng-f-lider2')?.value||'';
  var c1=document.getElementById('ng-f-colab1')?.value||'';
  var c2=document.getElementById('ng-f-colab2')?.value||'';
  var liderIds=[l1,l2].filter(function(x){return x&&x!=='';}).map(Number);
  var colaboradorIds=[c1,c2].filter(function(x){return x&&x!=='';}).map(Number);
  if(ngEditingId){
    var ng=S.ngComunidades.find(function(x){return Number(x.id)===Number(ngEditingId);});
    if(ng){ Object.assign(ng,{name:nombre,tipo,dia,horario,liderIds,colaboradorIds}); }
  } else {
    S.ngComunidades.push({id:Date.now(),name:nombre,tipo,dia,horario,
      liderIds,colaboradorIds,estado:'Activo'});
  }
  await saveK(SK.ngComunidades, S.ngComunidades);
  try{
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
  }catch(e){
    alert('No se pudo guardar en la nube. Verificá tu conexión.');
    return;
  }
  ngCloseForm();
  ngRenderList();
  showToast('✅ Comunidad guardada','#16A34A');
}

async function ngDeleteComunidad(id){
  var ng=S.ngComunidades.find(function(x){return Number(x.id)===Number(id);});
  if(!ng) return;
  // Check for members using this community as group
  var withMembers=S.members.filter(function(m){
    return Number(m.grupoId)===Number(id)||(m.grupoIds||[]).map(Number).includes(Number(id));
  });
  if(withMembers.length>0){
    alert('La comunidad "'+ng.name+'" tiene '+withMembers.length+' miembro'+(withMembers.length>1?'s':'')+' asignado'+(withMembers.length>1?'s':'')+'. Quitálos antes de eliminarla.');
    return;
  }
  if(!confirm('¿Eliminar la comunidad "'+ng.name+'"? Esta acción no se puede deshacer.')) return;
  S.ngComunidades=S.ngComunidades.filter(function(x){return Number(x.id)!==Number(id);});
  try{
    await saveK(SK.ngComunidades,S.ngComunidades);
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
    ngRenderList();
    showToast('✅ Comunidad eliminada','#16A34A');
  }catch(e){
    S.ngComunidades.push(ng);
    alert('No se pudo eliminar. Verificá tu conexión.');
  }
}

let cfgEditingGroupId=null;

async function cfgDeleteGroup(id){
  var g=(S.groups||[]).find(function(x){ return Number(x.id)===Number(id); });
  if(!g) return;
  // Check for members in this group
  var miembros=S.members.filter(function(m){
    return m.estado!=='Baja' && (Number(m.grupoId)===Number(id)||(m.grupoIds||[]).map(Number).includes(Number(id)));
  });
  if(miembros.length>0){
    alert('El Grupo "'+g.name+'" tiene '+miembros.length+' miembro'+(miembros.length>1?'s':'')+' activo'+(miembros.length>1?'s':'')+'. Quitá todos los miembros del grupo antes de eliminarlo.');
    return;
  }
  // Check for facilitators
  if(g.facId||g.facId2){
    alert('El Grupo "'+g.name+'" tiene facilitadores asignados. Quitá los facilitadores en "Editar" antes de eliminarlo.');
    return;
  }
  // Confirm deletion
  if(!confirm('¿Eliminár el Grupo "'+g.name+'"? Esta acción no se puede deshacer.')) return;
  // Delete
  S.groups=S.groups.filter(function(x){ return Number(x.id)!==Number(id); });
  try{
    await saveK(SK.groups, S.groups);
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
    cfgRenderGrupos();
    showToast('✅ Grupo "'+g.name+'" eliminado','#16A34A');
  }catch(e){
    // Revert on failure
    S.groups.push(g);
    alert('No se pudo eliminar en la nube. Verificá tu conexión e intentá de nuevo.');
  }
}

async function cfgSaveGroup(){
  const name=document.getElementById('cfg-gf-name').value.trim();
  if(!name){alert('Ingresá un nombre');return;}
  const type=document.getElementById('cfg-gf-gender').value;
  const facId=parseInt(document.getElementById('cfg-gf-fac')?.value)||null;
  const facId2=parseInt(document.getElementById('cfg-gf-fac2')?.value)||null;
  const dia=document.getElementById('cfg-gf-dia')?.value||'';
  const horario=document.getElementById('cfg-gf-horario')?.value||'';

  if(cfgEditingGroupId){
    const g=S.groups.find(x=>x.id===cfgEditingGroupId);
    // If facilitador changed, remove 'facilitador' role from old one
    if(g.facId && g.facId!==facId){
      const oldFac=S.members.find(m=>m.id===g.facId);
      if(oldFac) oldFac.roles=(oldFac.roles||[]).filter(r=>r!=='facilitador');
    }
    Object.assign(g,{name,type,facId,facId2,dia,horario});
  } else {
    S.groups.push({id:Date.now(),name,type,facId,facId2,dia,horario,miembros:[]});
  }

  // Assign 'facilitador' role to selected member
  if(facId){
    const fac=S.members.find(m=>m.id===facId);
    if(fac && !(fac.roles||[]).includes('facilitador')){
      fac.roles=[...(fac.roles||[]),'facilitador'];
    }
  }

  await saveK(SK.groups,S.groups);
  await saveK(SK.members,S.members);
  try{
    await saveK(SK.groups, S.groups);
    await saveK(SK.members, S.members);
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
  }catch(e){
    alert('No se pudo guardar en la nube. Verificá tu conexión e intentá de nuevo.');
    return;
  }
  cfgCloseGroupForm();
  cfgRenderGrupos();
  showToast('✅ Grupo guardado','#16A34A');
}

  var m=document.getElementById('cfg-group-modal');
  if(m) m.style.display='none';
  cfgEditingGroupId=null;
}

      .filter(m=>m.estado!=='Baja'&&!existingNames.includes(fullName(m).toLowerCase()))

        opt.textContent=fullName(m)+(mGrp?' — '+mGrp.name:'');

  const wrap=document.getElementById('cfg-users-list');

  wrap.innerHTML=S.users.map(u=>{

    let linkedMember=null;

async function cfgSaveUser(){
  const name=document.getElementById('cfg-uf-name').value.trim();
  const user=document.getElementById('cfg-uf-user').value.trim();
  const pass=document.getElementById('cfg-uf-pass').value;
  const role=document.getElementById('cfg-uf-role').value;
  const groupId=parseInt(document.getElementById('cfg-uf-group')?.value)||null;
  const memberIdVal=parseInt(document.getElementById('cfg-uf-member')?.value)||null;
  if(!name||!user||!pass){alert('Completá todos los campos');return;}
  if(cfgEditingUserId){
    const existing=S.users.find(x=>Number(x.id)===Number(cfgEditingUserId));
    if(!existing){alert('Error: usuario no encontrado');return;}
    // Keep existing memberId when editing (member is read-only)
    Object.assign(existing,{name,user,pass,role,groupId,memberId:existing.memberId||memberIdVal});
    // Sincronizar rol con S.members para que se vea en Rebaños
    var memberId=existing.memberId||memberIdVal;
    if(memberId){
      var mem=S.members.find(function(m){return Number(m.id)===Number(memberId);});
      if(mem){
        var roles=mem.roles||[];
        // Quitar roles de usuario previos y agregar el nuevo
        var userRoleIds=S.roles.map(function(r){return r.id;});
        roles=roles.filter(function(r){return !userRoleIds.includes(r);});
        if(role) roles.push(role);
        mem.roles=roles;
        mem._ts=Date.now();
      }
    }
  } else {
    var newUser={id:Date.now(),name,user,pass,role,groupId,memberId:memberIdVal};
    S.users.push(newUser);
    // Sincronizar rol con S.members para que se vea en Rebaños
    if(memberIdVal){
      var mem=S.members.find(function(m){return Number(m.id)===Number(memberIdVal);});
      if(mem){
        var roles=mem.roles||[];
        var userRoleIds=S.roles.map(function(r){return r.id;});
        roles=roles.filter(function(r){return !userRoleIds.includes(r);});
        if(role) roles.push(role);
        mem.roles=roles;
        mem._ts=Date.now();
      }
    }
  }
  await saveK(SK.users,S.users);
  await saveK(SK.members,S.members);
  try{
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
  }catch(e){
    console.error('cfgSaveUser Firebase error:',e);
    showToast('⚠️ Guardado sin sincronizar — verificá tu conexión','#DC2626');
  }
  try{if(typeof window.syncNow==="function")window.syncNow();}catch(_e){}
  cfgCloseUserForm();cfgRenderUsuarios();
}
async function cfgDeleteUser(id){
  if(!confirm('¿Eliminar este usuario?'))return;
  S.users=S.users.filter(u=>u.id!==id);
  await saveK(SK.users,S.users);cfgRenderUsuarios();
  try{
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
  }catch(e){
    console.error('cfgDeleteUser Firebase error:',e);
    showToast('⚠️ Guardado sin sincronizar — verificá tu conexión','#DC2626');
  }
}

function gdvTab(id,btn){
  try{
    var navBtns=document.querySelectorAll('#gdv-nav .nav-btn');
    navBtns.forEach(function(b){b.classList.remove('active');});
    if(btn) btn.classList.add('active');

    var allTabs=['dashboard','cargar','registros','config','mihistorial'];
    allTabs.forEach(function(t){
      var el=document.getElementById('gdv-tab-'+t);
      if(el) el.style.display=(t===id)?'block':'none';
    });

    if(id==='dashboard') gdvRenderDashboard();
    else if(id==='cargar') gdvInitFacForm();
    else if(id==='registros') gdvRenderRegistros();
    else if(id==='mihistorial') gdvRenderMyHistory();
  }catch(e){console.error('gdvTab error:',e);}
}

function gdvConfigTab(sub,btn){
  document.querySelectorAll('[id^="cfg-btn-"]').forEach(b=>{b.className='btn btn-sm';});
  if(btn){btn.className='btn btn-primary btn-sm';}
  const wrap=document.getElementById('gdv-config-content');
  if(!wrap) return;
  if(sub==='miembros'){
    wrap.innerHTML=gdvMiembrosHTML();
    gdvRenderMiembros();
  } else if(sub==='grupos'){
    wrap.innerHTML=gdvGruposHTML();
    gdvRenderGrupos();
  } else if(sub==='usuarios'){
    wrap.innerHTML=gdvUsuariosHTML();
    gdvRenderUsuarios();
  } else if(sub==='roles'){
    wrap.innerHTML=gdvRolesHTML();
    gdvRenderRoles();
  }
}

function gdvCheckPendingWeeks(grupoId){
  var alert=document.getElementById('gdv-pending-alert');
  if(!alert) return;

  // Get last record date for this group
  var groupRecs=S.records.filter(function(r){return r.grupoId===grupoId;});
  if(!groupRecs.length){
    alert.style.display='none';
    return;
  }

  // Find most recent record
  var lastRec=groupRecs.sort(function(a,b){return b.fecha.localeCompare(a.fecha);})[0];
  var lastFecha=new Date(lastRec.fecha);
  var lastWeek=getISOWeek(lastRec.fecha);

  // Current week
  var hoy=new Date();
  var thisWeek=getISOWeek(dateToStr(hoy));
  var weeksDiff=thisWeek-lastWeek;

  // Adjust for year boundary
  if(hoy.getFullYear()>lastFecha.getFullYear()) weeksDiff+=52;

  if(weeksDiff>1){
    // Has pending weeks
    var pendingWeek=lastWeek+1;
    // Calculate the date for that pending week (Monday)
    var pendingDate=new Date(lastFecha);
    pendingDate.setDate(pendingDate.getDate()+7);
    var pendingStr=dateToStr(pendingDate);

    alert.style.display='block';
    alert.innerHTML='⚠️ <strong>Tenés '+( weeksDiff-1)+' semana'+(weeksDiff-1>1?'s':'')+' sin registrar.</strong> '+
      'Cargá primero la Semana '+pendingWeek+' antes de la semana actual. '+
      '<button class="btn btn-sm" style="margin-left:8px;font-size:11px" onclick="gdvSetPendingDate(\'' + pendingStr + '\')">'+
      '&#8594; Ir a Semana ' + pendingWeek + '</button>';

    // Auto-set date to the pending week
    var fechaInput=document.getElementById('gdv-fecha');
    if(fechaInput&&!fechaInput.value){
      fechaInput.value=pendingStr;
    }
  } else {
    alert.style.display='none';
  }
}

function gdvSetPendingDate(fecha){
  var input=document.getElementById('gdv-fecha');
  if(input) input.value=fecha;
  document.getElementById('gdv-pending-alert').style.display='none';
}

function gdvCheckDuplicateWeek(gid){
  var alert=document.getElementById('gdv-duplicate-alert');
  if(!alert) return;
  var fecha=document.getElementById('gdv-fecha')?.value;
  if(!gid||!fecha){alert.style.display='none';return;}
  var semana=getISOWeek(fecha);
  var anio=new Date(fecha).getFullYear();
  var existe=S.records.find(function(r){
    if(r.grupoId!==gid) return false;
    return getISOWeek(r.fecha)===semana && new Date(r.fecha).getFullYear()===anio;
  });
  if(existe){
    alert.style.display='block';
    var msg=isSuperAdmin()

function gdvInitFacForm(){

  try {
  const fechaInput=document.getElementById('gdv-fecha');
  const hoy=today();
  // Max = today, Min = 14 days ago
  const minDate=new Date();
  minDate.setDate(minDate.getDate()-14);
  const minStr=minDate.toISOString().split('T')[0];
  if(fechaInput){
    fechaInput.max=hoy;
    fechaInput.min=minStr;
    fechaInput.value=hoy;
  }
  gdvFacAtt={};gdvVisitsOther=[];gdvVisitsNew=[];
  // Reset sin encuentro
  const chk=document.getElementById('gdv-sin-encuentro');
  if(chk){chk.checked=false;}
  const mw=document.getElementById('gdv-motivo-wrap');
  if(mw){mw.style.display='none';}
  const ac=document.getElementById('gdv-asistencia-card');
  if(ac){ac.style.opacity='1';ac.style.pointerEvents='auto';}
  const mot=document.getElementById('gdv-motivo');
  if(mot){mot.value='';}
  gdvRenderVisitTags();
  if(isGdVAdmin()){
    const sel=document.getElementById('gdv-grupo-sel');
    if(sel){
      sel.innerHTML='<option value="">— Elegir grupo —</option>'+S.groups.map(g=>`<option value="${g.id}">${g.name} (${g.type})</option>`).join('');
      document.getElementById('gdv-admin-sel').classList.remove('hidden');
    }
    document.getElementById('gdv-group-info').textContent='Seleccioná un grupo para cargar su asistencia.';
    document.getElementById('gdv-members').innerHTML='';
  } else {
    const facGids=getFacilitadorGroupIds();
    const adminSel=document.getElementById('gdv-admin-sel');
    if(facGids.length>1){
      // Multiple groups assigned: show a small selector limited to those groups
      const sel=document.getElementById('gdv-grupo-sel');
      if(sel){
        sel.innerHTML='<option value="">— Elegí tu grupo —</option>'+S.groups.filter(g=>facGids.includes(Number(g.id))).map(g=>`<option value="${g.id}">${g.name} (${g.type})</option>`).join('');
        if(adminSel) adminSel.classList.remove('hidden');
      }
      document.getElementById('gdv-group-info').textContent='Tenés varios grupos asignados — elegí cuál cargar.';
      document.getElementById('gdv-members').innerHTML='';
    } else {
      if(adminSel) adminSel.classList.add('hidden');
      const facGid=facGids[0]||null;
      const g=S.groups.find(x=>Number(x.id)===facGid);
      const members=g?groupMembers(g.id):[];
      document.getElementById('gdv-group-info').textContent=g?`${g.name} — ${members.length} miembros activos`:'Sin grupo asignado. Verificá la configuración.';
      members.forEach(m=>{gdvFacAtt[m.id]={name:fullName(m),genero:m.genero,state:'ausente'};});
      gdvRenderFacMembers(members);
      // Chequear duplicado con la fecha por defecto (hoy)
      if(facGid) gdvCheckDuplicateWeek(facGid);
      if(facGid) gdvCheckPendingWeeks(facGid);
    }
  }
  }catch(err){
    var tab=document.getElementById('gdv-tab-cargar');
    if(tab) tab.innerHTML='<div class="card" style="background:#FEF2F2;padding:1rem;color:#DC2626"><b>Error en Cargar:</b> '+err.message+'<br><small>'+err.stack+'</small></div>';
    console.error('gdvInitFacForm error:',err);
  }
}

function gdvAutoComplete(type, query){
  const dropdown=document.getElementById('gdv-ac-'+type);
  if(!dropdown) return;
  if(query.length<2){dropdown.style.display='none';return;}

  // Get already added names to exclude
  const added=type==='other'?gdvVisitsOther:gdvVisitsNew;

  // For 'new': only show members with grupoId=null (truly without a group)
  // For 'other': show members from OTHER groups
  let pool=S.members.filter(function(m){ return m.estado!=='Baja'; });
  if(type==='other'){
    // Visitas de otro grupo: excluir miembros del grupo actual (por grupoId principal O grupoIds adicionales)
    const curGrupo=parseInt(document.getElementById('gdv-grupo-sel')?.value)||currentUser.groupId||null;
    if(curGrupo){
      pool=pool.filter(function(m){
        const allGids=[m.grupoId,...(m.grupoIds||[])].filter(Boolean).map(Number);
        return !allGids.includes(Number(curGrupo));
      });
    }
    // Super Admin y facilitadores sin grupo propio: mostrar todos
  } else if(type==='new'){
    // Personas Nuevas: solo condición Nuevo O sin grupo GdV asignado
    pool=pool.filter(function(m){
      const sinGrupo=!m.grupoId&&!(m.grupoIds||[]).length;
      return m.condicion==='Nuevo'||sinGrupo;
    });
  }

  const q=query.toLowerCase();
  const results=pool.filter(function(m){
    return fullName(m).toLowerCase().includes(q) && !added.includes(fullName(m));
  }).slice(0,8);

  if(!results.length){
    if(type==='new'){
      var msg=q.length>1
        ?'No encontrado sin grupo asignado. Si ya tiene grupo, cargalo como Visita. Si es nuevo, registralo abajo.'
        :'Escribí el nombre para buscar...';
      dropdown.innerHTML='<div style="padding:10px 12px;font-size:13px;color:#9CA3AF">'+msg+'</div>';
      dropdown.style.display='block';
    } else {
      dropdown.style.display='none';
    }
    return;
  }

  dropdown.innerHTML=results.map(function(m){
    const g=S.groups.find(function(x){return x.id===m.grupoId;});
    var safeName=fullName(m).replace(/'/g,"&#39;");
    return '<div class="gdv-ac-item" data-type="'+type+'" data-name="'+safeName.replace(/"/g,'&quot;')+'" onpointerdown="event.preventDefault();gdvPickAC(this)" ontouchstart="event.preventDefault();gdvPickAC(this)">' +
      '<span style="font-weight:600">'+fullName(m)+'</span><br>' +
      '<span style="font-size:11px;color:#6B7280">'+(g?g.name:'Sin grupo')+'</span>' +
      '</div>';
  }).join('');
  dropdown.style.display='block';
}

async function gdvSaveRecord(){
  const facGids=isGdVFacilitador()?getFacilitadorGroupIds():[];
  let gid=facGids.length===1?facGids[0]:currentUser.groupId;
  if(isGdVAdmin()||facGids.length>1){const sel=document.getElementById('gdv-grupo-sel');if(sel)gid=parseInt(sel.value)||null;}
  const g=S.groups.find(x=>x.id===gid);
  const fecha=document.getElementById('gdv-fecha').value;
  if(!g||!fecha){alert('Seleccioná grupo y fecha');return;}
  const sinEncuentro=document.getElementById('gdv-sin-encuentro')?.checked||false;
  const motivo=document.getElementById('gdv-motivo')?.value.trim()||'';
  // Validate date range
  const hoyStr=today();
  const minDate=new Date(); minDate.setDate(minDate.getDate()-14);
  const minStr=minDate.toISOString().split('T')[0];
  if(fecha>hoyStr){alert('No podés cargar una fecha futura. La fecha máxima es hoy ('+hoyStr+').');return;}
  if(fecha<minStr){alert('No podés cargar fechas de más de 14 días atrás. La fecha mínima es '+minStr+'.');return;}

  // ── Control de semanas pendientes — no se puede saltear ──
  if(!isSuperAdmin()){
    var groupRecs=S.records.filter(function(r){return r.grupoId===gid;});
    if(groupRecs.length>0){
      var lastRec=groupRecs.sort(function(a,b){return b.fecha.localeCompare(a.fecha);})[0];
      var lastWeekNum=getISOWeek(lastRec.fecha);
      var lastYear=new Date(lastRec.fecha).getFullYear();
      var fechaWeekNum=getISOWeek(fecha);
      var fechaYear=new Date(fecha).getFullYear();
      // Calcular diferencia de semanas
      var weeksDiff=(fechaYear-lastYear)*52+(fechaWeekNum-lastWeekNum);
      if(weeksDiff>1){
        var pendingWeek=lastWeekNum+1;
        alert('⚠️ Tenés semanas sin registrar. Debés cargar primero la Semana '+pendingWeek+' antes de poder cargar esta fecha. Usá el botón "→ Ir a Semana '+pendingWeek+'" del aviso naranja.');
        return;
      }
    }
  }

  // ── Control de duplicados por semana ──
  const semanaFecha=getISOWeek(fecha);
  const anioFecha=new Date(fecha).getFullYear();
  const yaExiste=S.records.find(function(r){
    if(r.grupoId!==gid) return false;
    const sem=getISOWeek(r.fecha);
    const anio=new Date(r.fecha).getFullYear();
    return sem===semanaFecha && anio===anioFecha;
  });
  if(yaExiste){
    alert('Ya existe un registro para la Semana '+semanaFecha+'.');
    return;
  }

  if(!sinEncuentro&&!Object.keys(gdvFacAtt).length){alert('El grupo no tiene miembros cargados');return;}
  const rec={id:Date.now(),grupoId:g.id,grupoName:g.name,groupType:g.type,
    facId:currentUser.id,facName:currentUser.name,fecha,
    sinEncuentro,motivo,
    asistencia:sinEncuentro?{}:{...gdvFacAtt},
    visitsOther:sinEncuentro?[]:[...gdvVisitsOther],
    visitsNew:sinEncuentro?[]:[...gdvVisitsNew],
    ts:new Date().toISOString(),
    _ts:Date.now()};
  S.records.push(rec);
  await saveK(SK.records,S.records);
  // Upload records to Firebase — block if fails
  try{
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
  }catch(e){
    const al2=document.getElementById('gdv-fac-alert');
    if(al2){ al2.textContent='❌ Error al guardar en la nube. Verificá tu red e intentá de nuevo.'; al2.classList.remove('hidden'); }
    return; // don't show success, don't reset form
  }

  // ── Auto-assign group to "Nuevos" so they appear in next encounter ──
  var membersUpdated=false;
  gdvVisitsNew.forEach(function(nombre){
    var m=S.members.find(function(x){
      return fullName(x).toLowerCase()===nombre.toLowerCase();
    });
    if(m&&!m.grupoId){
      m.grupoId=gid; // Assign to this group
      membersUpdated=true;
    }
  });
  if(membersUpdated) await saveK(SK.members,S.members);

  const al=document.getElementById('gdv-fac-alert');
  al.textContent=sinEncuentro
    ?`⏸ Encuentro del ${fmt(fecha)} registrado como Sin encuentro.`
    :`✅ Asistencia del ${fmt(fecha)} guardada correctamente.`;
  al.style.background=sinEncuentro?'#FEF3C7':'';
  al.style.color=sinEncuentro?'#92400E':'';
  al.style.border=sinEncuentro?'1px solid #FCD34D':'';
  al.classList.remove('hidden');
  setTimeout(()=>{al.classList.add('hidden');al.style='';},4000);
  if(isGdVAdmin()&&document.getElementById('gdv-grupo-sel'))document.getElementById('gdv-grupo-sel').value='';
  gdvInitFacForm();
}

function gdvRenderMyHistory(){
  const myGids=getFacilitadorGroupIds();
  // Date filter - default last 30 days
  const hastaEl=document.getElementById('gdv-hist-hasta');
  const desdeEl=document.getElementById('gdv-hist-desde');
  if(hastaEl&&!hastaEl.value) hastaEl.value=new Date().toISOString().slice(0,10);
  if(desdeEl&&!desdeEl.value){
    const d30=new Date(); d30.setDate(d30.getDate()-30);
    desdeEl.value=d30.toISOString().slice(0,10);
  }
  const fd=desdeEl?.value||'';
  const fh=hastaEl?.value||'';
  let recs=S.records.filter(r=>myGids.includes(Number(r.grupoId)));
  if(fd) recs=recs.filter(r=>r.fecha>=fd);
  if(fh) recs=recs.filter(r=>r.fecha<=fh);
  recs=recs.sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const wrap=document.getElementById('gdv-my-hist');
  if(!wrap) return;
  if(!recs.length){wrap.innerHTML='<div class="empty">Sin registros en el período.</div>';gdvRenderFacChart([]);return;}
  wrap.innerHTML=recs.map(r=>{
    if(r.sinEncuentro) return `<div class="row" style="cursor:pointer;padding:10px 4px;border-bottom:1px solid #F3F4F6;opacity:.6" onclick="gdvShowHistDetail('${r.id}')">
      <span style="font-weight:600">${fmt(r.fecha)}</span>
      <span style="font-size:13px;color:#92400E;flex:1;margin-left:12px">⏸ Sin encuentro</span>
    </div>`;
    const att=Object.values(r.asistencia);
    const pre=att.filter(v=>v.state==='presente').length;
    const p=pct(pre,att.length);
    return `<div class="row" style="cursor:pointer;padding:10px 4px;border-bottom:1px solid #F3F4F6" onclick="gdvShowHistDetail('${r.id}')">
      <span style="font-weight:600;min-width:90px">${fmt(r.fecha)}</span>
      <span style="flex:1;font-size:13px;margin-left:8px">${pre}/${att.length} presentes</span>
      <span class="badge ${p>=70?'b-ok':'b-muted'}">${p}%</span>
    </div>`;
  }).join('');
  gdvRenderFacChart(recs);
}

function gdvRenderFacChart(recs){
  const canvas=document.getElementById('gdv-chart-fac');
  if(!canvas||typeof Chart==='undefined') return;
  const data=recs.filter(r=>!r.sinEncuentro).reverse();
  if(!data.length){canvas.parentElement.style.display='none';return;}
  canvas.parentElement.style.display='block';
  if(window._facChart) window._facChart.destroy();
  window._facChart=new Chart(canvas,{
    type:'line',
    data:{
      labels:data.map(r=>fmt(r.fecha)),
      datasets:[{
        label:'Presentes',
        data:data.map(r=>Object.values(r.asistencia).filter(v=>v.state==='presente').length),
        borderColor:'#1F4E79',backgroundColor:'rgba(31,78,121,.1)',
        tension:.3,fill:true,pointRadius:4
      }]
    },
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}
  });
}

  gdvFilDesde=desde; gdvFilHasta=hasta;
  const d=document.getElementById('gdv-fil-desde');const h=document.getElementById('gdv-fil-hasta');
  if(d)d.value=desde;if(h)h.value=hasta;
  const sx=document.getElementById('gdv-fil-sexo');if(sx)sx.value='';
  document.querySelectorAll('.gdv-g-cb').forEach(cb=>cb.checked=true);
  const allCb=document.getElementById('gdv-fil-all-grupos');if(allCb)allCb.checked=true;
  const btn=document.getElementById('gdv-fil-grupos-btn');if(btn)btn.textContent='Todos los grupos';
  gdvUpdateFilterSummary();
  gdvRenderDashboard();
}

function gdvUpdateFilterSummary(){
  const el=document.getElementById('gdv-filter-summary');if(!el)return;
  const parts=[];
  if(gdvFilDesde||gdvFilHasta) parts.push('📅 '+( fmt(gdvFilDesde)||'inicio')+' → '+(fmt(gdvFilHasta)||'hoy'));
  if(gdvFilSexo) parts.push(gdvFilSexo==='H'?'👨 Solo Hombres':'👩 Solo Mujeres');
  if(gdvFilGrupos) parts.push('🏘 '+gdvFilGrupos.size+' grupo'+(gdvFilGrupos.size!==1?'s':''));
  el.textContent=parts.length?'Filtros activos: '+parts.join(' · '):'Mostrando: semana actual';
}

function gdvGetFilteredRecords(){
  const ownGroupId=currentUser.groupId||null;
  return S.records.filter(r=>{
    if(r.sinEncuentro) return false;
    // Facilitador: only see their own group
    if(isGdVFacilitador()&&ownGroupId&&Number(r.grupoId)!==Number(ownGroupId)) return false;
    if(gdvFilGrupos&&!gdvFilGrupos.has(Number(r.grupoId))) return false;
    if(gdvFilDesde&&r.fecha<gdvFilDesde) return false;
    if(gdvFilHasta&&r.fecha>gdvFilHasta) return false;
    return true;
  });
}

function gdvRenderDashboard(){
  gdvInitFilters();
  const recs=gdvGetFilteredRecords();

  // ── Gender resolver: use group type as fallback for unknown gender ──
  function resolveGenero(v, grupoId){
    if(v.genero==='H'||v.genero==='M') return v.genero;
    const g=S.groups.find(x=>x.id===grupoId);
    if(!g) return '';
    if(g.type==='Hombres') return 'H';
    if(g.type==='Mujeres') return 'M';
    return '';
  }

  let totH=0,totM=0,totVis=0,totNewH=0,totNewM=0;
  recs.forEach(r=>{
    const g=S.groups.find(x=>x.id===r.grupoId);
    Object.values(r.asistencia).forEach(v=>{
      if(v.state!=='presente') return;
      const gen=resolveGenero(v, r.grupoId);
      if(gdvFilSexo&&gen!==gdvFilSexo) return;
      if(gen==='H') totH++; else if(gen==='M') totM++;
    });
    totVis+=(r.visitsOther||[]).length;
    // Split new persons by group type
    const gType=g?g.type:'';
    const newList=r.visitsNew||[];
    newList.forEach(name=>{
      // Try to find in members to get gender
      const m=S.members.find(x=>fullName(x).toLowerCase()===name.toLowerCase());
      const gen=m?resolveGenero({genero:m.genero},r.grupoId):(gType==='Hombres'?'H':gType==='Mujeres'?'M':'');
      if(!gdvFilSexo||gen===gdvFilSexo){
        if(gen==='H') totNewH++; else if(gen==='M') totNewM++; else totNewH++; // default to H for mixed if unknown
      }
    });
  });

  const totPres=(gdvFilSexo==='H'?totH:gdvFilSexo==='M'?totM:totH+totM);
  const totNew=totNewH+totNewM;

  // ── Grupos count respecting gender filter ──
  let gruposCount;
  if(gdvFilGrupos){
    gruposCount=gdvFilGrupos.size;
  } else if(gdvFilSexo){
    // Count groups that match the gender filter
    gruposCount=S.groups.filter(g=>{
      if(gdvFilSexo==='H') return g.type==='Hombres'||g.type==='Mixto';
      if(gdvFilSexo==='M') return g.type==='Mujeres'||g.type==='Mixto';
      return true;
    }).length;
  } else {
    gruposCount=S.groups.length;
  }

  // ── Miembros activos respecting gender filter ──
  let miembrosAct=S.members.filter(m=>{
    if(m.estado==='Baja') return false;
    if(!gdvFilSexo) return true;
    const gen=resolveGenero({genero:m.genero},m.grupoId);
    return gen===gdvFilSexo;
  }).length;

  const sinEncTot=S.records.filter(r=>r.sinEncuentro&&
    (!gdvFilDesde||r.fecha>=gdvFilDesde)&&(!gdvFilHasta||r.fecha<=gdvFilHasta)&&
    (!gdvFilGrupos||gdvFilGrupos.has(Number(r.grupoId)))).length;

  // Nuevos por grupo (con sus nombres)
  const nuevosPorGrupo={};
  recs.forEach(r=>{
    if((r.visitsNew||[]).length===0) return;
    if(gdvFilGrupos&&!gdvFilGrupos.has(Number(r.grupoId))) return;
    if(!nuevosPorGrupo[r.grupoId]) nuevosPorGrupo[r.grupoId]={grupo:r.grupoName,nombres:[]};
    (r.visitsNew||[]).forEach(n=>{
      if(!nuevosPorGrupo[r.grupoId].nombres.includes(n))
        nuevosPorGrupo[r.grupoId].nombres.push(n);
    });
  });

  const nuevosHtml=Object.values(nuevosPorGrupo)
    .filter(g=>g.nombres.length>0)
    .sort((a,b)=>b.nombres.length-a.nombres.length)
    .map(g=>{
      const gid='gdv-nv-'+g.grupo.replace(/\s/g,'-');
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #F3F4F6">
        <span style="font-size:13px;font-weight:600">${g.grupo}</span>
        <span class="badge b-ok" style="cursor:pointer" onclick="gdvToggleNuevos('${gid}')">
          🌱 ${g.nombres.length} nuevo${g.nombres.length!==1?'s':''}
        </span>
      </div>
      <div id="${gid}" style="display:none;padding:6px 12px;background:#F0FDF4;border-radius:6px;font-size:12px;color:#166534;margin-bottom:4px">
        ${g.nombres.map(n=>'• '+n).join('<br>')}
      </div>`;
    }).join('');

  document.getElementById('gdv-stats').innerHTML=`
    <div class="stat"><span class="stat-val">${gruposCount}</span><span class="stat-lbl">Grupos</span></div>
    <div class="stat"><span class="stat-val">${miembrosAct}</span><span class="stat-lbl">Miembros activos</span></div>
    ${!gdvFilSexo||gdvFilSexo==='H'?`<div class="stat"><span class="stat-val" style="color:#1565C0">${totH}</span><span class="stat-lbl">Hombres pres.</span></div>`:''}
    ${!gdvFilSexo||gdvFilSexo==='M'?`<div class="stat"><span class="stat-val" style="color:#C0006A">${totM}</span><span class="stat-lbl">Mujeres pres.</span></div>`:''}
    <div class="stat"><span class="stat-val" style="color:#1F4E79">${totPres}</span><span class="stat-lbl">Total presentes</span></div>
    ${!gdvFilSexo||gdvFilSexo==='H'?`<div class="stat"><span class="stat-val" style="color:#1565C0">${totNewH}</span><span class="stat-lbl">Hombres nuevos</span></div>`:''}
    ${!gdvFilSexo||gdvFilSexo==='M'?`<div class="stat"><span class="stat-val" style="color:#C0006A">${totNewM}</span><span class="stat-lbl">Mujeres nuevas</span></div>`:''}
    ${sinEncTot?`<div class="stat"><span class="stat-val" style="color:#D97706;font-size:20px">${sinEncTot}</span><span class="stat-lbl">Sin encuentro</span></div>`:''}
  `;
  // Render nuevos por grupo
  const nvGrupoEl=document.getElementById('gdv-nuevos-por-grupo');
  if(nvGrupoEl){
    if(nuevosHtml){
      nvGrupoEl.style.display='';
      nvGrupoEl.innerHTML='<div style="font-size:13px;font-weight:700;color:#166534;margin-bottom:8px">🌱 Nuevos por grupo</div>'+nuevosHtml;
    } else {
      nvGrupoEl.innerHTML='<div style="text-align:center;color:#9CA3AF;padding:1rem;font-size:13px">No hay personas nuevas en el período consultado.</div>';
    }
  }
  // Render each section independently so one failure doesn't block others
  try{gdvRenderWeeklyStatus();}catch(e){console.error('Weekly status error:',e);}
  requestAnimationFrame(()=>{
    try{gdvRenderAdmChartFiltered(recs);}catch(e){console.error('Chart error:',e);}
    try{gdvRenderRankingChart(recs);}catch(e){console.error('Ranking error:',e);}
    try{gdvRenderBarsFiltered(recs);}catch(e){console.error('Bars error:',e);}
    try{gdvMrVisible=20; gdvRenderMemberRanking(recs);}catch(e){console.error('Member ranking error:',e);}
  });
}

function gdvRenderMemberRanking(recs){
  const wrap=document.getElementById('gdv-member-ranking');
  const moreBtn=document.getElementById('gdv-mr-show-more');
  const countEl=document.getElementById('gdv-mr-count');
  if(!wrap) return;

  // Build encounter count per group from filtered records
  var encPerGroup={};
  recs.forEach(function(r){
    var gid=Number(r.grupoId);
    if(!encPerGroup[gid]) encPerGroup[gid]=0;
    encPerGroup[gid]++;
  });

  // For each active member, calculate attendance
  var memberStats=[];
  S.members.filter(function(m){ return m.estado!=='Baja' && m.grupoId && encPerGroup[Number(m.grupoId)]>0; })
    .forEach(function(m){
      // Skip gender filter
      if(gdvFilSexo && m.genero!==gdvFilSexo) return;
      // Skip group filter
      if(gdvFilGrupos && !gdvFilGrupos.has(Number(m.grupoId))) return;

      var totalEnc=encPerGroup[Number(m.grupoId)]||0;
      if(!totalEnc) return;

      // Count presencias in filtered records for this member
      var presencias=0;
      recs.filter(function(r){ return Number(r.grupoId)===Number(m.grupoId); }).forEach(function(r){
        var att=r.asistencia||{};
        // asistencia keyed by member id (try both string and number key)
        var entry=att[m.id]||att[String(m.id)]||att[Number(m.id)];
        if(entry && entry.state==='presente') presencias++;
      });

      var pctVal=totalEnc>0?Math.round(presencias/totalEnc*100):0;
      var g=S.groups.find(function(x){ return Number(x.id)===Number(m.grupoId); });
      memberStats.push({
        nombre:m.nombre,
        apellido:m.apellido,
        grupo:g?g.name:'Sin grupo',
        presencias:presencias,
        totalEnc:totalEnc,
        pct:pctVal
      });
    });

  if(!memberStats.length){
    wrap.innerHTML='<div class="empty">Sin datos de asistencia individual para el período seleccionado</div>';
    if(moreBtn) moreBtn.style.display='none';
    return;
  }

  // Sort: worst first (asc pct) by default, best first (desc pct) if toggled
  memberStats.sort(function(a,b){
    return gdvMrSortAsc ? b.pct-a.pct : a.pct-b.pct;
  });

  var toShow=memberStats.slice(0,gdvMrVisible);
  var remaining=memberStats.length-gdvMrVisible;

  wrap.innerHTML=toShow.map(function(m,i){
    var barColor = m.pct>=75 ? '#16A34A' : m.pct>=50 ? '#1F4E79' : m.pct>=25 ? '#D97706' : '#DC2626';
    var rank = gdvMrSortAsc ? (i+1) : (memberStats.length - gdvMrVisible + i + 1);
    // For worst-first, rank from bottom
    var rankDisplay = gdvMrSortAsc ? (i+1) : (i+1);
    return '<div style="margin-bottom:10px;padding:8px 0;border-bottom:1px solid #F3F4F6">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;flex-wrap:wrap;gap:4px">' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<span style="font-size:11px;color:#9CA3AF;min-width:22px;text-align:right">#'+rankDisplay+'</span>' +
          '<div>' +
            '<div style="font-size:13px;font-weight:600;color:#1F2937">'+m.nombre+' '+m.apellido+'</div>' +
            '<div style="font-size:11px;color:#6B7280">'+m.grupo+'</div>' +
          '</div>' +
        '</div>' +
        '<span style="font-size:13px;color:#6B7280;white-space:nowrap">' +
          '<strong style="color:'+barColor+'">'+m.pct+'%</strong>' +
          ' &nbsp; '+m.presencias+'/'+m.totalEnc+' enc.' +
        '</span>' +
      '</div>' +
      '<div class="pbar-bg">' +
        '<div style="height:6px;border-radius:999px;background:'+barColor+';width:'+m.pct+'%;transition:width .3s"></div>' +
      '</div>' +
    '</div>';
  }).join('');

  // Show more button
  if(moreBtn){
    if(remaining>0){
      moreBtn.style.display='block';
      if(countEl) countEl.textContent='Mostrando '+toShow.length+' de '+memberStats.length+' miembros';
    } else {
      moreBtn.style.display='none';
      if(countEl) countEl.textContent='Total: '+memberStats.length+' miembros';
    }
  }
}

function gdvDashTab(tab, btn){
  // Switch active button
  // Use nav-btn class to match top navigation style
  document.querySelectorAll('#gdv-tab-dashboard .nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  // Switch panel
  ['nuevos','semanas','evolucion','ranking','asistencia','miembros'].forEach(t=>{
    const p=document.getElementById('gdv-panel-'+t);

  if(tab==='evolucion') gdvRenderChart();
  if(tab==='semanas') gdvRenderWeeklyStatus();
  if(tab==='asistencia') gdvRenderAttendance();
  if(tab==='miembros'){gdvMrVisible=20; gdvRenderMemberRanking(gdvGetFilteredRecords());}
}

function gdvRenderWeeklyStatus(){
  var wrap=document.getElementById('gdv-weekly-status');
  if(!wrap) return;

  var startStr = gdvFilDesde || dateToStr(getWeekDates(0).start);
  var endStr   = gdvFilHasta || dateToStr(getWeekDates(0).end);
  var periodoLabel = fmt(startStr) + ' al ' + fmt(endStr);

  var grupos = S.groups.filter(function(g){ return !gdvFilGrupos || gdvFilGrupos.has(g.id); });

  var statusByGroup = grupos.map(function(g){
    var recs = S.records.filter(function(r){ return r.grupoId===g.id && r.fecha>=startStr && r.fecha<=endStr; });
    var sinEncCount = recs.filter(function(r){ return r.sinEncuentro; }).length;
    var encCount = recs.filter(function(r){ return !r.sinEncuentro; }).length;
    var hasSinEnc = sinEncCount > 0;
    var hasReport = encCount > 0;
    // Un grupo puede tener ambos: encuentros con asistencia Y encuentros sin encuentro
    var status = hasReport && hasSinEnc ? 'mixto' : hasReport ? 'reportado' : hasSinEnc ? 'sin-encuentro' : 'sin-reporte';
    return {g:g, status:status, encCount:encCount, sinEncCount:sinEncCount};
  });

  var reportados  = statusByGroup.filter(function(x){ return x.status==='reportado'||x.status==='mixto'; }).length;
  var sinEncs     = statusByGroup.filter(function(x){ return x.status==='sin-encuentro'; }).length;
  var sinReporte  = statusByGroup.filter(function(x){ return x.status==='sin-reporte'; }).length;

  var colores = {
    'reportado':     {bg:'#F0FDF4', border:'#86EFAC', dot:'#16A34A', label:'Reportó'},
    'mixto':         {bg:'#F0FDF4', border:'#86EFAC', dot:'#16A34A', label:'Reportó'},
    'sin-encuentro': {bg:'#FFFBEB', border:'#FCD34D', dot:'#D97706', label:'Sin encuentro'},
    'sin-reporte':   {bg:'#FFF5F5', border:'#FCA5A5', dot:'#DC2626', label:'Sin reporte'}
  };

  var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">';
  html += '<div>';
  html += '<div style="font-size:14px;font-weight:600;color:#1F4E79">Período: ' + periodoLabel + '</div>';
  html += '<div style="font-size:12px;color:#6B7280;margin-top:3px">';
  html += '<span style="color:#16A34A;font-weight:600">&#10003; ' + reportados + ' con reporte</span>';
  html += ' &nbsp;&middot;&nbsp; <span style="color:#D97706;font-weight:600">&#9208; ' + sinEncs + ' sin encuentro</span>';
  html += ' &nbsp;&middot;&nbsp; <span style="color:#DC2626;font-weight:600">&#10007; ' + sinReporte + ' sin ningún registro</span>';
  html += '</div></div>';
  html += '<div style="font-size:12px;color:#9CA3AF;font-style:italic">Cambiá las fechas arriba para filtrar</div>';
  html += '</div>';

  if(sinReporte > 0){
    html += '<div style="background:#FEF2F2;border:1px solid #FCA5A5;border-radius:10px;padding:10px 14px;margin-bottom:12px">';
    html += '<div style="font-size:13px;font-weight:600;color:#DC2626;margin-bottom:6px">Sin ningún registro en el período:</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px">';
    statusByGroup.filter(function(x){ return x.status==='sin-reporte'; }).forEach(function(x){
      var diaTxt = x.g.dia ? ' (' + x.g.dia + (x.g.horario ? ' ' + x.g.horario : '') + ')' : '';
      html += '<span style="background:#fff;border:1px solid #FCA5A5;border-radius:6px;padding:3px 10px;font-size:12px;color:#991B1B">' + x.g.name + diaTxt + '</span>';
    });
    html += '</div></div>';
  }

  html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:8px">';
  statusByGroup.forEach(function(item){
    var c = colores[item.status];
    var dia = item.g.dia ? ' · ' + item.g.dia : '';
    var detalle = '';
    if(item.status === 'mixto'){
      detalle = ' · ' + item.encCount + ' con asistencia · ' + item.sinEncCount + ' sin encuentro';
    } else if(item.encCount > 1){
      detalle = ' · ' + item.encCount + ' encuentros';
    }
    html += '<div style="background:' + c.bg + ';border:1px solid ' + c.border + ';border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:8px">';
    html += '<div style="width:10px;height:10px;border-radius:50%;background:' + c.dot + ';flex-shrink:0"></div>';
    html += '<div style="flex:1;min-width:0">';
    html += '<div style="font-size:12px;font-weight:600;color:#1F2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + item.g.name + '</div>';
    html += '<div style="font-size:11px;color:#6B7280">' + c.label + detalle + dia + '</div>';
    html += '</div></div>';
  });
  html += '</div>';

  wrap.innerHTML = html;
}

function gdvChangeWeek(offset){

function gdvRenderAdmChartFiltered(recs){
  // Group by ISO week number
  const byWeek={};
  recs.forEach(function(r){
    var semana=getISOWeek(r.fecha);
    var anio=r.fecha.substring(0,4);
    var key=anio+'-S'+String(semana).padStart(2,'0');
    if(!byWeek[key]) byWeek[key]={h:0,m:0,semana:semana,anio:anio};
    Object.values(r.asistencia||{}).forEach(function(v){
      if(!v||v.state!=='presente') return;
      if(gdvFilSexo&&v.genero!==gdvFilSexo) return;
      if(v.genero==='H') byWeek[key].h++; else byWeek[key].m++;
    });
  });
  var sorted=Object.keys(byWeek).sort();
  var wrap=document.getElementById('gdv-chart-adm-wrap');
  if(!wrap) return;

  var existingChart=Chart.getChart?Chart.getChart('gdv-chart-adm'):null;
  if(existingChart) existingChart.destroy();
  if(gdvCharts.adm){try{gdvCharts.adm.destroy();}catch(e){} gdvCharts.adm=null;}

  wrap.innerHTML='<canvas id="gdv-chart-adm"></canvas>';

  if(!sorted.length){
    wrap.innerHTML='<div style="height:200px;display:flex;align-items:center;justify-content:center;color:#9CA3AF;font-size:13px">Sin datos en el período seleccionado</div>';
    return;
  }

  var canvas=document.getElementById('gdv-chart-adm');
  if(!canvas) return;

  var labels=sorted.map(function(k){ return 'Semana '+byWeek[k].semana; });
  var datasets=[];
  if(!gdvFilSexo||gdvFilSexo==='H') datasets.push({
    label:'Hombres',data:sorted.map(function(k){return byWeek[k].h;}),
    borderColor:'#1565C0',backgroundColor:'rgba(21,101,192,0.1)',tension:0.3,fill:true,pointRadius:5
  });
  if(!gdvFilSexo||gdvFilSexo==='M') datasets.push({
    label:'Mujeres',data:sorted.map(function(k){return byWeek[k].m;}),
    borderColor:'#C0006A',backgroundColor:'rgba(192,0,106,0.1)',tension:0.3,fill:true,pointRadius:5
  });

  gdvCharts.adm=new Chart(canvas,{
    type:'line',
    data:{labels:labels,datasets:datasets},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      scales:{y:{beginAtZero:true,ticks:{precision:0}}},
      plugins:{legend:{position:'top',labels:{font:{size:11},boxWidth:20}}}
    }
  });
}

function gdvRenderRankingChart(recs){
  const wrap=document.getElementById('gdv-ranking');
  if(!wrap) return;
  wrap.innerHTML=''; // clear first
  // For each group: avg presentes per encounter
  const groupData=S.groups.map(g=>{
    const gRecs=recs.filter(r=>r.grupoId===g.id);
    if(!gRecs.length) return null;
    let total=0;
    gRecs.forEach(r=>{
      Object.values(r.asistencia).forEach(v=>{
        if(v.state!=='presente') return;
        if(gdvFilSexo&&v.genero!==gdvFilSexo) return;
        total++;
      });
    });
    const avg=total/gRecs.length;
    return {name:g.name,avg,encounters:gRecs.length,total};
  }).filter(Boolean).sort((a,b)=>b.avg-a.avg);

  if(!groupData.length){
    wrap.innerHTML='<div class="empty">Sin datos para el período seleccionado</div>';
    return;
  }
  const maxAvg=groupData[0].avg||1;
  wrap.innerHTML=groupData.map((d,i)=>{
    const pct=Math.round(d.avg/maxAvg*100);
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    const barColor=i===0?'#F59E0B':i===1?'#9CA3AF':i===2?'#CD7C2F':'#1F4E79';
    return `<div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-size:13px;font-weight:600">${medal} #${i+1} ${d.name}</span>
        <span style="font-size:13px;color:#6B7280">
          <strong style="color:#1F4E79">${d.avg.toFixed(1)}</strong> prom · ${d.encounters} encuentro${d.encounters!==1?'s':''} · ${d.total} presentes
        </span>
      </div>
      <div class="pbar-bg">
        <div style="height:8px;border-radius:999px;background:${barColor};width:${pct}%;transition:width .3s"></div>
      </div>
    </div>`;
  }).join('');
}

function gdvRenderBarsFiltered(recs){
  const wrap=document.getElementById('gdv-bars');
  if(!wrap) return;
  wrap.innerHTML='';
  if(!recs.length){
    wrap.innerHTML='<div class="empty">Sin datos para el período seleccionado</div>';
    return;
  }
  // Aggregate ALL records in range per group (not just last)
  const groupData={};
  recs.forEach(r=>{
    if(!groupData[r.grupoId]) groupData[r.grupoId]={name:r.grupoName,totalPre:0,totalMiembros:0,encounters:0};
    const att=Object.values(r.asistencia||{});
    const pre=att.filter(v=>v&&v.state==='presente'&&(!gdvFilSexo||v.genero===gdvFilSexo)).length;
    const tot=gdvFilSexo?att.filter(v=>v&&v.genero===gdvFilSexo).length:att.length;
    groupData[r.grupoId].totalPre+=pre;
    groupData[r.grupoId].totalMiembros+=tot;
    groupData[r.grupoId].encounters++;
  });
  const rows=Object.values(groupData).map(d=>{
    const p=pct(d.totalPre,d.totalMiembros);
    const avgPre=d.encounters>0?(d.totalPre/d.encounters).toFixed(1):0;
    return{name:d.name,pre:d.totalPre,tot:d.totalMiembros,p,avgPre,encounters:d.encounters};
  }).sort((a,b)=>b.p-a.p);

  wrap.innerHTML=`
    <div style="font-size:11px;color:#6B7280;margin-bottom:12px;padding:6px 8px;background:#F9FAFB;border-radius:6px">
      📊 Promedio del período (${fmt(gdvFilDesde)||'inicio'} → ${fmt(gdvFilHasta)||'hoy'}) — presentes acumulados / miembros posibles
    </div>`+
  rows.map(r=>`
    <div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;flex-wrap:wrap;gap:4px">
        <span style="font-weight:500">${r.name}</span>
        <span style="color:#6B7280">${r.pre}/${r.tot} — <strong style="color:#1F4E79">${r.p}%</strong>
          <span style="font-size:11px;color:#9CA3AF"> · prom ${r.avgPre}/enc · ${r.encounters} enc.</span>
        </span>
      </div>
      <div class="pbar-bg"><div class="pbar-fill" style="width:${r.p}%;background:${r.p>=75?'#16A34A':r.p>=50?'#1F4E79':'#DC2626'}"></div></div>
    </div>`).join('');
}


// GdV: Registros
function gdvRenderRegistros(){
  // Default: last 2 weeks if no date set
  var _regDesde=document.getElementById('gdv-reg-desde');
  var _regHasta=document.getElementById('gdv-reg-hasta');
  if(_regDesde&&!_regDesde.value){var _d=new Date();_d.setDate(_d.getDate()-14);_regDesde.value=_d.toISOString().slice(0,10);}
  const fd=_regDesde?.value||'';
  const fh=_regHasta?.value||'';
  const sel=document.getElementById('gdv-reg-grupo');
  const fg=sel?.value||'';
  if(sel.options.length<=1){
    const ownGids=isGdVFacilitador()?getFacilitadorGroupIds():[];
    const groupsToShow=(isGdVFacilitador()&&ownGids.length)
      ? S.groups.filter(g=>ownGids.includes(Number(g.id)))
      : S.groups;
    groupsToShow.forEach(g=>{const o=document.createElement('option');o.value=g.id;o.textContent=g.name;sel.appendChild(o);});
  }
  let recs=[...S.records];
  // Facilitador: only see their own group's records
  if(isGdVFacilitador()){const fgids=getFacilitadorGroupIds();if(fgids.length) recs=recs.filter(r=>fgids.includes(Number(r.grupoId)));}
  if(fg)recs=recs.filter(r=>r.grupoId==fg);
  if(fd)recs=recs.filter(r=>r.fecha>=fd);
  if(fh)recs=recs.filter(r=>r.fecha<=fh);
  recs.sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const wrap=document.getElementById('gdv-registros-list');
  if(!recs.length){wrap.innerHTML='<div class="empty">Sin registros.</div>';return;}
  wrap.innerHTML=recs.map(r=>{
    if(r.sinEncuentro){
      return `<div class="card" style="padding:12px;margin-bottom:.5rem;background:#FFFBEB;border-color:#FCD34D">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-weight:600;min-width:88px">${fmt(r.fecha)}</span>
          <span style="flex:1;font-size:13px">${r.grupoName}</span>
          <span class="badge" style="background:#FEF3C7;color:#92400E">⏸ Sin encuentro</span>
          <button class="btn btn-sm" onclick="gdvEditRecord(${r.id})">✏️</button>
          <button class="btn btn-sm btn-danger" onclick="gdvDeleteRecord(${r.id})">🗑</button>
        </div>
        ${r.motivo?`<div style="margin-top:6px;font-size:12px;color:#92400E">📝 ${r.motivo}</div>`:''}
        <div style="margin-top:4px;font-size:12px;color:#6B7280">${r.facName}</div>
      </div>`;
    }
    const att=Object.values(r.asistencia);
    const pre=att.filter(v=>v.state==='presente').length;
    const preH=att.filter(v=>v.state==='presente'&&v.genero==='H').length;
    const preM=att.filter(v=>v.state==='presente'&&v.genero==='M').length;
    const p=pct(pre,att.length);
    return `<div class="card" style="padding:12px;margin-bottom:.5rem">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span style="font-weight:600;min-width:88px">${fmt(r.fecha)}</span>
        <span style="flex:1;font-size:13px">${r.grupoName}</span>
        <span class="badge ${p>=70?'b-ok':'b-muted'}">${pre}/${att.length} (${p}%)</span>
        <button class="btn btn-sm" onclick="gdvEditRecord(${r.id})">✏️</button>
        <button class="btn btn-sm btn-danger" onclick="gdvDeleteRecord(${r.id})">🗑</button>
      </div>
      <div style="margin-top:6px;font-size:12px;color:#6B7280"><span style="color:#1565C0;font-weight:600">H: ${preH}</span> · <span style="color:#C0006A;font-weight:600">M: ${preM}</span> · ${r.facName}</div>
      <div style="margin-top:8px;font-size:12px">${Object.entries(r.asistencia).map(([k,v])=>`<span style="display:inline-block;margin:2px 3px;padding:2px 8px;border-radius:4px;background:${v.state==='presente'?'#D1FAE5':'#FEE2E2'};color:${v.state==='presente'?'#065F46':'#991B1B'}">${v.name}</span>`).join('')}</div>
      ${(r.visitsOther||[]).length?`<div style="margin-top:4px;font-size:12px;color:#1E40AF">Visitas: ${r.visitsOther.join(', ')}</div>`:''}
      ${(r.visitsNew||[]).length?`<div style="margin-top:4px;font-size:12px;color:#92400E">Nuevos: ${r.visitsNew.join(', ')}</div>`:''}
    </div>`;
  }).join('');
}
async function gdvDeleteRecord(id){
  if(!confirm('¿Eliminar este registro? El dashboard se actualizará.'))return;
  S.records=S.records.filter(r=>r.id!==id);
  await saveK(SK.records,S.records);gdvRenderRegistros();gdvRenderDashboard();
  try{
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
  }catch(e){
    console.error('gdvDeleteRecord Firebase error:',e);
    showToast('⚠️ Guardado sin sincronizar — verificá tu conexión','#DC2626');
  }
}

async function gdvSaveEditRec(){
  var id=window._gdvEditRecId;
  var r=S.records.find(x=>String(x.id)===String(id));
  if(!r||r.sinEncuentro){gdvCloseEditRec();return;}
  Object.keys(r.asistencia).forEach(function(k){
    var cb=document.getElementById('gdv-edit-att-'+k);
    if(cb) r.asistencia[k].state=cb.checked?'presente':'ausente';
  });
  r._ts=Date.now(); // Marcar edición para que mergeByTs sepa cuál es más reciente
  await saveK(SK.records,S.records);
  try{
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
  }catch(e){
    console.error('gdvSaveEditRec Firebase error:',e);
    showToast('⚠️ Guardado sin sincronizar — verificá tu conexión','#DC2626');
  }
  gdvCloseEditRec();
  gdvRenderRegistros();
  gdvRenderDashboard();
}

function gdvRenderMiembros(){
  const search=(document.getElementById('gdv-member-search').value||'').toLowerCase();

  const fGen=document.getElementById('gdv-mfil-gen').value;

  if(gsel.options.length<=1)S.groups.forEach(g=>{const o=document.createElement('option');o.value=g.id;o.textContent=g.name;gsel.appendChild(o);});
  const mgsel=document.getElementById('gdv-mf-grupo');
  if(mgsel&&mgsel.options.length===0)S.groups.forEach(g=>{const o=document.createElement('option');o.value=g.id;o.textContent=g.name;mgsel.appendChild(o);});
  let members=[...S.members];
  if(search)members=members.filter(m=>fullName(m).toLowerCase().includes(search));
  if(fGrupo)members=members.filter(m=>m.grupoId===fGrupo);
  if(fGen)members=members.filter(m=>m.genero===fGen);
  document.getElementById('gdv-member-count').textContent=S.members.filter(m=>m.estado==='Activo').length;
  document.getElementById('gdv-member-tbody').innerHTML=members.map(m=>{
    const allGids=[m.grupoId,...(m.grupoIds||[])].filter(Boolean).map(Number);
    const allAvailableGroups=[...(S.groups||[]),...(S.ngComunidades||[]).map(function(ng){return {id:ng.id,name:'🌱 '+ng.name};})];
    const memberGroups=allGids.map(gid=>allAvailableGroups.find(x=>Number(x.id)===gid)).filter(Boolean);
    return `<tr>
      <td><strong>${fullName(m)}</strong></td>
      <td><span style="background:${m.genero==='H'?'#DBEAFE':'#FCE7F3'};color:${m.genero==='H'?'#1E40AF':'#9D174D'};padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600">${m.genero}</span></td>
      <td style="color:#6B7280;font-size:12px">${memberGroups.length?memberGroups.map(gr=>`<div>${gr.name}</div>`).join(''):'<span style="color:#F59E0B;font-size:11px">Sin grupo</span>'}</td>
      <td>${roleChips(m.roles||[])}</td>
      <td><span class="badge ${m.estado==='Activo'?'b-ok':'b-muted'}">${m.estado}</span></td>
      <td style="white-space:nowrap"><button class="btn btn-sm" onclick="gdvEditMember(${m.id})" style="margin-right:4px">✏️</button><button class="btn btn-sm btn-danger" onclick="gdvDeleteMember(${m.id})">🗑</button></td>
    </tr>`;
  }).join('');
}

function ofSwitchTab(t,btn){
  document.querySelectorAll('.of-tab').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  ['alumnos','materias','participacion','pagos','asistencia'].forEach(s=>{
    const el=document.getElementById('of-sec-'+s);
    if(el) el.classList.toggle('active',s===t);
  });
  ofCurrentTab=t;
  if(t==='materias') ofRenderMaterias();
}

function ofSaveMateria(){
  const nombre=document.getElementById('of-mf-nombre').value.trim();
  if(!nombre){alert('Ingresá el nombre de la materia');return;}
  const capitulos=document.getElementById('of-mf-temario').value
    .split('\n').map(t=>t.trim()).filter(Boolean);
  // Get alumnos selections
  const alumSels=[...document.querySelectorAll('.of-mat-alum-cb:checked')].map(cb=>parseInt(cb.value));
  const data={
    nombre,
    estado:document.getElementById('of-mf-estado').value,
    profesor:document.getElementById('of-mf-profesor').value,
    desde:document.getElementById('of-mf-desde').value,
    hasta:document.getElementById('of-mf-hasta').value,
    capitulos,
    alumnos:alumSels
  };
  if(ofEditMatId){
    const mat=ofMaterias.find(x=>x.id===ofEditMatId);
    // Preserve completados when editing
    data.completados=mat.completados||{};
    Object.assign(mat,data);
  } else {
    ofMaterias.push({id:Date.now(),...data,completados:{}});
  }
  ofSave(); ofCloseMateria(); ofRenderMaterias();
}

function ofProfesorNombre(val){
  if(!val) return '—';
  if(val.startsWith('m:')){
    const m=S.members.find(x=>x.id===parseInt(val.slice(2)));
    return m?fullName(m):'—';
  }
  if(val.startsWith('a:')){
    const a=ofAlumnos.find(x=>x.id===parseInt(val.slice(2)));
    return a?`${a.nombre} ${a.apellido} (Invitado)`:'—';

  return val;

function ofRenderStats(){
  const el=document.getElementById('of-statsGrid');
  if(!el) return;
  const total=ofAlumnos.length;
  const activos=ofAlumnos.filter(a=>ofIsActivo(a.id,ofMesPago)).length;
  let pagados=0;
  ofAlumnos.forEach(a=>{
    if(ofIsActivo(a.id,ofMesPago)&&(ofPagos[`${a.id}_${ofMesPago}`]||{}).estado==='pagado') pagados++;
  });
  const encs=ofGetEncs(ofMesAsist);
  let totalP=0,den=0;
  ofAlumnos.forEach(a=>{
    if(!ofIsActivo(a.id,ofMesAsist)) return;
    encs.forEach(e=>{den++;if(ofAsistencia[`${a.id}_${e.id}`]==='P')totalP++;});
  });
  const p=den>0?Math.round(totalP/den*100):0;
  el.innerHTML=`
    <div class="of-stat"><div class="of-stat-label">Alumnos inscriptos</div><div class="of-stat-value">${total}</div><div class="of-stat-sub">${activos} activos ${MESES[ofMesPago].slice(0,3)}</div></div>
    <div class="of-stat"><div class="of-stat-label">Materias activas</div><div class="of-stat-value" style="color:#3C3489">${ofMateriasActivas().length}</div><div class="of-stat-sub">de ${ofMaterias.length} totales</div></div>
    <div class="of-stat"><div class="of-stat-label">Pagaron ${MESES[ofMesPago].slice(0,3)}</div><div class="of-stat-value" style="color:#15803d">${pagados}</div><div class="of-stat-sub">de ${activos} activos</div></div>
    <div class="of-stat"><div class="of-stat-label">Asistencia ${MESES[ofMesAsist].slice(0,3)}</div><div class="of-stat-value">${p}%</div><div class="of-stat-sub">${encs.length} encuentros</div></div>`;
}

function ofRenderParticipacion(){
  const wrap=document.getElementById('of-dashboard-wrap');
  if(!wrap) return;

  const materias=ofMateriasActivas();
  // Get all encounters
  const allEncs=[];
  Object.keys(ofEncuentros).forEach(function(k){
    (ofEncuentros[k]||[]).forEach(function(e){ allEncs.push(e); });
  });

  if(!ofAlumnos.length){
    wrap.innerHTML='<div style="text-align:center;padding:2rem;color:#9CA3AF">No hay alumnos inscriptos</div>';
    return;
  }

  var html='';

  // ── KPIs ──
  var totalAlumnos=ofAlumnos.length;
  var totalEncs=allEncs.length;
  var materiasActivas=materias.length;
  // Overall attendance %
  var totalP=0, totalReg=0;
  ofAlumnos.forEach(function(a){
    allEncs.forEach(function(e){
      var v=ofAsistencia[a.id+'_'+e.id]||'';
      if(v) totalReg++;
      if(v==='P') totalP++;
    });
  });
  var pctGeneral=totalReg>0?Math.round(totalP/totalReg*100):0;

  html+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:1.25rem">';
  html+='<div class="stat"><span class="stat-val">'+totalAlumnos+'</span><span class="stat-lbl">Alumnos</span></div>';
  html+='<div class="stat"><span class="stat-val">'+materiasActivas+'</span><span class="stat-lbl">Materias activas</span></div>';
  html+='<div class="stat"><span class="stat-val">'+totalEncs+'</span><span class="stat-lbl">Encuentros</span></div>';
  html+='<div class="stat"><span class="stat-val" style="color:'+(pctGeneral>=75?'#16A34A':pctGeneral>=50?'#1F4E79':'#DC2626')+'">'+pctGeneral+'%</span><span class="stat-lbl">% Asistencia</span></div>';
  html+='</div>';

  // ── Por Materia ──
  if(materias.length){
    materias.forEach(function(mat){
      var matEncs=allEncs.filter(function(e){return String(e.materia)===String(mat.id);});
      if(!matEncs.length) return;

      html+='<div class="card" style="margin-bottom:1rem;border-left:4px solid #7C3AED">';
      html+='<div style="font-size:14px;font-weight:700;color:#1F4E79;margin-bottom:.75rem">📚 '+mat.nombre+' <span style="font-size:11px;font-weight:400;color:#6B7280">('+matEncs.length+' encuentros)</span></div>';

      // Per-alumno stats for this materia
      var alumStats=ofAlumnos.map(function(a){
        var pres=matEncs.filter(function(e){return ofAsistencia[a.id+'_'+e.id]==='P';}).length;
        var ause=matEncs.filter(function(e){return ofAsistencia[a.id+'_'+e.id]==='A';}).length;
        var tard=matEncs.filter(function(e){return ofAsistencia[a.id+'_'+e.id]==='T';}).length;
        var pct=matEncs.length>0?Math.round(pres/matEncs.length*100):0;
        return {a:a,pres:pres,ause:ause,tard:tard,pct:pct};
      }).sort(function(x,y){return y.pct-x.pct;});

      alumStats.forEach(function(s){
        var barColor=s.pct>=75?'#16A34A':s.pct>=50?'#1F4E79':s.pct>=25?'#D97706':'#DC2626';
        html+='<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #F3F4F6;flex-wrap:wrap">';
        html+='<span style="font-size:13px;font-weight:600;flex:1;min-width:120px">'+s.a.nombre+' '+s.a.apellido+'</span>';
        html+='<div style="flex:2;min-width:100px">';
        html+='<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">';
        html+='<span style="color:#6B7280">P:'+s.pres+' A:'+s.ause+' T:'+s.tard+'</span>';
        html+='<strong style="color:'+barColor+'">'+s.pct+'%</strong></div>';
        html+='<div class="pbar-bg"><div style="height:6px;border-radius:999px;background:'+barColor+';width:'+s.pct+'%"></div></div>';
        html+='</div></div>';
      });
      html+='</div>';
    });
  } else {
    html+='<div style="text-align:center;padding:2rem;color:#9CA3AF">No hay materias activas. Agregá materias desde la tab Materias.</div>';
  }

  wrap.innerHTML=html;
}
