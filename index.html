function ofGetEncs(mes){return ofEncuentros[`${mes}_${ANO}`]||[];}
function ofEncKey(){return `${ofMesAsist}_${ANO}`;}

function ofAbrirModalEnc(){
  const el=document.getElementById('of-me-fecha');
  if(el) el.value=ofDateInput();
  ofUpdateFechaDisplay();
  const selMat=document.getElementById('of-me-materia');
  if(selMat){
    selMat.innerHTML='<option value="">— Elegir materia activa —</option>'+
      ofMateriasActivas().map(m=>`<option value="${m.id}">${m.nombre}</option>`).join('');
  }
  const selCap=document.getElementById('of-me-capitulo');
  if(selCap) selCap.innerHTML='<option value="">— Elegir capítulo (opcional) —</option>';
  const exChk=document.getElementById('of-me-esexamen');
  if(exChk) exChk.checked=false;
  ofEditEncId=null;
  document.getElementById('of-modalEnc').style.display='flex';
}

function ofUpdateFechaDisplay(){
  const el=document.getElementById('of-me-fecha');
  const disp=document.getElementById('of-me-fecha-display');
  if(el&&disp) disp.textContent=el.value?`📅 ${ofFmtDate(el.value)}`:'';
}

function ofUpdateCapitulos(){
  const matId=parseInt(document.getElementById('of-me-materia')?.value)||null;
  const mat=ofMaterias.find(x=>x.id===matId);
  const sel=document.getElementById('of-me-capitulo');
  if(!sel) return;
  sel.innerHTML='<option value="">— Elegir capítulo (opcional) —</option>'+
    (mat?.capitulos||[]).map(c=>`<option value="${c}">${c}</option>`).join('');
}

function ofUpdateCapitulosEdit(){
  const matId=parseInt(document.getElementById('of-me-edit-materia')?.value)||null;
  const mat=ofMaterias.find(x=>x.id===matId);
  const sel=document.getElementById('of-me-edit-capitulo');
  if(!sel) return;
  sel.innerHTML='<option value="">— Sin capítulo —</option>'+
    (mat?.capitulos||[]).map(c=>`<option value="${c}">${c}</option>`).join('');
}

function ofCerrarModal(){document.getElementById('of-modalEnc').style.display='none';}

function ofGuardarEnc(){
  const fecha=document.getElementById('of-me-fecha').value;
  if(!fecha){alert('Ingresá la fecha');return;}
  const matId=parseInt(document.getElementById('of-me-materia')?.value)||null;
  if(!matId){alert('Elegí una materia');return;}
  const capitulo=document.getElementById('of-me-capitulo')?.value||'';
  const esExamen=document.getElementById('of-me-esexamen')?.checked||false;
  const mat=ofMaterias.find(x=>x.id===matId);
  const k=ofEncKey();
  if(!ofEncuentros[k]) ofEncuentros[k]=[];
  const enc={id:Date.now(),fecha,
    materia:matId, materiaId:matId, materiaNombre:mat?.nombre||'',
    capitulo, esExamen};
  if(ofEditEncId){
    const allK=Object.keys(ofEncuentros);
    allK.forEach(key=>{
      const idx=ofEncuentros[key].findIndex(e=>e.id===ofEditEncId);
      if(idx>=0) ofEncuentros[key][idx]={...ofEncuentros[key][idx],...enc,id:ofEditEncId};
    });
    ofEditEncId=null;
  } else {
    if(!ofEncuentros[k]) ofEncuentros[k]=[];
    ofEncuentros[k].push(enc);
  }
  ofCerrarModal();ofSave();ofRenderAsistencia();ofRenderStats();
}

function ofAbrirModalEdit(eid){
  const enc=ofGetEncs(ofMesAsist).find(e=>e.id===eid);if(!enc)return;
  ofEditEncId=eid;
  document.getElementById('of-me-edit-fecha').value=enc.fecha;
  // Populate all materias for edit
  const selMat=document.getElementById('of-me-edit-materia');
  if(selMat){
    selMat.innerHTML='<option value="">— Sin materia —</option>'+
      ofMaterias.map(m=>`<option value="${m.id}"${m.id===enc.materiaId?' selected':''}>${m.nombre}${m.estado==='Inactivo'?' (inactiva)':''}</option>`).join('');
    ofUpdateCapitulosEdit();
    setTimeout(()=>{
      const selCap=document.getElementById('of-me-edit-capitulo');
      if(selCap&&enc.capitulo){
        [...selCap.options].forEach(o=>{if(o.value===enc.capitulo)o.selected=true;});
      }
    },50);
  }
  document.getElementById('of-modalEditEnc').style.display='flex';
}

function ofCerrarModalEdit(){document.getElementById('of-modalEditEnc').style.display='none';ofEditEncId=null;}

function ofGuardarEdicionEnc(){
  const k=ofEncKey();
  const fecha=document.getElementById('of-me-edit-fecha').value;
  const matId=parseInt(document.getElementById('of-me-edit-materia')?.value)||null;
  const mat=ofMaterias.find(x=>x.id===matId);
  const capitulo=document.getElementById('of-me-edit-capitulo')?.value||'';
  ofEncuentros[k]=(ofEncuentros[k]||[]).map(e=>e.id!==ofEditEncId?e:
    {...e,fecha,materiaId:matId,materiaNombre:mat?.nombre||'',capitulo});
  ofCerrarModalEdit();ofSave();ofRenderAsistencia();ofRenderStats();
}

function ofEliminarEncEdit(){
  if(!confirm('¿Eliminar este encuentro?'))return;
  const k=ofEncKey();
  ofEncuentros[k]=(ofEncuentros[k]||[]).filter(e=>e.id!==ofEditEncId);
  ofCerrarModalEdit();ofSave();ofRenderAsistencia();ofRenderStats();
}

function ofToggleAsist(aid,eid){
  const k=`${aid}_${eid}`;const ciclo=['','P','A','T'];
  ofAsistencia[k]=ciclo[(ciclo.indexOf(ofAsistencia[k]||'')+1)%ciclo.length];
  ofSave();ofRenderAsistencia();ofRenderStats();
}

function ofRenderAsistencia(){
  const matFil=document.getElementById('of-asist-materia-fil');
  // Populate materia filter dynamically
  if(matFil&&matFil.options.length<=1){
    ofMateriasActivas().forEach(m=>{
      const opt=document.createElement('option');
      opt.value=m.id; opt.textContent=m.nombre;
      matFil.appendChild(opt);
    });
  }
  const filterMat=matFil?.value||'';
  const filterFecha=document.getElementById('of-asist-fecha-fil')?.value||'';

  // Get all encounters
  let allEncs=Object.values(ofEncuentros||{}).reduce(function(acc,v){return acc.concat(v||[]);},[]);
  if(filterMat) allEncs=allEncs.filter(e=>String(e.materia||e.materiaId)===String(filterMat));
  if(filterFecha) allEncs=allEncs.filter(e=>e.fecha===filterFecha);
  allEncs.sort((a,b)=>b.fecha.localeCompare(a.fecha));

  const lista=document.getElementById('of-enc-lista-mes');
  if(!lista) return;

  if(!allEncs.length){
    lista.innerHTML='<div style="text-align:center;padding:2rem;color:#9CA3AF;font-size:13px">No hay encuentros con estos filtros</div>';
    ofRenderAsistenciaTable(null,null);return;
  }

  lista.innerHTML=allEncs.map(e=>{
    const mat=ofMaterias.find(m=>String(m.id)===String(e.materia||e.materiaId))||{nombre:'Sin materia',alumnos:[]};
    const alums=mat.alumnos||[];
    const presentes=alums.filter(aid=>ofAsistencia[`${aid}_${e.id}`]==='P').length;
    const semana=getISOWeek(e.fecha);
    const isExamen=e.esExamen||false;
    return `<div class="card" style="margin-bottom:.5rem;padding:10px 14px;cursor:pointer;border-left:4px solid ${isExamen?'#DC2626':'#7C3AED'}"
        onclick="ofSelectEnc('${e.id}','${mat.id}')">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700;color:#1F4E79">
            ${isExamen?'📝 EXAMEN — ':''}${mat.nombre}
          </div>
          <div style="font-size:12px;color:#6B7280;margin-top:2px">
            ${fmt(e.fecha)} · Semana ${semana}${e.capitulo?' · '+e.capitulo:''}
          </div>
        </div>
        <span class="badge b-ok">${presentes}/${alums.length} presentes</span>
      </div>
    </div>`;
  }).join('');

  if(allEncs.length){
    const e=allEncs[0];
    const mat=ofMaterias.find(m=>String(m.id)===String(e.materia||e.materiaId));
    ofSelectEnc(e.id, mat?.id);
  }
}

function ofClearAsistFil(){
  const mf=document.getElementById('of-asist-materia-fil');
  const ff=document.getElementById('of-asist-fecha-fil');
  if(mf){mf.innerHTML='<option value="">Todas las materias</option>';mf.value='';}
  if(ff) ff.value='';
  ofRenderAsistencia();
}

function ofSelectEnc(encId, matId){
  ofRenderAsistenciaTable(encId, matId);
}

function ofRenderAsistenciaTable(encId, matId){
  const wrap=document.getElementById('of-asist-tabla');
  if(!wrap) return;
  if(!encId){wrap.innerHTML='';return;}

  const mat=matId?ofMaterias.find(m=>String(m.id)===String(matId)):null;
  const alums=mat?(mat.alumnos||[]).map(id=>ofAlumnos.find(a=>a.id===id)).filter(Boolean):ofAlumnos;
  const allEncs=Object.values(ofEncuentros||{}).reduce(function(acc,v){return acc.concat(v||[]);},[]);
  const enc=allEncs.find(e=>String(e.id)===String(encId));
  if(!enc){wrap.innerHTML='';return;}

  const isExamen=enc.esExamen||false;

  let html=`<div class="card" style="margin-top:.75rem;border-left:4px solid ${isExamen?'#DC2626':'#7C3AED'}">
    <div style="font-size:13px;font-weight:700;color:#1F4E79;margin-bottom:1rem">
      ${isExamen?'📝 Examen — marcar Completado/Incompleto':'✅ Asistencia del encuentro'}
    </div>`;

  if(!alums.length){
    html+='<div style="color:#9CA3AF;font-size:13px">No hay alumnos asignados a esta materia. Editá la materia para asignarlos.</div>';
  } else {
    alums.forEach(a=>{
      if(isExamen){
        // For exam: show Completado / Incompleto toggle
        const comp=(mat?.completados||{})[a.id]||false;
        html+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F3F4F6">
          <span style="font-size:13px;font-weight:500">${a.nombre} ${a.apellido}</span>
          <button onclick="ofToggleCompletado('${matId}','${a.id}')"
            style="padding:5px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;
            background:${comp?'#D1FAE5':'#F3F4F6'};color:${comp?'#065F46':'#6B7280'}">
            ${comp?'✅ Completado':'⬜ Incompleto'}
          </button>
        </div>`;
      } else {
        const v=ofAsistencia[`${a.id}_${enc.id}`]||'';
        const colors={P:'#D1FAE5',A:'#FEE2E2',T:'#FEF3C7','':'#F3F4F6'};
        const tColors={P:'#065F46',A:'#991B1B',T:'#92400E','':'#6B7280'};
        const labels={P:'Presente',A:'Ausente',T:'Tardanza','':'Sin marcar'};
        html+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F3F4F6">
          <span style="font-size:13px;font-weight:500">${a.nombre} ${a.apellido}</span>
          <button onclick="ofToggleAsist('${a.id}','${enc.id}')"
            style="padding:5px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;
            background:${colors[v]};color:${tColors[v]}">
            ${labels[v]}
          </button>
        </div>`;
      }
    });
  }
  html+='</div>';
  wrap.innerHTML=html;
}

function ofToggleCompletado(matId, alumId){
  const mat=ofMaterias.find(m=>String(m.id)===String(matId));
  if(!mat) return;
  if(!mat.completados) mat.completados={};
  mat.completados[alumId]=!mat.completados[alumId];
  ofSave();
  // Re-render table
  const allEncs=Object.values(ofEncuentros||{}).reduce(function(acc,v){return acc.concat(v||[]);},[]);
  const examEnc=allEncs.find(e=>e.esExamen&&String(e.materia||e.materiaId)===String(matId));
  if(examEnc) ofRenderAsistenciaTable(examEnc.id, matId);
  showToast(mat.completados[alumId]?'✅ Completado':'⬜ Incompleto', mat.completados[alumId]?'#16A34A':'#6B7280');
}
function ofExportar(){
  alert(`Datos actuales:\n• Alumnos: ${ofAlumnos.length}\n• Materias: ${ofMaterias.length}\n\nUsá el botón 💾 Exportar del inicio para guardar todos los datos.`);
}

let nvSelectedId=null;
let nvFiltro='ultimos30'; // 'ultimos30' | 'mas30' | 'historico'

function renderNuevos(){
  const search=(document.getElementById('nv-search')?.value||'').toLowerCase();
  const fGrupo=parseInt(document.getElementById('nv-fil-grupo')?.value)||null;
  const fGen=document.getElementById('nv-fil-gen')?.value||'';
  const fTipoGrupo=document.getElementById('nv-fil-tipo-grupo')?.value||'';

  const gsel=document.getElementById('nv-fil-grupo');
  if(gsel&&gsel.options.length<=1)
    S.groups.forEach(g=>{const o=document.createElement('option');o.value=g.id;o.textContent=g.name;gsel.appendChild(o);});

  const hoy=new Date(); hoy.setHours(0,0,0,0);
  const hace30=new Date(hoy); hace30.setDate(hace30.getDate()-30);

  let members;
  if(nvFiltro==='historico'){
    // Include both new-style (condicion='Historico') and old-style (estado='Baja') contacts
    members=S.members.filter(m=>m.condicion==='Historico'||m.estado==='Baja');
  } else {
    members=S.members.filter(m=>m.condicion==='Nuevo'&&m.estado!=='Baja');
    members=members.filter(m=>{
      const partes=(m.fechaRegistro||'').split('/');
      if(partes.length<3) return true; // sin fecha → mostrar siempre
      let yy=parseInt(partes[2]);
      if(yy<100) yy+=2000; // handle 2-digit year
      const fReg=new Date(yy,+partes[1]-1,+partes[0]);
      if(isNaN(fReg.getTime())) return true; // fecha inválida → mostrar siempre
      return nvFiltro==='ultimos30' ? fReg>=hace30 : fReg<hace30;
    });
  }
  if(search) members=members.filter(m=>fullName(m).toLowerCase().includes(search));
  if(fGrupo) members=members.filter(m=>m.grupoId===fGrupo);
  if(fGen)   members=members.filter(m=>m.genero===fGen);
  if(fTipoGrupo==='gdv'){
    var gdvIds=new Set((S.groups||[]).map(function(g){return Number(g.id);}));
    members=members.filter(function(m){return m.grupoId&&gdvIds.has(Number(m.grupoId));});
  } else if(fTipoGrupo==='ng'){
    var ngIds=new Set((S.ngComunidades||[]).map(function(ng){return Number(ng.id);}));
    members=members.filter(function(m){return m.grupoId&&ngIds.has(Number(m.grupoId));});
  }

  // Sort: unassigned seguimiento first, then by registration date
  members.sort(function(a,b){
    var aHas=a.seguimientoId?1:0;
    var bHas=b.seguimientoId?1:0;
    return aHas-bHas; // 0 (sin asignar) primero
  });

  const countEl=document.getElementById('nv-count');
  if(countEl) countEl.textContent=S.members.filter(m=>m.condicion==='Nuevo'&&m.estado!=='Baja').length;

  const wrap=document.getElementById('nv-list');
  if(!wrap) return;

  if(!members.length){
    wrap.innerHTML=`<div class="empty" style="background:#F9FAFB;border-radius:12px;padding:3rem">
      <div style="font-size:2.5rem;margin-bottom:1rem">🌱</div>
      <div style="font-size:14px;font-weight:600;color:#374151;margin-bottom:.5rem">Sin nuevos contactos</div>
      <div style="font-size:13px;color:#9CA3AF">Los miembros con Condición "Nuevo" aparecerán acá automáticamente</div>
    </div>`;
    return;
  }

  wrap.innerHTML=members.map(m=>{
    const allGids=[m.grupoId,...(m.grupoIds||[])].filter(Boolean).map(Number);
    const allAvailableGroups=[...(S.groups||[]),...(S.ngComunidades||[]).map(function(ng){return {id:ng.id,name:'🌱 '+ng.name};})];
    const memberGroups=allGids.map(gid=>allAvailableGroups.find(x=>Number(x.id)===gid)).filter(Boolean);
    const genBg=m.genero==='H'?'#DBEAFE':'#FCE7F3';
    const genColor=m.genero==='H'?'#1E40AF':'#9D174D';
    const edad=saCalcEdad(m.fnac);
    // Seguimiento display
    const segNombre=m.seguimientoNombre||'';
    const segLabel=segNombre
      ?`<span style="color:#1F4E79;cursor:pointer;text-decoration:underline dotted" onclick="nvEditSeguimiento(${m.id})">${segNombre}</span>`
      :`<span style="color:#F59E0B;cursor:pointer;font-weight:600" onclick="nvEditSeguimiento(${m.id})">⏳ Pendiente</span>`;
    const origenBadge=m.origen==='QR / Formulario'
      ?'<span style="background:#EDE9FE;color:#5B21B6;font-size:10px;padding:1px 7px;border-radius:99px">📱 QR</span>'
      :m.origen==='Carga manual'
      ?'<span style="background:#E0F2FE;color:#0369A1;font-size:10px;padding:1px 7px;border-radius:99px">✏️ Manual</span>'
      :'';

    return `<div class="card" style="margin-bottom:.75rem;border-left:4px solid #16A34A;padding:12px 14px">
      <div style="display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap">
        <div style="width:40px;height:40px;border-radius:50%;background:#F0FDF4;border:2px solid #86EFAC;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#16A34A;flex-shrink:0">
          ${initials(fullName(m))}
        </div>
        <div style="flex:1;min-width:160px">
          <div style="font-weight:700;font-size:14px;color:#1F2937">${fullName(m)} ${origenBadge}</div>
          <div style="font-size:12px;color:#6B7280;margin-top:3px;display:flex;flex-wrap:wrap;gap:6px;align-items:center">
            ${memberGroups.length?memberGroups.map(gr=>`<span style="color:#374151">${gr.name}</span>`).join(' · '):'<span style="color:#F59E0B">Sin grupo</span>'}
            ${m.tel?`<span>· 📱 ${m.tel}</span>`:''}
            ${nvCalcEdad(m.fnac)!==null?`<span>· ${nvCalcEdad(m.fnac)} años</span>`:''}
            <span style="margin-left:auto;color:#9CA3AF;font-size:11px">📅 ${m.fechaRegistro||'Sin fecha'}</span>
          </div>
          <div style="font-size:12px;margin-top:5px;display:flex;flex-wrap:wrap;gap:10px">
            ${m.comoNosConocio?`<span style="color:#6B7280">🔗 ${m.comoNosConocio}</span>`:''}
            <span>👤 Seguimiento: ${segLabel}</span>
          </div>
          ${m.motivoContacto?`<div style="font-size:12px;color:#374151;margin-top:4px;font-style:italic">💬 ${m.motivoContacto}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
          <span style="background:#FEF3C7;color:#92400E;font-size:11px;padding:3px 10px;border-radius:99px;font-weight:600">🌱 Nuevo</span>
          <button class="btn btn-sm" onclick="nvAbrirEditar(${m.id})">✏️ Editar</button>
          ${canGestionarNuevos()||isContactar()?`<button class="btn btn-sm btn-primary" onclick="nvOpenPromote(${m.id})">Gestionar →</button>`:''}
          ${isSuperAdmin()?`<button onclick="nvEliminarContacto(${m.id})" style="background:none;border:none;cursor:pointer;color:#DC2626;font-size:18px;padding:2px 6px" title="Eliminar registro">🗑️</button>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function nvOpenPromote(id){
  nvSelectedId=id;
  const m=S.members.find(x=>x.id===id);
  if(!m) return;
  document.getElementById('nv-promote-name').textContent=fullName(m);
  const segEl=document.getElementById('nv-promote-seg');
  if(segEl) segEl.textContent=m.seguimientoNombre||'Pendiente de asignar';
  nvRenderComentarios(m);
  // Show/hide buttons based on condition
  const isHistorico=m.condicion==='Historico'||m.estado==='Baja';
  const btnReactivar=document.getElementById('nv-btn-reactivar');
  const btnsMantener=document.getElementById('nv-btns-activo');
  if(btnReactivar) btnReactivar.style.display=isHistorico?'block':'none';
  if(btnsMantener) btnsMantener.style.display=isHistorico?'none':'flex';
  // Restrict condition buttons and seguimiento to Pastores/SuperAdmin
  const canGest=canGestionarNuevos();
  const accionesWrap=document.getElementById('nv-promote-acciones');
  if(accionesWrap) accionesWrap.style.display=canGest?'flex':'none';
  const segWrap=document.getElementById('nv-promote-seg-wrap');
  if(segWrap) segWrap.style.display=canGest?'block':'none';
  const noPermiso=document.getElementById('nv-promote-nopermiso');
  if(noPermiso) noPermiso.style.display=canGest?'none':'block';
  document.getElementById('nv-promote-overlay').style.display='flex';
}

function nvClosePromote(){
  document.getElementById('nv-promote-overlay').style.display='none';
  nvSelectedId=null;
}

function nvSelectSeguimiento(id, nombre, grupo){
  // Check if called from inline form or from list edit
  const formOverlay=document.getElementById('nv-form-overlay');
  if(formOverlay&&formOverlay.style.display==='flex'){
    document.getElementById('nv-mf-seguimiento-id').value=id;
    document.getElementById('nv-mf-seguimiento-label').textContent=nombre+(grupo?' — '+grupo:'');
  } else if(nvSelectedId){

    const m=S.members.find(x=>x.id===nvSelectedId);
    if(m){
      m.seguimientoId=id;
      m.seguimientoNombre=nombre+(grupo?' — '+grupo:'');
      saveK(SK.members,S.members);
      renderNuevos();
      showToast('✅ Seguimiento asignado a '+nombre,'#16A34A');
    }
  }
  document.getElementById('nv-seg-modal').style.display='none';
}

async function nvCanComentario(m){
  // Can comment: if can gestionar nuevos (ejecuta), or the assigned person
  if(!currentUser) return false;
  if(isSuperAdmin()) return true;
  if(canEjecutar('nuevos')) return true;
  if(m && m.seguimientoId && currentUser.id===m.seguimientoId) return true;
  return false;
}

function nvRenderComentarios(m){
  const lista=document.getElementById('nv-comentarios-lista');
  const inputWrap=document.getElementById('nv-comentario-input-wrap');
  if(!lista) return;
  const coms=(m.comentarios||[]).slice().sort((a,b)=>b.ts-a.ts);
  if(coms.length===0){
    lista.innerHTML='<div style="color:#9CA3AF;padding:4px 0">Sin comentarios aún.</div>';
  } else {
    lista.innerHTML=coms.map(c=>`
      <div style="padding:6px 10px;background:#F9FAFB;border-radius:8px;margin-bottom:6px;border-left:3px solid #1F4E79">
        <div style="color:#1F2937;margin-bottom:2px">${c.texto}</div>
        <div style="font-size:11px;color:#9CA3AF">${c.autor} · ${new Date(c.ts).toLocaleString('es-AR')}</div>
      </div>`).join('');
  }
  // Show/hide input based on permission
  if(inputWrap){
    inputWrap.style.display=nvCanComentario(m)?'block':'none';
  }
}

async function nvGuardarComentario(){
  const m=S.members.find(x=>x.id===nvSelectedId);
  if(!m||!nvCanComentario(m)) return;
  const txt=document.getElementById('nv-comentario-txt')?.value.trim();
  if(!txt){showToast('Escribí un comentario primero','#D97706');return;}
  if(!m.comentarios) m.comentarios=[];
  m.comentarios.push({
    texto:txt,
    autor:currentUser.name,
    ts:Date.now()
  });
  document.getElementById('nv-comentario-txt').value='';
  await saveK(SK.members,S.members);
  try{
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
  }catch(e){
    console.error('nvGuardarComentario Firebase error:',e);
    showToast('⚠️ Guardado sin sincronizar — verificá tu conexión','#DC2626');
  }
  nvRenderComentarios(m);
  showToast('💬 Comentario guardado','#16A34A');
}

async function nvPromover(condicion){
  if(!nvSelectedId) return;
  const m=S.members.find(x=>x.id===nvSelectedId);
  if(!m) return;
  const txtComentario=(document.getElementById('nv-comentario-txt')?.value||'').trim();
  if(!txtComentario||txtComentario.length<10){
    alert('El comentario es obligatorio (mín. 10 caracteres) para registrar cualquier cambio de condición.');
    document.getElementById('nv-comentario-txt')?.focus();
    return;
  }
  const condAnterior=m.condicion||'Nuevo';
  m.condicion=condicion;
  if(!m.comentarios) m.comentarios=[];
  const textoAccion=condicion==='Nuevo'
    ?`Mantenido como Nuevo (estaba: ${condAnterior})`
    :`Promovido/a de "${condAnterior}" a "${condicion}"`;
  m.comentarios.push({
    texto:`${textoAccion}. ${txtComentario}`,
    autor:currentUser?.name||'Sistema',
    ts:Date.now()
  });
  document.getElementById('nv-comentario-txt').value='';
  await saveK(SK.members,S.members);
  // Upload to Firebase so condicion change persists across devices
  try{
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
  }catch(e){
    showToast('⚠️ Guardado local OK pero no se pudo sincronizar con la nube. Verificá tu red.','#D97706');
  }
  nvClosePromote();
  renderNuevos();
  showToast(condicion==='Nuevo'
    ?'Condición mantenida como Nuevo'
    :`✅ ${fullName(m)} promovido/a a ${condicion}`, '#16A34A');
}

async function nvDarDeBaja(){
  if(!nvSelectedId) return;
  const m=S.members.find(x=>x.id===nvSelectedId);
  if(!m) return;
  // Use the comment textarea as motivo
  const txtComentario=(document.getElementById('nv-comentario-txt')?.value||'').trim();
  if(!txtComentario||txtComentario.length<10){
    alert('Para pasar a Histórico escribí un comentario de al menos 10 caracteres explicando el motivo.');
    document.getElementById('nv-comentario-txt')?.focus();
    return;
  }
  if(!confirm('¿Pasar a Histórico a '+fullName(m)+'?')) return;
  m.condicion='Historico';
  m.estado='Baja';
  m.fechaBaja=todayAA();
  m.motivoBaja=txtComentario;
  if(!m.comentarios) m.comentarios=[];
  m.comentarios.push({
    texto:`Pasado a Histórico. ${txtComentario}`,
    autor:currentUser?.name||'Sistema',
    ts:Date.now()
  });
  document.getElementById('nv-comentario-txt').value='';
  await saveK(SK.members,S.members);
  nvClosePromote();
  renderNuevos();
  showToast(fullName(m)+' pasado/a a Histórico','#6B7280');
}

async function nvEliminarContacto(id){
  var m=S.members.find(function(x){return Number(x.id)===Number(id);});
  if(!m) return;
  // Only allow deletion of Nuevo, Historico or Baja
  var condOk=['Nuevo','Historico'].includes(m.condicion);
  var estadoOk=m.estado==='Baja';
  if(!condOk && !estadoOk){
    alert('Solo se pueden eliminar contactos con condición Nuevo, Histórico o Estado Baja.');
    return;
  }
  if(!confirm('¿Eliminar a '+fullName(m)+' definitivamente? Esta acción no se puede deshacer.')) return;
  S.members=S.members.filter(function(x){return Number(x.id)!==Number(id);});
  await saveK(SK.members,S.members);
  try{
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
  }catch(e){
    S.members.push(m);
    alert('No se pudo eliminar en la nube. Verificá tu conexión.');
    return;
  }
  renderNuevos();
  showToast('🗑️ Registro eliminado','#DC2626');
}

async function nvGuardarEditar(){

function nvCalcEdad(fnac){
  if(!fnac) return null;
  // fnac format: DD/MM/AA or DD/MM/AAAA
  const parts=fnac.split('/');
  if(parts.length<3) return null;
  const dd=parseInt(parts[0]),mm=parseInt(parts[1]);
  let yy=parseInt(parts[2]);
  const hoy=new Date();
  if(yy<100){
    const curYY=hoy.getFullYear()%100;
    yy += (yy>curYY) ? 1900 : 2000;
  }
  let edad=hoy.getFullYear()-yy;
  const mDiff=hoy.getMonth()+1-mm;
  if(mDiff<0||(mDiff===0&&hoy.getDate()<dd)) edad--;
  return edad>=0&&edad<120?edad:null;
}

function nvCumplesBanner(){
  const hoy=new Date(); hoy.setHours(0,0,0,0); // compare at midnight
  const dd=hoy.getDate(), mm=hoy.getMonth()+1;
  const proximos=[];
  S.members.filter(Boolean).filter(m=>m.condicion==='Nuevo'&&m.estado!=='Baja'&&m.fnac).forEach(m=>{
    const parts=m.fnac.split('/');
    if(parts.length<3) return;
    const dNac=parseInt(parts[0]),mNac=parseInt(parts[1]);
    // Days until birthday this year
    const cumpleEsteAnio=new Date(hoy.getFullYear(),mNac-1,dNac);
    if(cumpleEsteAnio<hoy) cumpleEsteAnio.setFullYear(hoy.getFullYear()+1);
    const dias=Math.floor((cumpleEsteAnio-hoy)/(1000*60*60*24));
    if(dias<=15) proximos.push({nombre:m.nombre+' '+m.apellido,dias,dNac,mNac});
  });
  const wrap=document.getElementById('nv-cumples-wrap');
  if(!wrap) return;
  wrap.style.display='block';
  if(!proximos.length){
    wrap.innerHTML='<div style="font-size:13px;color:#92400E;font-weight:600">🎂 Sin cumpleaños en los próximos 15 días</div>';
    return;
  }
  proximos.sort((a,b)=>a.dias-b.dias);
  wrap.style.display='block';
  wrap.innerHTML='<div style="font-size:13px;color:#92400E;font-weight:600;margin-bottom:6px">🎂 Próximos cumpleaños en Nuevos</div>'+
    proximos.map(p=>{
      const cumpleDate=new Date(new Date().getFullYear()+(p.dias>0&&new Date().getMonth()+1>p.mNac?1:0),p.mNac-1,p.dNac);
      const diasSemana=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'][cumpleDate.getDay()];
      const fechaStr=diasSemana+' '+String(p.dNac).padStart(2,'0')+'/'+String(p.mNac).padStart(2,'0');
      const diasLabel=p.dias===0?'HOY':p.dias===1?'Mañana':'en '+p.dias+' días';
      return `<div style="display:flex;align-items:center;gap:12px;padding:5px 0;border-bottom:1px solid #FDE68A">
        <span style="font-size:13px;font-weight:600;color:#78350F;flex:1">🎂 ${p.nombre}</span>
        <span style="font-size:13px;font-weight:700;color:#B45309;min-width:80px">${diasLabel}</span>
        <span style="font-size:12px;color:#92400E">${fechaStr}</span>
      </div>`;
    }).join('');
}

function nvBuildGrupoSelector(selId, selectedId){
  var sel=document.getElementById(selId);
  if(!sel) return;
  // Limpiar opciones excepto la primera
  while(sel.options.length>1) sel.remove(1);
  // Grupos GdV
  var gdvGroups=S.groups.filter(function(g){return g.type!=='ng';});
  if(gdvGroups.length){
    var ogGdv=document.createElement('optgroup');
    ogGdv.label='Grupos de Vida';
    gdvGroups.forEach(function(g){
      var o=document.createElement('option');
      o.value='gdv_'+g.id;
      o.textContent=g.name+(g.type?' ('+g.type+')':'');
      if(selectedId==='gdv_'+g.id) o.selected=true;
      ogGdv.appendChild(o);
    });
    sel.appendChild(ogGdv);
  }
  // Comunidades NG
  var ngGroups=S.ngComunidades||[];
  if(ngGroups.length){
    var ogNg=document.createElement('optgroup');
    ogNg.label='Nuevas Generaciones';
    ngGroups.forEach(function(g){
      var o=document.createElement('option');
      o.value='ng_'+g.id;
      o.textContent=g.nombre||g.name;
      if(selectedId==='ng_'+g.id) o.selected=true;
      ogNg.appendChild(o);
    });
    sel.appendChild(ogNg);
  }
}

function nvGetGrupoIdFromVal(val){
  if(!val) return {grupoId:null, ngComunidadId:null};
  if(val.startsWith('gdv_')) return {grupoId:parseInt(val.replace('gdv_','')), ngComunidadId:null};
  if(val.startsWith('ng_')) return {grupoId:null, ngComunidadId:parseInt(val.replace('ng_',''))};
  return {grupoId:null, ngComunidadId:null};
}

function nvGetGrupoValFromMember(m){

}

async function nvSaveInlineForm(){
  try{
    const nombre=(document.getElementById('nv-mf-nombre')?.value||'').trim();
    const apellido=(document.getElementById('nv-mf-apellido')?.value||'').trim();
    const cel=(document.getElementById('nv-mf-cel')?.value||'').trim();
    const fnac=(document.getElementById('nv-mf-fnac')?.value||'').trim();
    const genero=document.getElementById('nv-mf-genero')?.value||'H';
    const barrio=(document.getElementById('nv-mf-barrio')?.value||'').trim();
    const como=document.getElementById('nv-mf-como')?.value||'';
    const motivo=(document.getElementById('nv-mf-motivo')?.value||'').trim();
    const segId=document.getElementById('nv-mf-seguimiento-id')?.value||'';
    const segLabel=document.getElementById('nv-mf-seguimiento-label')?.textContent||'';
    const dni=(document.getElementById('nv-mf-dni')?.value||'').trim();
    const err=document.getElementById('nv-form-error');
    if(!nombre||!apellido||!cel){
      const msg='Completá los campos obligatorios: Nombre, Apellido y Celular (*)';
      if(err){err.textContent=msg;err.style.display='block';}
      else alert(msg);
      return;
    }
    if(err) err.style.display='none';
    const nuevo={
      id:Date.now(),nombre,apellido,
      tel:cel,genero,grupoId:null,
      condicion:'Nuevo',estado:'Activo',
      dir:barrio,fnac,roles:[],
      comoNosConocio:como,
      motivoContacto:motivo,
      seguimientoId:segId?parseInt(segId):null,
      seguimientoNombre:segId?segLabel:'',
      fechaRegistro:todayAA(),
      origen:'Carga manual',
      dni:dni,
      ...nvGetGrupoIdFromVal(document.getElementById('nv-mf-grupo')?.value||'')
    };
    S.members.push(nuevo);
    // Use saveK so _local_ts_ gets updated (protects against Firebase overwrite on next download)
    await saveK(SK.members, S.members);
    // Upload to Firebase immediately
    try{
      if(typeof window.fbUpload==='function') await window.fbUpload(true);
    }catch(e){
      S.members=S.members.filter(function(m){return m.id!==nuevo.id;});
      throw new Error('No se pudo guardar en la nube. Verificá tu conexión e intentá de nuevo.');
    }
    nvCloseInlineForm();
    showToast('✅ '+nombre+' '+apellido+' agregado a Nuevos Contactos','#16A34A');
  }catch(e){
    console.error('nvSaveInlineForm error:',e);
    const stack=(e.stack||'').split('\n').slice(0,6).join('\n');
    alert('Error: '+e.message+'\n\nDónde:\n'+stack);
  }
}

async function cfgSavePermisos(){
  // Guardar en localStorage primero
  await savePermisos();
  const verificado=localStorage.getItem('gdv_permisos');
  if(!verificado||verificado==='{}'){
    alert('❌ Error al guardar permisos.');
    return;
  }
  window._permisosEditing=false;
  // Usar fbSavePermisos para subir con gdv_permisos_ts correcto
  // Esto garantiza que el timestamp específico de permisos se guarda en Firebase
  // y el download no los pisa al recargar
  try{
    const ts=Date.now();
    if(typeof window.fbSavePermisos==='function'){
      await window.fbSavePermisos(verificado);
    } else {
      await window.fbUpload(true);
    }
    localStorage.setItem('_local_ts_gdv_permisos', String(ts));
    showToast('✅ Permisos guardados ☁️','#16A34A');
  }catch(e){
    showToast('⚠️ Permisos guardados localmente pero NO en la nube','#D97706');
  }
  setTimeout(function(){
    document.querySelectorAll('[id^="cfg-tab-"]').forEach(b=>b.className='btn btn-sm');
    const wrap=document.getElementById('cfg-content');
    if(wrap) wrap.innerHTML='<div class="empty" style="padding:2rem;color:#9CA3AF;text-align:center">Seleccioná una sección para configurar.</div>';
    const ph=document.getElementById('cfg-placeholder');
    if(ph) ph.style.display='';
  }, 800);
}

let roleModalEditingId=null;
let roleModalCallback=null; // function to call after save to re-render

function openRoleModal(id, onSave){
  roleModalEditingId=id||null;
  roleModalCallback=onSave||null;
  document.getElementById('role-modal-title').textContent=id?'Editar función':'Nueva función';
  if(id){
    const r=S.roles.find(x=>x.id===id);
    if(!r) return;
    document.getElementById('rm-nombre').value=r.name;
    document.getElementById('rm-color').value=r.color;
    document.getElementById('rm-desc').value=r.desc||'';
  } else {
    document.getElementById('rm-nombre').value='';
    document.getElementById('rm-color').value='#1F4E79';
    document.getElementById('rm-desc').value='';
  }
  const overlay=document.getElementById('role-modal-overlay');
  overlay.style.display='flex';
}

function closeRoleModal(){
  document.getElementById('role-modal-overlay').style.display='none';
  roleModalEditingId=null;
}

async function saveRoleModal(){
  const name=document.getElementById('rm-nombre').value.trim();
  if(!name){alert('Ingresá un nombre para el rol');return;}
  const color=document.getElementById('rm-color').value;
  const desc=document.getElementById('rm-desc').value.trim();
  if(roleModalEditingId){
    Object.assign(S.roles.find(x=>x.id===roleModalEditingId),{name,color,desc});
  } else {
    const id=name.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'')+Date.now();
    S.roles.push({id,name,color,desc});
  }
  await saveK(SK.roles,S.roles);
  try{
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
  }catch(e){
    console.error('saveRoleModal Firebase error:',e);
    showToast('⚠️ Guardado sin sincronizar — verificá tu conexión','#DC2626');
  }
  closeRoleModal();
  if(roleModalCallback) roleModalCallback();
}

async function deleteRoleGlobal(id, callback){
  const r=S.roles.find(x=>x.id===id);
  if(!confirm(`¿Eliminar el rol "${r?.name}"? Se quitará de todos los miembros.`)) return;
  S.roles=S.roles.filter(x=>x.id!==id);
  S.members.forEach(m=>{m.roles=(m.roles||[]).filter(rid=>rid!==id);});
  await saveK(SK.roles,S.roles);
  try{
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
  }catch(e){
    console.error('deleteRoleGlobal Firebase error:',e);
    showToast('⚠️ Guardado sin sincronizar — verificá tu conexión','#DC2626');
  }
  await saveK(SK.members,S.members);
  if(callback) callback();
}

function renderHomeCumples(){
  var wrap=document.getElementById('home-cumple-wrap');
  if(!wrap) return;

  var hoy=new Date(); hoy.setHours(0,0,0,0);
  var hoyMes=hoy.getMonth()+1;
  var hoyDia=hoy.getDate();

  // Get members with birthdate, calculate days until next birthday
  var conCumple=S.members.filter(function(m){
    return m.estado!=='Baja' && m.fnac && m.fnac.length>=7;
  }).map(function(m){
    var parts=m.fnac.split('-');
    var mes=parseInt(parts[1]);
    var dia=parseInt(parts[2]);
    var anio=parseInt(parts[0]);
    // Calculate age this year
    var edadEsteAnio=hoy.getFullYear()-anio;

    // Days until birthday this year
    var cumpleEsteAnio=new Date(hoy.getFullYear(), mes-1, dia);
    if(cumpleEsteAnio<hoy){
      // Already passed this year, calculate for next year
      cumpleEsteAnio=new Date(hoy.getFullYear()+1, mes-1, dia);
      edadEsteAnio++;
    }
    var diff=Math.floor((cumpleEsteAnio-hoy)/(1000*60*60*24));
    var g=S.groups.find(function(x){return x.id===m.grupoId;});
    return {
      nombre:m.nombre+' '+m.apellido,
      grupo:g?g.name:'',
      mes:mes, dia:dia,
      edad:edadEsteAnio,
      diff:diff,
      genero:m.genero
    };
  }).filter(function(m){ return m.diff<=15; })
    .sort(function(a,b){ return a.diff-b.diff; });

  if(!conCumple.length){
    wrap.innerHTML='<div class="card" style="border-left:4px solid #F59E0B;padding:10px 14px;font-size:13px;color:#92400E">🎂 Sin cumpleaños en los próximos 15 días</div>';
    return;
  }

  var html='<div class="card" style="border-left:4px solid #F59E0B">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">';
  html+='<div class="card-title" style="margin:0">🎂 Próximos cumpleaños <span style="font-size:12px;color:#6B7280;font-weight:400">(próximos 15 días)</span></div>';
  html+='<span style="font-size:12px;color:#F59E0B;font-weight:600">'+conCumple.length+' cumpleaños</span>';
  html+='</div>';

  conCumple.forEach(function(m){
    var badge='';
    var bgColor='#FFFBEB';
    if(m.diff===0){
      badge='<span style="background:#FEF3C7;color:#92400E;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600">🎉 ¡HOY!</span>';
      bgColor='#FEF9C3';
    } else if(m.diff===1){
      badge='<span style="background:#FEE2E2;color:#991B1B;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600">🔔 Mañana</span>';
    } else if(m.diff<=7){
      badge='<span style="background:#FEF3C7;color:#92400E;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600">En '+m.diff+' días</span>';
    } else {
      badge='<span style="background:#F3F4F6;color:#6B7280;font-size:11px;padding:2px 8px;border-radius:99px">En '+m.diff+' días</span>';
    }
    var genColor=m.genero==='H'?'#1E40AF':'#9D174D';
    var genBg=m.genero==='H'?'#DBEAFE':'#FCE7F3';
    html+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #FEF3C7;background:'+bgColor+';margin:0 -4px;padding:8px 4px">';
    html+='<div style="font-size:20px">🎂</div>';
    html+='<div style="flex:1">';
    html+='<div style="font-size:13px;font-weight:600;color:#1F2937">'+m.nombre;
    html+=' <span style="background:'+genBg+';color:'+genColor+';font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600">'+m.genero+'</span>';
    html+='</div>';
    html+='<div style="font-size:11px;color:#6B7280">'+m.grupo+(m.grupo?' · ':'')+m.dia+'/'+m.mes+' — cumple '+m.edad+' años</div>';
    html+='</div>';
    html+=badge;
    html+='</div>';
  });

  html+='</div>';
  wrap.innerHTML=html;
}

// Marca un campo como inválido visualmente
function markFieldError(el, msg){
  if(!el) return;
  el.style.border='2px solid #DC2626';
  el.style.background='#FEF2F2';
  el.title=msg||'Campo inválido';
  el.focus();
  setTimeout(function(){ el.style.border=''; el.style.background=''; el.title=''; }, 4000);
}
function fmtFnac(el){
  var pos=el.selectionStart;
  var raw=el.value.replace(/\D/g,'').slice(0,6); // solo 6 dígitos max
  var out='';
  for(var i=0;i<raw.length;i++){
    if(i===2||i===4) out+='/';
    out+=raw[i];
  }
  el.value=out;
  // Ajustar cursor: si estamos justo después de una barra, avanzar uno
  var newPos=pos;
  if(out.length>pos && out[pos-1]==='/' && pos>0) newPos=pos+1;
  try{ el.setSelectionRange(newPos,newPos); }catch(e){}
}

// Valida que el valor sea dd/mm/aa con números reales
function validarFnac(val){
  if(!val) return true; // opcional — vacío es OK
  var p=val.split('/');
  if(p.length!==3) return false;
  var d=parseInt(p[0]),m=parseInt(p[1]),a=parseInt(p[2]);
  if(isNaN(d)||isNaN(m)||isNaN(a)) return false;
  if(d<1||d>31||m<1||m>12||a<0||a>99) return false;
  if(p[0].length!==2||p[1].length!==2||p[2].length!==2) return false;
  return true;
}

function fmtFechaIngreso(el){ fmtFnac(el); }

let discEditingPasoId=null;

function discTab(tab, btn){
  document.querySelectorAll('[id^="disc-tab-"]').forEach(function(b){b.className='btn btn-sm';});
  if(btn) btn.className='btn btn-primary btn-sm';
  var c=document.getElementById('disc-content');
  if(!c) return;
  if(tab==='dashboard') discRenderDashboard(c);
  else if(tab==='pasos') discRenderPasos(c);
  else if(tab==='cargar') discRenderCargar(c);
  else if(tab==='registros') discRenderRegistros(c);
}

function discRenderDashboard(c){
  // Determine which pasos to show
  var pasosToShow;
  if(isSuperAdmin()||canEjecutar('disc_pasos')||canEjecutar('disc_registros')){
    // Ver todos
    pasosToShow=S.discPasos;
  } else {
    // Discipulador solo ve su paso
    pasosToShow=S.discPasos.filter(function(p){
      return p.discipuladorId&&S.members.find(function(m){
        return m.id===p.discipuladorId&&fullName(m).toLowerCase()===currentUser.name.toLowerCase();
      });
    });
  }

  if(!pasosToShow.length){
    c.innerHTML='<div class="empty">No tenés ningún paso asignado como discipulador</div>';
    return;
  }

  var html='';
  pasosToShow.forEach(function(paso){
    var disc=paso.discipuladorId?S.members.find(function(m){return m.id===paso.discipuladorId;}):null;
    var mems=paso.miembros.map(function(id){return S.members.find(function(m){return m.id===id;});}).filter(Boolean);
    var recs=S.discRecords.filter(function(r){return r.pasoId===paso.id;});

    // Stats
    var totalEnc=recs.length;
    var capsUsadas=[...new Set(recs.map(function(r){return r.capitulo;}))];

    // Per member stats
    var memberStats=mems.map(function(m){
      var presencias=recs.filter(function(r){return r.asistencia[m.id]&&r.asistencia[m.id].state==='presente';}).length;
      var pct=totalEnc>0?Math.round(presencias/totalEnc*100):0;
      var completado=(paso.completados||{})[m.id]||false;
      return {m:m,presencias:presencias,pct:pct,completado:completado};
    });

    var completados=memberStats.filter(function(x){return x.completado;}).length;
    var isActivo=paso.estado==='Activo';

    html+='<div class="card" style="margin-bottom:1.25rem;border-left:4px solid '+(isActivo?'#7C3AED':'#9CA3AF')+'">';
    // Header
    html+='<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:1rem">';
    html+='<div>';
    var nivelColors={'Inicial':'#3B82F6','Intermedio':'#8B5CF6','Avanzado':'#EC4899'};
    var nc=nivelColors[paso.nivel]||'#6B7280';
    html+='<div style="display:flex;align-items:center;gap:8px">';
    html+='<div style="font-size:16px;font-weight:700;color:#1F4E79">'+paso.nombre+'</div>';
    html+='<span style="background:'+nc+'22;color:'+nc+';font-size:11px;padding:2px 10px;border-radius:99px;font-weight:600">'+(paso.nivel||'')+'</span>';
    html+='</div>';
    html+='<div style="font-size:12px;color:#6B7280;margin-top:3px">';
    html+='Discipulador: <strong>'+(disc?fullName(disc):'Sin asignar')+'</strong>';
    html+='</div></div>';
    html+='<span class="badge '+(isActivo?'b-ok':'b-muted')+'">'+(isActivo?'Activo':'Inactivo')+'</span>';
    html+='</div>';

    // KPIs
    html+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:1rem">';
    html+='<div class="stat" style="padding:10px"><span class="stat-val" style="font-size:1.5rem">'+mems.length+'</span><span class="stat-lbl">Alumnos</span></div>';
    html+='<div class="stat" style="padding:10px"><span class="stat-val" style="font-size:1.5rem">'+totalEnc+'</span><span class="stat-lbl">Encuentros</span></div>';
    html+='<div class="stat" style="padding:10px"><span class="stat-val" style="font-size:1.5rem;color:#7C3AED">'+capsUsadas.length+'/'+paso.capitulos.length+'</span><span class="stat-lbl">Caps. dados</span></div>';
    html+='<div class="stat" style="padding:10px"><span class="stat-val" style="font-size:1.5rem;color:#16A34A">'+completados+'/'+mems.length+'</span><span class="stat-lbl">Completados</span></div>';
    html+='</div>';

    // Member progress table
    if(mems.length){
      html+='<div style="font-size:12px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Progreso individual</div>';
      memberStats.forEach(function(ms){
        var barColor=ms.pct>=75?'#16A34A':ms.pct>=50?'#1F4E79':ms.pct>=25?'#D97706':'#DC2626';
        var genBg=ms.m.genero==='H'?'#DBEAFE':'#FCE7F3';
        var genColor=ms.m.genero==='H'?'#1E40AF':'#9D174D';
        html+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F3F4F6;flex-wrap:wrap">';
        html+='<span style="background:'+genBg+';color:'+genColor+';font-size:11px;padding:1px 7px;border-radius:4px;font-weight:600;flex-shrink:0">'+ms.m.genero+'</span>';
        html+='<span style="font-size:13px;font-weight:600;flex:1;min-width:120px">'+fullName(ms.m)+'</span>';
        html+='<div style="flex:2;min-width:100px">';
        html+='<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">';
        html+='<span style="color:#6B7280">'+ms.presencias+'/'+totalEnc+' enc.</span>';
        html+='<strong style="color:'+barColor+'">'+ms.pct+'%</strong></div>';
        html+='<div class="pbar-bg"><div style="height:6px;border-radius:999px;background:'+barColor+';width:'+ms.pct+'%"></div></div>';
        html+='</div>';
        // Completado toggle
        if(canAdminDisc()){
          html+='<button onclick="discToggleCompletado('+paso.id+','+ms.m.id+')" '
            +'style="padding:4px 12px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:600;flex-shrink:0;'
            +(ms.completado?'background:#D1FAE5;color:#065F46':'background:#F3F4F6;color:#6B7280')+'">'

        } else {

        }
        html+='</div>';
      });
    }
    html+='</div>';
  });
  c.innerHTML=html;
}

async function discCheckAprobacion(pasoId, memberId){
  // Max 1 ausencia (Justificado = Presente)
  var records=S.discRecords.filter(function(r){return r.pasoId===pasoId;});
  var ausencias=records.filter(function(r){
    var att=r.asistencia&&r.asistencia[memberId];
    return att&&att.state==='ausente';
  }).length;
  return ausencias<=1;
}

async function discToggleCompletado(pasoId, memberId){
  var paso=S.discPasos.find(function(p){return p.id===pasoId;});
  if(!paso) return;
  if(!paso.completados) paso.completados={};
  var yaCompletado=paso.completados[memberId];

  if(!yaCompletado){
    // Validar aprobacion: max 1 ausencia
    var aprueba=await discCheckAprobacion(pasoId,memberId);
    if(!aprueba){
      if(isSuperAdmin()||canEjecutar('disc_pasos')){
        if(!confirm('Este miembro tiene más de 1 ausencia. Como Admin podés aprobar igual. ¿Confirmar Completado?')) return;
      } else {
        alert('El miembro tiene más de 1 ausencia. No cumple el requisito de aprobación.');
        return;
      }
    }
    paso.completados[memberId]=true;
    // Guardar fecha de completado (último encuentro de este paso)
    if(!paso.fechasCompletado) paso.fechasCompletado={};
    var records=S.discRecords.filter(function(r){return r.pasoId===pasoId;});
    var ultFecha=records.length?records.sort(function(a,b){return b.fecha.localeCompare(a.fecha);})[0].fecha:todayAA();
    paso.fechasCompletado[memberId]=ultFecha;
    // Auto-alimentar Formación del miembro
    var miembro=S.members.find(function(m){return m.id==memberId;});
    if(miembro){
      if(!miembro.formacion) miembro.formacion=[];
      var yaEnForm=miembro.formacion.find(function(f){return f.pasoId===pasoId&&f.fuente==='auto';});
      if(!yaEnForm){
        miembro.formacion.push({pasoId,pasoNombre:paso.nombre,fechaCompletado:ultFecha,fuente:'auto'});
        await saveK(SK.members,S.members);
  try{
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
  }catch(e){
    console.error('discToggleCompletado Firebase error:',e);
    showToast('⚠️ Guardado sin sincronizar — verificá tu conexión','#DC2626');
  }
      }
    }
  } else {
    paso.completados[memberId]=false;
  }

  await saveK(SK.discPasos,S.discPasos);
  var c=document.getElementById('disc-content');
  if(c) discRenderDashboard(c);
  showToast(paso.completados[memberId]?'✅ Marcado como Completado':'⬜ Marcado como Incompleto',
    paso.completados[memberId]?'#16A34A':'#6B7280');
}

    return '<option value="'+m.id+'"'+(paso.discipuladorId===m.id?' selected':'')+'>'+fullName(m)+'</option>';
  }).join('');

  // Members checkboxes
  var memberChecks=S.members.filter(function(m){return m.estado!=='Baja';}).map(function(m){

    superFields=
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem">'
      +'<div><label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:6px">Nombre del Paso</label>'
      +'<input type="text" id="disc-modal-nombre" value="'+paso.nombre+'" style="width:100%"></div>'
      +'<div><label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:6px">Nivel</label>'
      +'<select id="disc-modal-nivel" style="width:100%">'

      +'<option value="Intermedio"'+(paso.nivel==='Intermedio'?' selected':'')+'>🟣 Intermedio</option>'
      +'<option value="Avanzado"'+(paso.nivel==='Avanzado'?' selected':'')+'>🩷 Avanzado</option>'

      +'<div style="margin-top:0"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'

function discFilterMembers(query){
  var q=query.toLowerCase();
  document.querySelectorAll('#disc-mem-list label').forEach(function(lbl){
    lbl.style.display=lbl.textContent.toLowerCase().includes(q)?'':'none';
  });
}

function discAddCap(){
  var list=document.getElementById('disc-caps-list');
  var div=document.createElement('div');
  div.style.cssText='display:flex;gap:6px;margin-bottom:6px';
  div.innerHTML='<input type="text" placeholder="Nombre del capítulo..." class="disc-cap-inp" style="flex:1;font-size:13px">'
    +'<button class="btn btn-sm btn-danger" onclick="this.parentElement.remove()" style="flex-shrink:0">✕</button>';
  list.appendChild(div);
}

function discCloseModal(){
  document.getElementById('disc-paso-modal').style.display='none';
  discEditingPasoId=null;
}

async function discSavePaso(){
  var paso=S.discPasos.find(function(p){return p.id===discEditingPasoId;});
  if(!paso) return;
  // Super Admin can rename and change nivel/chapters
  if(hasRole('super_admin')){
    var nombre=document.getElementById('disc-modal-nombre')?.value.trim();
    if(nombre) paso.nombre=nombre;
    var nivel=document.getElementById('disc-modal-nivel')?.value;
    if(nivel) paso.nivel=nivel;
    paso.capitulos=[...document.querySelectorAll('.disc-cap-inp')].map(function(inp){return inp.value.trim();}).filter(Boolean);
  }
  // Admin Disc and Super Admin can assign discipulador and members
  paso.discipuladorId=parseInt(document.getElementById('disc-modal-disc').value)||null;
  paso.miembros=[...document.querySelectorAll('.disc-mem-cb:checked')].map(function(cb){return parseInt(cb.value);});
  if(!paso.completados) paso.completados={};
  await saveK(SK.discPasos,S.discPasos);
  try{
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
  }catch(e){
    console.error('discSavePaso Firebase error:',e);
    showToast('⚠️ Guardado sin sincronizar — verificá tu conexión','#DC2626');
  }
  discCloseModal();
  discTab('pasos', document.getElementById('disc-tab-pasos'));
  showToast('✅ Paso guardado correctamente','#16A34A');
}

async function discToggleEstado(pasoId){
  var paso=S.discPasos.find(function(p){return p.id===pasoId;});
  if(!paso) return;
  paso.estado=paso.estado==='Activo'?'Inactivo':'Activo';
  await saveK(SK.discPasos,S.discPasos);
  try{
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
  }catch(e){
    console.error('discToggleEstado Firebase error:',e);
    showToast('⚠️ Guardado sin sincronizar — verificá tu conexión','#DC2626');
  }
  discTab('pasos', document.getElementById('disc-tab-pasos'));
}

    +'<div id="disc-asistencia-wrap"></div>'

    +'<div id="disc-alert" class="hidden" style="margin-top:8px;padding:10px;border-radius:8px;background:#D1FAE5;color:#065F46;font-size:13px"></div>'
    +'</div>';
}

function discLoadPasoForm(){
  var pasoId=parseInt(document.getElementById('disc-sel-paso').value)||null;
  discSelectedPasoId=pasoId;
  var paso=pasoId?S.discPasos.find(function(p){return p.id===pasoId;}):null;

  // Load chapters
  var capSel=document.getElementById('disc-sel-cap');
  if(paso&&paso.capitulos.length){
    capSel.innerHTML=paso.capitulos.map(function(c){
      return '<option value="'+c.replace(/"/g,'&quot;')+'">'+c+'</option>';
    }).join('');
  } else {
    capSel.innerHTML='<option value="">Sin capítulos definidos</option>';
  }

  // Load members
  var wrap=document.getElementById('disc-asistencia-wrap');
  if(!paso||!paso.miembros.length){
    wrap.innerHTML='<div class="empty">Seleccioná un paso con miembros asignados</div>';
    discFacAtt={};
    return;
  }

  discFacAtt={};
  var mems=paso.miembros.map(function(id){return S.members.find(function(m){return m.id===id;});}).filter(Boolean);
  // Default: Ausente
  mems.forEach(function(m){discFacAtt[m.id]={name:fullName(m),genero:m.genero,state:'ausente'};});

  wrap.innerHTML='<div class="card-title">👥 Asistencia</div>'
    +mems.map(function(m){
      var genBg=m.genero==='H'?'#DBEAFE':'#FCE7F3';
      var genColor=m.genero==='H'?'#1E40AF':'#9D174D';
      return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F3F4F6">'
        +'<div style="display:flex;align-items:center;gap:8px">'
        +'<span style="background:'+genBg+';color:'+genColor+';font-size:11px;padding:2px 7px;border-radius:4px;font-weight:600">'+m.genero+'</span>'
        +'<span style="font-size:13px;font-weight:500">'+fullName(m)+'</span>'
        +'</div>'
        +'<button id="disc-att-'+m.id+'" onclick="discToggleAtt('+m.id+')" '
        +'style="padding:5px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:#FEE2E2;color:#991B1B">Ausente</button>'
        +'</div>';
    }).join('');
}

function discToggleAtt(memberId){
  if(!discFacAtt[memberId]) return;
  var cur=discFacAtt[memberId].state;
  var next=cur==='ausente'?'presente':cur==='presente'?'justificado':'ausente';
  discFacAtt[memberId].state=next;
  var btn=document.getElementById('disc-att-'+memberId);
  if(btn){
    btn.style.background=next==='presente'?'#D1FAE5':next==='justificado'?'#FEF3C7':'#FEE2E2';
    btn.style.color=next==='presente'?'#065F46':next==='justificado'?'#92400E':'#991B1B';
    btn.textContent=next==='presente'?'Presente':next==='justificado'?'Justificado':'Ausente';
  }
}

async function discGuardarAsistencia(){
  var pasoId=discSelectedPasoId;
  var fecha=document.getElementById('disc-fecha').value;
  var capitulo=document.getElementById('disc-sel-cap').value;
  if(!pasoId||!fecha||!capitulo){
    alert('Completá Paso, Fecha y Capítulo');return;
  }
  if(!Object.keys(discFacAtt).length){alert('No hay miembros en este paso');return;}

  // Check for duplicate week (same paso + same ISO week)
  var semana=getISOWeek(fecha);
  var anio=new Date(fecha).getFullYear();
  var yaExiste=S.discRecords.find(function(r){
    if(r.pasoId!==pasoId) return false;
    return getISOWeek(r.fecha)===semana && new Date(r.fecha).getFullYear()===anio;
  });
  if(yaExiste){
    alert('Ya existe un registro para la Semana '+semana+' en este Paso.');
    return;
  }

  var paso=S.discPasos.find(function(p){return p.id===pasoId;});
  S.discRecords.push({
    id:Date.now(),pasoId,pasoNombre:paso?paso.nombre:'',
    fecha,capitulo,asistencia:{...discFacAtt},ts:new Date().toISOString(),_ts:Date.now()
  });
  await saveK(SK.discRecords,S.discRecords);
  let dCloudOk=false;
  try{
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
    dCloudOk=true;
  }catch(e){
    S.discRecords.pop();
    var alErr=document.getElementById('disc-alert');
    if(alErr){alErr.textContent='❌ Error al guardar en la nube. Verificá tu conexión e intentá de nuevo.';alErr.classList.remove('hidden');}
    return;
  }
  var al=document.getElementById('disc-alert');
  al.textContent=dCloudOk?'✅ Asistencia guardada ☁️':'⚠️ Guardada sin sincronizar — reintentá';
  al.classList.remove('hidden');
  setTimeout(function(){al.classList.add('hidden');},4000);
}

// ── Registros ──
async function discDeleteRecord(id){
  if(!confirm('¿Eliminar este registro? Los dashboards se actualizarán.')) return;
  S.discRecords=S.discRecords.filter(function(r){return r.id!==id;});
  await saveK(SK.discRecords,S.discRecords);
  try{
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
  }catch(e){
    console.error('discDeleteRecord Firebase error:',e);
    showToast('⚠️ Guardado sin sincronizar — verificá tu conexión','#DC2626');
  }
  var c=document.getElementById('disc-registros-wrap');
  if(c) discRenderRegistros(c);
  discRenderDashboard(document.getElementById('disc-dashboard-wrap'));
}

function discEditRecord(id){
  var r=S.discRecords.find(function(x){return x.id===id;});
  if(!r) return;
  // Show edit modal
  var overlay=document.getElementById('disc-edit-overlay');
  if(!overlay){
    overlay=document.createElement('div');
    overlay.id='disc-edit-overlay';
    overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;display:flex;align-items:center;justify-content:center;padding:1rem';
    overlay.innerHTML='<div style="background:#fff;border-radius:14px;padding:1.5rem;width:100%;max-width:420px;max-height:90vh;overflow-y:auto">'
      +'<div style="font-size:15px;font-weight:700;color:#1F4E79;margin-bottom:1rem">✏️ Editar registro</div>'
      +'<div id="disc-edit-body"></div>'
      +'<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem">'
      +'<button class="btn" onclick="discCloseEdit()">Cancelar</button>'
      +'<button class="btn btn-primary" onclick="discSaveEdit()">💾 Guardar cambios</button>'
      +'</div></div>';
    document.body.appendChild(overlay);
  }
  window._discEditId=id;
  var att=Object.entries(r.asistencia||{});
  document.getElementById('disc-edit-body').innerHTML=
    '<div style="font-size:13px;color:#6B7280;margin-bottom:.75rem">Fecha: <strong>'+fmt(r.fecha)+'</strong> · '+r.pasoNombre+' · '+r.capitulo+'</div>'
    +'<div style="font-size:13px;font-weight:600;color:#374151;margin-bottom:.5rem">Asistencia:</div>'
    +att.map(function(entry){
      var k=entry[0], v=entry[1];
      return '<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #F3F4F6">'
        +'<span style="font-size:14px;flex:1">'+v.name+'</span>'
        +'<select id="disc-edit-'+k+'" style="padding:4px 8px;border-radius:6px;border:1px solid #E5E7EB;font-size:12px">'
        +'<option value="ausente"'+(v.state==='ausente'?' selected':'')+'>Ausente</option>'
        +'<option value="presente"'+(v.state==='presente'?' selected':'')+'>Presente</option>'
        +'<option value="justificado"'+(v.state==='justificado'?' selected':'')+'>Justificado</option>'
        +'</select>'
        +'</div>';
    }).join('');
  overlay.style.display='flex';
}

function discCloseEdit(){
  var o=document.getElementById('disc-edit-overlay');
  if(o) o.style.display='none';
}

async function discSaveEdit(){
  var id=window._discEditId;
  var r=S.discRecords.find(function(x){return x.id===id;});
  if(!r) return;
  Object.keys(r.asistencia).forEach(function(k){
    var sel=document.getElementById('disc-edit-'+k);
    if(sel) r.asistencia[k].state=sel.value;
  });
  r._ts=Date.now(); // Marcar edición para que mergeByTs sepa cuál es más reciente
  await saveK(SK.discRecords,S.discRecords);
  try{
    if(typeof window.fbUpload==='function') await window.fbUpload(true);
  }catch(e){
    console.error('discSaveEdit Firebase error:',e);
    showToast('⚠️ Guardado sin sincronizar — verificá tu conexión','#DC2626');
  }
  discCloseEdit();
  var c=document.getElementById('disc-registros-wrap');
  if(c) discRenderRegistros(c);
  discRenderDashboard(document.getElementById('disc-dashboard-wrap'));
}

function discRenderRegistros(c){
  var recs=[...S.discRecords].sort(function(a,b){return b.fecha.localeCompare(a.fecha);});
  if(!recs.length){
    c.innerHTML='<div class="empty">Sin registros de asistencia cargados aún</div>';
    return;
  }
  var html='<div style="font-size:14px;font-weight:600;color:#1F4E79;margin-bottom:1rem">'+recs.length+' registros</div>';
  recs.forEach(function(r){
    var att=Object.values(r.asistencia||{});
    var presentes=att.filter(function(v){return v.state==='presente';}).length;
    html+='<div class="card" style="margin-bottom:.75rem;padding:12px">';
    html+='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
    html+='<span style="font-weight:600">'+(r.fecha?fmt(r.fecha):'—')+'</span>';
    html+='<span class="badge b-muted">'+r.pasoNombre+'</span>';
    html+='<span style="flex:1;font-size:13px;color:#6B7280">'+r.capitulo+'</span>';
    html+='<span class="badge b-ok">'+presentes+'/'+att.length+' presentes</span>';
    html+='<button class="btn btn-sm" onclick="discEditRecord('+r.id+')">✏️</button>';
    html+='<button class="btn btn-sm btn-danger" onclick="discDeleteRecord('+r.id+')">🗑</button>';
    html+='</div>';
    html+='<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px">';
    att.forEach(function(v){
      html+='<span style="font-size:11px;padding:2px 8px;border-radius:4px;background:'+(v.state==='presente'?'#D1FAE5':'#FEE2E2')+';color:'+(v.state==='presente'?'#065F46':'#991B1B')+'">'+v.name+'</span>';
    });
    html+='</div></div>';
  });
  c.innerHTML=html;
}

async function fbSyncManual(){
  if(!window.fbReady){
    showToast('⚠️ Firebase no disponible aún', '#DC2626');
    return;
  }
  if(typeof fbHasRealData==='function'&&!fbHasRealData()){
    showToast('⚠️ No hay datos para sincronizar desde este dispositivo', '#D97706');
    return;
  }
  showToast('☁️ Sincronizando...', '#1F4E79');
  await window.fbUpload(true); // force = true
}

async function fbSyncDown(){
  if(!window.fbReady){
    showToast('⚠️ Firebase no disponible aún', '#DC2626');
    return;
  }
  const ok = await window.fbDownload();
  if(ok){
    await initStorage();
    showToast('✅ Datos actualizados desde la nube', '#16A34A');
  }
}

function pnvEnviar(){
  var n=(document.getElementById('pnv-nombre')||{value:''}).value.trim();
  var a=(document.getElementById('pnv-apellido')||{value:''}).value.trim();
  var cel=(document.getElementById('pnv-cel')||{value:''}).value.trim();
  var fnac=(document.getElementById('pnv-fnac')||{value:''}).value.trim();
  var genero=(document.getElementById('pnv-genero')||{value:''}).value;
  var barrio=(document.getElementById('pnv-barrio2')||{value:''}).value.trim();
  var como=(document.getElementById('pnv-como')||{value:''}).value;
  var motivo=(document.getElementById('pnv-motivo')||{value:''}).value.trim();
  var err=document.getElementById('pnv-error');
  if(!n||!a||!cel||!fnac||!genero||!barrio||!como){
    if(err){err.textContent='Por favor completá todos los campos obligatorios (*)';err.style.display='block';}
    return;
  }
  if(err) err.style.display='none';
  try{
    var members=JSON.parse(localStorage.getItem('gdv_m5')||'[]');
    members.push({
      id:Date.now(),nombre:n,apellido:a,tel:cel,genero:genero,
      grupoId:null,condicion:'Nuevo',estado:'Activo',
      dir:barrio,fnac:fnac,roles:[],
      comoNosConocio:como,motivoContacto:motivo,
      fechaRegistro:todayAA(),
      origen:'QR / Formulario web'
    });
    localStorage.setItem('gdv_m5',JSON.stringify(members));
    // Upload to Firebase immediately so the contact isn't lost on next app load
    if(window.fbUpload) window.fbUpload(true);
  }catch(e){}
  // Hide form, show success
  var formWrap=document.getElementById('pnv-form-wrap');
  var success=document.getElementById('pnv-success');
  if(formWrap) formWrap.style.display='none';
  if(success) success.style.display='block';
}

function buildPublicActualizarForm(){
  // Super Admin can disable this form for everyone
  var qrEnabled=localStorage.getItem('gdv_qr_actualizar')!=='false';
  if(!qrEnabled){
    return `<div style="background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:440px;box-shadow:0 4px 24px rgba(0,0,0,.1);text-align:center">
      <div style="font-size:2.5rem;margin-bottom:.5rem">🔒</div>
      <div style="font-size:18px;font-weight:700;color:#1F4E79;margin-bottom:.5rem">Acceso no disponible en este momento</div>
      <div style="font-size:13px;color:#6B7280">Esta opción está temporalmente deshabilitada. Si necesitás actualizar tus datos, contactá a un líder de tu Grupo de Vida.</div>
    </div>`;
  }

  var membersJson=localStorage.getItem('gdv_m5')||'[]';
  var members=[];
  try{members=JSON.parse(membersJson);}catch(e){}

  // Only show members with missing data (same criteria as the pink highlight
  // in Miembros): no apellido (or only "(...)"), no celular, or no fecha de nacimiento.
  // As people update their data, they disappear from this list.
  var activos=members.filter(function(m){
    if(m.estado==='Baja') return false;
    if(m.condicion==='Nuevo'||m.condicion==='Historico') return false;
    var apellidoLimpio=(m.apellido||'').replace(/\([^)]*\)/g,'').trim();
    var telLimpio=(m.tel||'').replace(/[^0-9]/g,'');
    return !apellidoLimpio || !telLimpio || !m.fnac;
  });

  // Sort alphabetically by full name
  activos=activos.slice().sort(function(a,b){
    return (a.nombre+' '+a.apellido).localeCompare(b.nombre+' '+b.apellido,'es',{sensitivity:'base'});
  });

  var memberOptions=activos.map(function(m){
    return '<option value="'+m.id+'">'+m.nombre+' '+m.apellido+'</option>';
  }).join('');

  return `<div style="background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:440px;box-shadow:0 4px 24px rgba(0,0,0,.1)">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:2.5rem;margin-bottom:.5rem">✏️</div>
      <div style="font-size:20px;font-weight:700;color:#1F4E79">Actualizá tus datos</div>
      <div style="font-size:13px;color:#6B7280;margin-top:4px">Iglesia Vida Nueva · Gerli</div>
    </div>
    <div id="pau-step1">
      ${activos.length===0?`
      <div style="text-align:center;padding:1.5rem 0">
        <div style="font-size:2.5rem;margin-bottom:.5rem">✅</div>
        <div style="font-size:15px;font-weight:700;color:#16A34A;margin-bottom:.5rem">¡Todo al día!</div>

var pauSelectedId=null;
function pauCargarDatos(){
  var sel=document.getElementById('pau-member-sel');
  pauSelectedId=parseInt(sel.value)||null;
  if(!pauSelectedId){alert('Seleccioná tu nombre primero');return;}
  try{
    var members=JSON.parse(localStorage.getItem('gdv_m5')||'[]');
    var m=members.find(function(x){return x.id===pauSelectedId;});
    if(m){
      document.getElementById('pau-cel').value=m.tel||'';
      document.getElementById('pau-fnac').value=m.fnac||'';
      document.getElementById('pau-barrio').value=m.dir||m.barrio||'';
    }
  }catch(e){}
  document.getElementById('pau-step1').style.display='none';
  document.getElementById('pau-step2').style.display='block';
}

function pauGuardar(){
  if(!pauSelectedId) return;
  try{
    var members=JSON.parse(localStorage.getItem('gdv_m5')||'[]');
    var m=members.find(function(x){return x.id===pauSelectedId;});
    if(m){
      m.tel=document.getElementById('pau-cel').value.trim();
      m.fnac=document.getElementById('pau-fnac').value.trim();
      m.dir=document.getElementById('pau-barrio').value.trim();
      localStorage.setItem('gdv_m5',JSON.stringify(members));
      // Upload to Firebase immediately so the update isn't lost
      if(window.fbUpload) window.fbUpload(true);
    }
  }catch(e){}
  document.getElementById('pau-step2').style.display='none';
  document.getElementById('pau-success').style.display='block';
}

function exportToExcel(rows, columns, filename){
  if(!rows||!rows.length){alert('No hay datos para exportar.');return;}

  // HTML-to-Excel approach: reliable colors, bold, borders, autofilter
  const NAVY='#1F4E79';
  const WHITE='#FFFFFF';
  const ROW_ALT='#EFF6FF';

  // Header cells
  const thCells=columns.map(c=>
    `<th style="background:${NAVY};color:${WHITE};font-weight:bold;font-size:12px;`+
    `padding:8px 10px;border:1px solid #163a5c;white-space:nowrap;`+
    `font-family:Calibri,Arial,sans-serif">${c.label}</th>`
  ).join('');

  // Data rows
  const dataRows=rows.map((r,i)=>{
    const bg=i%2===0?WHITE:ROW_ALT;
    const tds=columns.map(c=>{
      const val=r[c.key]===null||r[c.key]===undefined?'':String(r[c.key]);
      return `<td style="background:${bg};padding:6px 10px;border:1px solid #E5E7EB;`+
        `font-family:Calibri,Arial,sans-serif;font-size:11px">${val}</td>`;
    }).join('');
    return `<tr>${tds}</tr>`;
  }).join('');

  const html=
    `<html xmlns:o="urn:schemas-microsoft-com:office:office" `+
    `xmlns:x="urn:schemas-microsoft-com:office:excel" `+
    `xmlns="http://www.w3.org/TR/REC-html40">`+
    `<head><meta charset="UTF-8">`+
    `<!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets>`+
    `<x:ExcelWorksheet><x:Name>Datos</x:Name>`+
    `<x:WorksheetOptions><x:FreezePanes/><x:FrozenNoSplit/>`+
    `<x:SplitHorizontal>1</x:SplitHorizontal>`+
    `<x:TopRowBottomPane>1</x:TopRowBottomPane>`+
    `<x:ActivePane>2</x:ActivePane></x:WorksheetOptions>`+
    `</x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]-->`+
    `</head><body>`+
    `<table border="1" style="border-collapse:collapse">`+
    `<thead><tr>${thCells}</tr></thead>`+
    `<tbody>${dataRows}</tbody>`+
    `</table></body></html>`;

  const blob=new Blob(['﻿'+html],{type:'application/vnd.ms-excel;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=filename+'.xls';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function exportNuevosExcel(){
  const search=(document.getElementById('nv-search')?.value||'').toLowerCase();
  const fGrupo=parseInt(document.getElementById('nv-fil-grupo')?.value)||null;
  const fGen=document.getElementById('nv-fil-gen')?.value||'';
  const hoy=new Date(); hoy.setHours(0,0,0,0);
  const hace30=new Date(hoy); hace30.setDate(hace30.getDate()-30);

  let members;
  if(nvFiltro==='historico'){
    // Include both new-style (condicion='Historico') and old-style (estado='Baja') contacts
    members=S.members.filter(m=>m.condicion==='Historico'||m.estado==='Baja');
  } else {
    members=S.members.filter(m=>m.condicion==='Nuevo'&&m.estado!=='Baja');
    members=members.filter(m=>{
      const partes=(m.fechaRegistro||'').split('/');
      if(partes.length<3) return true; // sin fecha → mostrar siempre
      let yy=parseInt(partes[2]);
      if(yy<100) yy+=2000; // handle 2-digit year
      const fReg=new Date(yy,+partes[1]-1,+partes[0]);
      if(isNaN(fReg.getTime())) return true; // fecha inválida → mostrar siempre
      return nvFiltro==='ultimos30' ? fReg>=hace30 : fReg<hace30;
    });
  }
  if(search) members=members.filter(m=>fullName(m).toLowerCase().includes(search));
  if(fGrupo) members=members.filter(m=>m.grupoId===fGrupo);
  if(fGen)   members=members.filter(m=>m.genero===fGen);
  if(fTipoGrupo==='gdv'){
    var gdvIds=new Set((S.groups||[]).map(function(g){return Number(g.id);}));
    members=members.filter(function(m){return m.grupoId&&gdvIds.has(Number(m.grupoId));});
  } else if(fTipoGrupo==='ng'){
    var ngIds=new Set((S.ngComunidades||[]).map(function(ng){return Number(ng.id);}));
    members=members.filter(function(m){return m.grupoId&&ngIds.has(Number(m.grupoId));});
  }

  const rows=members.map(m=>{
    const allGids=[m.grupoId,...(m.grupoIds||[])].filter(Boolean).map(Number);
    const allAvailableGroups=[...(S.groups||[]),...(S.ngComunidades||[]).map(function(ng){return {id:ng.id,name:'🌱 '+ng.name};})];
    const memberGroups=allGids.map(gid=>allAvailableGroups.find(x=>Number(x.id)===gid)).filter(Boolean);
    return {
      nombre:m.nombre,
      apellido:m.apellido,
      genero:m.genero==='H'?'Hombre':m.genero==='M'?'Mujer':'-',
      grupo:memberGroups.length?memberGroups.map(gr=>gr.name).join(', '):'Sin grupo',
      edad:m.edadDeclarada||'',
      celular:m.tel||'',
      barrio:m.dir||'',
      comoNosConocio:m.comoNosConocio||'',
      seguimiento:m.seguimientoNombre||'Pendiente',
      origen:m.origen||'',
      fechaRegistro:m.fechaRegistro||'',
      motivo:m.motivoContacto||''
    };
  });

  const cols=[
    {key:'nombre',      label:'Nombre',           width:18},
    {key:'apellido',    label:'Apellido',          width:18},
    {key:'genero',      label:'Género',            width:10},
    {key:'grupo',       label:'Grupo',             width:20},
    {key:'edad',        label:'Edad',              width:8},
    {key:'celular',     label:'Celular',           width:16},
    {key:'barrio',      label:'Barrio / Ciudad',   width:20},
    {key:'comoNosConocio',label:'Cómo nos conociste',width:24},
    {key:'seguimiento', label:'Seguimiento',       width:24},
    {key:'origen',      label:'Origen',            width:16},
    {key:'fechaRegistro',label:'Fecha registro',   width:16},

  ];

}

async function exportarTodo(){
  const backup = {
    version: '1.0',
    fecha: new Date().toISOString(),
    gdv: {
      users:   S.users,
      groups:  S.groups,
      records: S.records,
      members: S.members,
      roles:   S.roles,
    },
    of: {
      alumnos:      ofAlumnos,
      pagos:        ofPagos,
      encuentros:   ofEncuentros,
      asistencia:   ofAsistencia,
      participacion:ofParticipacion,
      obsPart:      ofObsPart,
      obsPago:      ofObsPago,
      materias:     ofMaterias,
    }
  };
  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const fecha = todayAA().replace(/\//g,'-');
  a.href = url;
  a.download = `VNG_Backup_${fecha}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ Respaldo exportado correctamente', '#16A34A');
}

async function importarTodo(event){
  // Accept both input element directly or change event
  const input = event.target || event;
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const backup = JSON.parse(e.target.result);
      if(!backup.version || !backup.gdv || !backup.of){
        showToast('❌ Archivo inválido — no es un respaldo de VNG', '#DC2626');
        return;
      }
      if(!confirm('¿Importar respaldo del '+new Date(backup.fecha).toLocaleString('es-AR')+'? Esto reemplazará todos los datos actuales.')){
        input.value='';
        return;
      }
      // Restore GdV
      S.users   = backup.gdv.users   || [];
      S.groups  = backup.gdv.groups  || [];
      S.records = backup.gdv.records || [];
      S.members = backup.gdv.members || [];
      S.roles   = backup.gdv.roles   || [];
      await saveK(SK.users,   S.users);
      await saveK(SK.groups,  S.groups);
      await saveK(SK.records, S.records);
      await saveK(SK.members, S.members);
      await saveK(SK.roles,   S.roles);
      // Restore OF
      ofAlumnos       = backup.of.alumnos       || [];
      ofPagos         = backup.of.pagos         || {};
      ofEncuentros    = backup.of.encuentros    || {};
      ofAsistencia    = backup.of.asistencia    || {};
      ofParticipacion = backup.of.participacion || {};
      ofObsPart       = backup.of.obsPart       || {};
      ofObsPago       = backup.of.obsPago       || {};
      ofMaterias      = backup.of.materias      || [];
      ofSave();
      input.value='';
      // Sync to Firebase after import
      if(window.fbReady && window.fbUpload) await window.fbUpload();
      showToast('✅ Datos importados y sincronizados con la nube', '#16A34A');
      setTimeout(()=>location.reload(), 2000);
    } catch(err){
      showToast('❌ Error al leer el archivo: ' + err.message, '#DC2626');
    }
  };
  reader.readAsText(file);
}

async function boot(){
  try{
    // Show DEV badge if in development environment
    const _PROD = ['vng-plataforma.vercel.app','iglesiavng.vercel.app'];
    const _isDev = !_PROD.includes(window.location.hostname);
    if(_isDev){
      const badge=document.getElementById('dev-badge');
      if(badge) badge.style.display='inline';
    }
    if(window._savedSession){
      currentUser = window._savedSession;
      document.getElementById('screen-login').style.display='none';
    }
    await initStorage();
    const params=new URLSearchParams(window.location.search);
    const form=params.get('form');
    if(form==='nuevo'){ showPublicForm('nuevo'); return; }
    if(form==='actualizar'){ showPublicForm('actualizar'); return; }
    if(currentUser && currentUser.id){
      showHome();
    } else {
      document.getElementById('screen-login').style.display='';
    }
  }catch(e){
    console.error('Boot error:',e);
    try{
      currentUser=null;
      document.getElementById('screen-login').style.display='';
      document.getElementById('screen-home').classList.add('hidden');
    }catch(e2){}
  }
}

// ── Inactivity timer — logout after 30 min ──
var _inactTimer=null;
function resetInactivityTimer(){
  clearTimeout(_inactTimer);
  if(!currentUser) return;
  _inactTimer=setTimeout(function(){
    if(currentUser){
      showToast('⏱ Sesión cerrada por inactividad','#6B7280');
      setTimeout(doLogout,1500);
    }
  }, 30*60*1000); // 30 minutos
}
['click','keydown','touchstart','scroll'].forEach(function(ev){
  document.addEventListener(ev, resetInactivityTimer, {passive:true});
});

function tryRestoreSession(){
  try{
    var saved = localStorage.getItem('vng_cu') || sessionStorage.getItem('vng_cu');
    if(!saved) return;
    var cu = JSON.parse(saved);
    if(cu && cu.id && cu.name){
      currentUser = cu;
      document.getElementById('screen-login').style.display='none';
      resetInactivityTimer();
      showHome();
    }
  }catch(e){
    localStorage.removeItem('vng_cu');
    try{sessionStorage.removeItem('vng_cu');}catch(e2){}
  }
}

boot();
