async function gdvSaveRecord(){
  const facGids=isGdVFacilitador()?getFacilitadorGroupIds():[];
  let gid=facGids.length===1?facGids[0]:currentUser.groupId;
  if(isGdVAdmin()||facGids.length>1){const sel=document.getElementById('gdv-grupo-sel');if(sel)gid=parseInt(sel.value)||null;}
  const g=S.groups.find(x=>x.id===gid);
  const fecha=document.getElementById('gdv-fecha').value;
  if(!g||!fecha){alert('Seleccioná grupo y fecha');return;}
  const sinEncuentro=document.getElementById('gdv-sin-encuentro')?.checked||false;
  const motivo=document.getElementById('gdv-motivo')?.value.trim()||'';
  // Validate date range
  const hoyStr=today();
  const minDate=new Date(); minDate.setDate(minDate.getDate()-14);
  const minStr=minDate.toISOString().split('T')[0];
  if(fecha>hoyStr){alert('No podés cargar una fecha futura. La fecha máxima es hoy ('+hoyStr+').');return;}
  if(fecha<minStr){alert('No podés cargar fechas de más de 14 días atrás. La fecha mínima es '+minStr+'.');return;}

  // ── Control de duplicados por semana ──
  const semanaFecha=getISOWeek(fecha);
  const anioFecha=new Date(fecha).getFullYear();
  const yaExiste=S.records.find(function(r){
    if(r.grupoId!==gid) return false;
    const sem=getISOWeek(r.fecha);
    const anio=new Date(r.fecha).getFullYear();
    return sem===semanaFecha && anio===anioFecha;
  });
  if(yaExiste){
    if(!isGdVAdmin()){
      // Facilitador: bloquear completamente
      alert('Ya existe un registro para la Semana '+semanaFecha+'. Contacta al Admin GdV para corregirlo.');
      return;
    } else {
      // Admin GdV / Super Admin: advertir pero permitir
      if(!confirm('Ya existe un registro para la Semana '+semanaFecha+'. Como Admin podés cargar igual para corregir errores?')){
        return;
      }
    }
  }

  if(!sinEncuentro&&!Object.keys(gdvFacAtt).length){alert('El grupo no tiene miembros cargados');return;}
  const rec={id:Date.now(),grupoId:g.id,grupoName:g.name,groupType:g.type,
    facId:currentUser.id,facName:currentUser.name,fecha,
    sinEncuentro,motivo,
    asistencia:sinEncuentro?{}:{...gdvFacAtt},
    visitsOther:sinEncuentro?[]:[...gdvVisitsOther],
    visitsNew:sinEncuentro?[]:[...gdvVisitsNew],
    ts:new Date().toISOString()};
  S.records.push(rec);
  await saveK(SK.records,S.records);

  // ── Auto-assign group to "Nuevos" so they appear in next encounter ──
  var membersUpdated=false;
  gdvVisitsNew.forEach(function(nombre){
    var m=S.members.find(function(x){
      return fullName(x).toLowerCase()===nombre.toLowerCase();
    });
    if(m&&!m.grupoId){
      m.grupoId=gid; // Assign to this group
      membersUpdated=true;
    }
  });
  if(membersUpdated) await saveK(SK.members,S.members);

  const al=document.getElementById('gdv-fac-alert');
  al.textContent=sinEncuentro
    ?`⏸ Encuentro del ${fmt(fecha)} registrado como Sin encuentro.`
    :`✅ Asistencia del ${fmt(fecha)} guardada correctamente.`;
  al.style.background=sinEncuentro?'#FEF3C7':'';
  al.style.color=sinEncuentro?'#92400E':'';
  al.style.border=sinEncuentro?'1px solid #FCD34D':'';
  al.classList.remove('hidden');
  setTimeout(()=>{al.classList.add('hidden');al.style='';},4000);
  if(isGdVAdmin()&&document.getElementById('gdv-grupo-sel'))document.getElementById('gdv-grupo-sel').value='';
  gdvInitFacForm();
}

function gdvRenderMyHistory(){
  const myGids=getFacilitadorGroupIds();
  // Date filter - default last 30 days
  const hastaEl=document.getElementById('gdv-hist-hasta');
  const desdeEl=document.getElementById('gdv-hist-desde');
  if(hastaEl&&!hastaEl.value) hastaEl.value=new Date().toISOString().slice(0,10);
  if(desdeEl&&!desdeEl.value){
    const d30=new Date(); d30.setDate(d30.getDate()-30);
    desdeEl.value=d30.toISOString().slice(0,10);
  }
  const fd=desdeEl?.value||'';
  const fh=hastaEl?.value||'';
  let recs=S.records.filter(r=>myGids.includes(Number(r.grupoId)));
  if(fd) recs=recs.filter(r=>r.fecha>=fd);
  if(fh) recs=recs.filter(r=>r.fecha<=fh);
  recs=recs.sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const wrap=document.getElementById('gdv-my-hist');
  if(!wrap) return;
  if(!recs.length){wrap.innerHTML='<div class="empty">Sin registros en el período.</div>';gdvRenderFacChart([]);return;}
  wrap.innerHTML=recs.map(r=>{
    if(r.sinEncuentro) return `<div class="row" style="cursor:pointer;padding:10px 4px;border-bottom:1px solid #F3F4F6;opacity:.6" onclick="gdvShowHistDetail('${r.id}')">
      <span style="font-weight:600">${fmt(r.fecha)}</span>
      <span style="font-size:13px;color:#92400E;flex:1;margin-left:12px">⏸ Sin encuentro</span>
    </div>`;
    const att=Object.values(r.asistencia);
    const pre=att.filter(v=>v.state==='presente').length;
    const p=pct(pre,att.length);
    return `<div class="row" style="cursor:pointer;padding:10px 4px;border-bottom:1px solid #F3F4F6" onclick="gdvShowHistDetail('${r.id}')">
      <span style="font-weight:600;min-width:90px">${fmt(r.fecha)}</span>
      <span style="flex:1;font-size:13px;margin-left:8px">${pre}/${att.length} presentes</span>
      <span class="badge ${p>=70?'b-ok':'b-muted'}">${p}%</span>
    </div>`;
  }).join('');
  gdvRenderFacChart(recs);
}

function gdvShowHistDetail(recId){

  if(!r) return;
  const detWrap=document.getElementById('gdv-hist-detail');

  const att=Object.entries(r.asistencia);
  detBody.innerHTML=att.map(([k,v])=>`
    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #F3F4F6">
      <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${v.state==='presente'?'#16A34A':'#DC2626'}"></span>
      <span style="flex:1;font-size:14px">${v.name}</span>
      <span style="font-size:12px;padding:2px 10px;border-radius:99px;background:${v.state==='presente'?'#D1FAE5':'#FEE2E2'};color:${v.state==='presente'?'#065F46':'#991B1B'};font-weight:600">${v.state==='presente'?'Presente':'Ausente'}</span>
    </div>`).join('');
  if((r.visitsOther||[]).length) detBody.innerHTML+=`<div style="margin-top:8px;font-size:13px;color:#1E40AF">Visitas: ${r.visitsOther.join(', ')}</div>`;
  if((r.visitsNew||[]).length) detBody.innerHTML+=`<div style="margin-top:4px;font-size:13px;color:#92400E">Nuevos: ${r.visitsNew.join(', ')}</div>`;
  detWrap.style.display='block';
  detWrap.scrollIntoView({behavior:'smooth',block:'start'});
}

function gdvRenderFacChart(recs){
  const canvas=document.getElementById('gdv-chart-fac');
  if(!canvas||typeof Chart==='undefined') return;
  const data=recs.filter(r=>!r.sinEncuentro).reverse();
  if(!data.length){canvas.parentElement.style.display='none';return;}
  canvas.parentElement.style.display='block';
  if(window._facChart) window._facChart.destroy();
  window._facChart=new Chart(canvas,{
    type:'line',
    data:{
      labels:data.map(r=>fmt(r.fecha)),
      datasets:[{
        label:'Presentes',
        data:data.map(r=>Object.values(r.asistencia).filter(v=>v.state==='presente').length),
        borderColor:'#1F4E79',backgroundColor:'rgba(31,78,121,.1)',
        tension:.3,fill:true,pointRadius:4
      }]
    },
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}
  });
}
function gdvGetDefaultDates(){

      <label style="display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;font-size:13px;border-radius:6px;transition:background .1s" onmouseover="this.style.background='#F9FAFB'" onmouseout="this.style.background=''">

function gdvUpdateGrupoFilter(){
  const cbs=[...document.querySelectorAll('.gdv-g-cb')];

  gdvFilGrupos=checked.length===cbs.length?null:new Set(checked);

function gdvApplyFilters(){

function gdvResetFilters(){

function gdvUpdateFilterSummary(){
  const el=document.getElementById('gdv-filter-summary');if(!el)return;
  const parts=[];
  if(gdvFilDesde||gdvFilHasta) parts.push('📅 '+( fmt(gdvFilDesde)||'inicio')+' → '+(fmt(gdvFilHasta)||'hoy'));
  if(gdvFilSexo) parts.push(gdvFilSexo==='H'?'👨 Solo Hombres':'👩 Solo Mujeres');
  if(gdvFilGrupos) parts.push('🏘 '+gdvFilGrupos.size+' grupo'+(gdvFilGrupos.size!==1?'s':''));
  el.textContent=parts.length?'Filtros activos: '+parts.join(' · '):'Mostrando: semana actual';
}

function gdvGetFilteredRecords(){
  const ownGroupId=currentUser.groupId||null;
  return S.records.filter(r=>{
    if(r.sinEncuentro) return false;
    // Facilitador: only see their own group
    if(isGdVFacilitador()&&ownGroupId&&Number(r.grupoId)!==Number(ownGroupId)) return false;
    if(gdvFilGrupos&&!gdvFilGrupos.has(Number(r.grupoId))) return false;
    if(gdvFilDesde&&r.fecha<gdvFilDesde) return false;
    if(gdvFilHasta&&r.fecha>gdvFilHasta) return false;
    return true;
  });
}

function gdvRenderDashboard(){
  gdvInitFilters();
  const recs=gdvGetFilteredRecords();

  // ── Gender resolver: use group type as fallback for unknown gender ──
  function resolveGenero(v, grupoId){
    if(v.genero==='H'||v.genero==='M') return v.genero;
    const g=S.groups.find(x=>x.id===grupoId);
    if(!g) return '';
    if(g.type==='Hombres') return 'H';
    if(g.type==='Mujeres') return 'M';
    return '';
  }

  let totH=0,totM=0,totVis=0,totNewH=0,totNewM=0;
  recs.forEach(r=>{
    const g=S.groups.find(x=>x.id===r.grupoId);
    Object.values(r.asistencia).forEach(v=>{
      if(v.state!=='presente') return;
      const gen=resolveGenero(v, r.grupoId);
      if(gdvFilSexo&&gen!==gdvFilSexo) return;
      if(gen==='H') totH++; else if(gen==='M') totM++;
    });
    totVis+=(r.visitsOther||[]).length;
    // Split new persons by group type
    const gType=g?g.type:'';
    const newList=r.visitsNew||[];
    newList.forEach(name=>{
      // Try to find in members to get gender
      const m=S.members.find(x=>fullName(x).toLowerCase()===name.toLowerCase());
      const gen=m?resolveGenero({genero:m.genero},r.grupoId):(gType==='Hombres'?'H':gType==='Mujeres'?'M':'');
      if(!gdvFilSexo||gen===gdvFilSexo){
        if(gen==='H') totNewH++; else if(gen==='M') totNewM++; else totNewH++; // default to H for mixed if unknown
      }
    });
  });

  const totPres=(gdvFilSexo==='H'?totH:gdvFilSexo==='M'?totM:totH+totM);
  const totNew=totNewH+totNewM;

  // ── Grupos count respecting gender filter ──
  let gruposCount;
  if(gdvFilGrupos){
    gruposCount=gdvFilGrupos.size;
  } else if(gdvFilSexo){
    // Count groups that match the gender filter
    gruposCount=S.groups.filter(g=>{
      if(gdvFilSexo==='H') return g.type==='Hombres'||g.type==='Mixto';
      if(gdvFilSexo==='M') return g.type==='Mujeres'||g.type==='Mixto';
      return true;
    }).length;
  } else {
    gruposCount=S.groups.length;
  }

  // ── Miembros activos respecting gender filter ──
  let miembrosAct=S.members.filter(m=>{
    if(m.estado==='Baja') return false;
    if(!gdvFilSexo) return true;
    const gen=resolveGenero({genero:m.genero},m.grupoId);
    return gen===gdvFilSexo;
  }).length;

  const sinEncTot=S.records.filter(r=>r.sinEncuentro&&
    (!gdvFilDesde||r.fecha>=gdvFilDesde)&&(!gdvFilHasta||r.fecha<=gdvFilHasta)&&
    (!gdvFilGrupos||gdvFilGrupos.has(Number(r.grupoId)))).length;

  // Nuevos por grupo (con sus nombres)
  const nuevosPorGrupo={};
  recs.forEach(r=>{
    if((r.visitsNew||[]).length===0) return;
    if(gdvFilGrupos&&!gdvFilGrupos.has(Number(r.grupoId))) return;
    if(!nuevosPorGrupo[r.grupoId]) nuevosPorGrupo[r.grupoId]={grupo:r.grupoName,nombres:[]};
    (r.visitsNew||[]).forEach(n=>{
      if(!nuevosPorGrupo[r.grupoId].nombres.includes(n))
        nuevosPorGrupo[r.grupoId].nombres.push(n);
    });
  });

  const nuevosHtml=Object.values(nuevosPorGrupo)
    .filter(g=>g.nombres.length>0)
    .sort((a,b)=>b.nombres.length-a.nombres.length)
    .map(g=>{
      const gid='gdv-nv-'+g.grupo.replace(/\s/g,'-');
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #F3F4F6">
        <span style="font-size:13px;font-weight:600">${g.grupo}</span>
        <span class="badge b-ok" style="cursor:pointer" onclick="gdvToggleNuevos('${gid}')">
          🌱 ${g.nombres.length} nuevo${g.nombres.length!==1?'s':''}
        </span>
      </div>
      <div id="${gid}" style="display:none;padding:6px 12px;background:#F0FDF4;border-radius:6px;font-size:12px;color:#166534;margin-bottom:4px">
        ${g.nombres.map(n=>'• '+n).join('<br>')}
      </div>`;
    }).join('');

  document.getElementById('gdv-stats').innerHTML=`
    <div class="stat"><span class="stat-val">${gruposCount}</span><span class="stat-lbl">Grupos</span></div>
    <div class="stat"><span class="stat-val">${miembrosAct}</span><span class="stat-lbl">Miembros activos</span></div>
    ${!gdvFilSexo||gdvFilSexo==='H'?`<div class="stat"><span class="stat-val" style="color:#1565C0">${totH}</span><span class="stat-lbl">Hombres pres.</span></div>`:''}
    ${!gdvFilSexo||gdvFilSexo==='M'?`<div class="stat"><span class="stat-val" style="color:#C0006A">${totM}</span><span class="stat-lbl">Mujeres pres.</span></div>`:''}
    <div class="stat"><span class="stat-val" style="color:#1F4E79">${totPres}</span><span class="stat-lbl">Total presentes</span></div>
    ${!gdvFilSexo||gdvFilSexo==='H'?`<div class="stat"><span class="stat-val" style="color:#1565C0">${totNewH}</span><span class="stat-lbl">Hombres nuevos</span></div>`:''}
    ${!gdvFilSexo||gdvFilSexo==='M'?`<div class="stat"><span class="stat-val" style="color:#C0006A">${totNewM}</span><span class="stat-lbl">Mujeres nuevas</span></div>`:''}
    ${sinEncTot?`<div class="stat"><span class="stat-val" style="color:#D97706;font-size:20px">${sinEncTot}</span><span class="stat-lbl">Sin encuentro</span></div>`:''}
  `;
  // Render nuevos por grupo
  const nvGrupoEl=document.getElementById('gdv-nuevos-por-grupo');
  if(nvGrupoEl){
    if(nuevosHtml){
      nvGrupoEl.style.display='';
      nvGrupoEl.innerHTML='<div style="font-size:13px;font-weight:700;color:#166534;margin-bottom:8px">🌱 Nuevos por grupo</div>'+nuevosHtml;
    } else {
      nvGrupoEl.innerHTML='<div style="text-align:center;color:#9CA3AF;padding:1rem;font-size:13px">No hay personas nuevas en el período consultado.</div>';
    }
  }
  // Render each section independently so one failure doesn't block others
  try{gdvRenderWeeklyStatus();}catch(e){console.error('Weekly status error:',e);}
  requestAnimationFrame(()=>{
    try{gdvRenderAdmChartFiltered(recs);}catch(e){console.error('Chart error:',e);}
    try{gdvRenderRankingChart(recs);}catch(e){console.error('Ranking error:',e);}
    try{gdvRenderBarsFiltered(recs);}catch(e){console.error('Bars error:',e);}
    try{gdvMrVisible=20; gdvRenderMemberRanking(recs);}catch(e){console.error('Member ranking error:',e);}
  });
}

function gdvRenderMemberRanking(recs){
  const wrap=document.getElementById('gdv-member-ranking');
  const moreBtn=document.getElementById('gdv-mr-show-more');
  const countEl=document.getElementById('gdv-mr-count');
  if(!wrap) return;

  // Build encounter count per group from filtered records
  var encPerGroup={};
  recs.forEach(function(r){
    var gid=Number(r.grupoId);
    if(!encPerGroup[gid]) encPerGroup[gid]=0;
    encPerGroup[gid]++;
  });

  // For each active member, calculate attendance
  var memberStats=[];
  S.members.filter(function(m){ return m.estado!=='Baja' && m.grupoId && encPerGroup[Number(m.grupoId)]>0; })
    .forEach(function(m){
      // Skip gender filter
      if(gdvFilSexo && m.genero!==gdvFilSexo) return;
      // Skip group filter
      if(gdvFilGrupos && !gdvFilGrupos.has(Number(m.grupoId))) return;

      var totalEnc=encPerGroup[Number(m.grupoId)]||0;
      if(!totalEnc) return;

      // Count presencias in filtered records for this member
      var presencias=0;
      recs.filter(function(r){ return Number(r.grupoId)===Number(m.grupoId); }).forEach(function(r){
        var att=r.asistencia||{};
        // asistencia keyed by member id (try both string and number key)
        var entry=att[m.id]||att[String(m.id)]||att[Number(m.id)];
        if(entry && entry.state==='presente') presencias++;
      });

      var pctVal=totalEnc>0?Math.round(presencias/totalEnc*100):0;
      var g=S.groups.find(function(x){ return Number(x.id)===Number(m.grupoId); });
      memberStats.push({
        nombre:m.nombre,
        apellido:m.apellido,
        grupo:g?g.name:'Sin grupo',
        presencias:presencias,
        totalEnc:totalEnc,
        pct:pctVal
      });
    });

  if(!memberStats.length){
    wrap.innerHTML='<div class="empty">Sin datos de asistencia individual para el período seleccionado</div>';
    if(moreBtn) moreBtn.style.display='none';
    return;
  }

  // Sort: worst first (asc pct) by default, best first (desc pct) if toggled
  memberStats.sort(function(a,b){
    return gdvMrSortAsc ? b.pct-a.pct : a.pct-b.pct;
  });

  var toShow=memberStats.slice(0,gdvMrVisible);
  var remaining=memberStats.length-gdvMrVisible;

  wrap.innerHTML=toShow.map(function(m,i){
    var barColor = m.pct>=75 ? '#16A34A' : m.pct>=50 ? '#1F4E79' : m.pct>=25 ? '#D97706' : '#DC2626';
    var rank = gdvMrSortAsc ? (i+1) : (memberStats.length - gdvMrVisible + i + 1);
    // For worst-first, rank from bottom
    var rankDisplay = gdvMrSortAsc ? (i+1) : (i+1);
    return '<div style="margin-bottom:10px;padding:8px 0;border-bottom:1px solid #F3F4F6">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;flex-wrap:wrap;gap:4px">' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<span style="font-size:11px;color:#9CA3AF;min-width:22px;text-align:right">#'+rankDisplay+'</span>' +
          '<div>' +
            '<div style="font-size:13px;font-weight:600;color:#1F2937">'+m.nombre+' '+m.apellido+'</div>' +
            '<div style="font-size:11px;color:#6B7280">'+m.grupo+'</div>' +
          '</div>' +
        '</div>' +
        '<span style="font-size:13px;color:#6B7280;white-space:nowrap">' +
          '<strong style="color:'+barColor+'">'+m.pct+'%</strong>' +
          ' &nbsp; '+m.presencias+'/'+m.totalEnc+' enc.' +
        '</span>' +
      '</div>' +
      '<div class="pbar-bg">' +
        '<div style="height:6px;border-radius:999px;background:'+barColor+';width:'+m.pct+'%;transition:width .3s"></div>' +
      '</div>' +
    '</div>';
  }).join('');

  // Show more button
  if(moreBtn){
    if(remaining>0){
      moreBtn.style.display='block';
      if(countEl) countEl.textContent='Mostrando '+toShow.length+' de '+memberStats.length+' miembros';
    } else {
      moreBtn.style.display='none';
      if(countEl) countEl.textContent='Total: '+memberStats.length+' miembros';
    }
  }
}

function gdvRenderWeeklyStatus(){
  var wrap=document.getElementById('gdv-weekly-status');
  if(!wrap) return;

  var startStr = gdvFilDesde || dateToStr(getWeekDates(0).start);
  var endStr   = gdvFilHasta || dateToStr(getWeekDates(0).end);
  var periodoLabel = fmt(startStr) + ' al ' + fmt(endStr);

  var grupos = S.groups.filter(function(g){ return !gdvFilGrupos || gdvFilGrupos.has(g.id); });

  var statusByGroup = grupos.map(function(g){
    var recs = S.records.filter(function(r){ return r.grupoId===g.id && r.fecha>=startStr && r.fecha<=endStr; });
    var hasSinEnc = recs.some(function(r){ return r.sinEncuentro; });
    var hasReport = recs.some(function(r){ return !r.sinEncuentro; });
    var status = hasReport ? 'reportado' : hasSinEnc ? 'sin-encuentro' : 'sin-reporte';
    var encCount = recs.filter(function(r){ return !r.sinEncuentro; }).length;
    return {g:g, status:status, encCount:encCount};
  });

  var reportados  = statusByGroup.filter(function(x){ return x.status==='reportado'; }).length;
  var sinEncs     = statusByGroup.filter(function(x){ return x.status==='sin-encuentro'; }).length;
  var sinReporte  = statusByGroup.filter(function(x){ return x.status==='sin-reporte'; }).length;

  var colores = {
    'reportado':     {bg:'#F0FDF4', border:'#86EFAC', dot:'#16A34A', label:'Reportó'},
    'sin-encuentro': {bg:'#FFFBEB', border:'#FCD34D', dot:'#D97706', label:'Sin encuentro'},
    'sin-reporte':   {bg:'#FFF5F5', border:'#FCA5A5', dot:'#DC2626', label:'Sin reporte'}
  };

  var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">';
  html += '<div>';
  html += '<div style="font-size:14px;font-weight:600;color:#1F4E79">Período: ' + periodoLabel + '</div>';
  html += '<div style="font-size:12px;color:#6B7280;margin-top:3px">';
  html += '<span style="color:#16A34A;font-weight:600">&#10003; ' + reportados + ' con reporte</span>';
  html += ' &nbsp;&middot;&nbsp; <span style="color:#D97706;font-weight:600">&#9208; ' + sinEncs + ' sin encuentro</span>';
  html += ' &nbsp;&middot;&nbsp; <span style="color:#DC2626;font-weight:600">&#10007; ' + sinReporte + ' sin ningún registro</span>';
  html += '</div></div>';
  html += '<div style="font-size:12px;color:#9CA3AF;font-style:italic">Cambiá las fechas arriba para filtrar</div>';
  html += '</div>';

  if(sinReporte > 0){
    html += '<div style="background:#FEF2F2;border:1px solid #FCA5A5;border-radius:10px;padding:10px 14px;margin-bottom:12px">';
    html += '<div style="font-size:13px;font-weight:600;color:#DC2626;margin-bottom:6px">Sin ningún registro en el período:</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px">';
    statusByGroup.filter(function(x){ return x.status==='sin-reporte'; }).forEach(function(x){
      var diaTxt = x.g.dia ? ' (' + x.g.dia + (x.g.horario ? ' ' + x.g.horario : '') + ')' : '';
      html += '<span style="background:#fff;border:1px solid #FCA5A5;border-radius:6px;padding:3px 10px;font-size:12px;color:#991B1B">' + x.g.name + diaTxt + '</span>';
    });
    html += '</div></div>';
  }

  html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:8px">';
  statusByGroup.forEach(function(item){
    var c = colores[item.status];
    var enc = item.encCount > 1 ? ' · ' + item.encCount + ' encuentros' : '';
    var dia = item.g.dia ? ' · ' + item.g.dia : '';
    html += '<div style="background:' + c.bg + ';border:1px solid ' + c.border + ';border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:8px">';
    html += '<div style="width:10px;height:10px;border-radius:50%;background:' + c.dot + ';flex-shrink:0"></div>';
    html += '<div style="flex:1;min-width:0">';
    html += '<div style="font-size:12px;font-weight:600;color:#1F2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + item.g.name + '</div>';
    html += '<div style="font-size:11px;color:#6B7280">' + c.label + enc + dia + '</div>';
    html += '</div></div>';
  });
  html += '</div>';

  wrap.innerHTML = html;
}

function gdvRenderAdmChartFiltered(recs){
  // Group by ISO week number
  const byWeek={};
  recs.forEach(function(r){
    var semana=getISOWeek(r.fecha);
    var anio=r.fecha.substring(0,4);
    var key=anio+'-S'+String(semana).padStart(2,'0');
    if(!byWeek[key]) byWeek[key]={h:0,m:0,semana:semana,anio:anio};
    Object.values(r.asistencia||{}).forEach(function(v){
      if(!v||v.state!=='presente') return;
      if(gdvFilSexo&&v.genero!==gdvFilSexo) return;
      if(v.genero==='H') byWeek[key].h++; else byWeek[key].m++;
    });
  });
  var sorted=Object.keys(byWeek).sort();
  var wrap=document.getElementById('gdv-chart-adm-wrap');
  if(!wrap) return;

  var existingChart=Chart.getChart?Chart.getChart('gdv-chart-adm'):null;
  if(existingChart) existingChart.destroy();
  if(gdvCharts.adm){try{gdvCharts.adm.destroy();}catch(e){} gdvCharts.adm=null;}

  wrap.innerHTML='<canvas id="gdv-chart-adm"></canvas>';

  if(!sorted.length){
    wrap.innerHTML='<div style="height:200px;display:flex;align-items:center;justify-content:center;color:#9CA3AF;font-size:13px">Sin datos en el período seleccionado</div>';
    return;
  }

  var canvas=document.getElementById('gdv-chart-adm');
  if(!canvas) return;

  var labels=sorted.map(function(k){ return 'Semana '+byWeek[k].semana; });
  var datasets=[];
  if(!gdvFilSexo||gdvFilSexo==='H') datasets.push({
    label:'Hombres',data:sorted.map(function(k){return byWeek[k].h;}),
    borderColor:'#1565C0',backgroundColor:'rgba(21,101,192,0.1)',tension:0.3,fill:true,pointRadius:5
  });
  if(!gdvFilSexo||gdvFilSexo==='M') datasets.push({
    label:'Mujeres',data:sorted.map(function(k){return byWeek[k].m;}),
    borderColor:'#C0006A',backgroundColor:'rgba(192,0,106,0.1)',tension:0.3,fill:true,pointRadius:5
  });

  gdvCharts.adm=new Chart(canvas,{
    type:'line',
    data:{labels:labels,datasets:datasets},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      scales:{y:{beginAtZero:true,ticks:{precision:0}}},
      plugins:{legend:{position:'top',labels:{font:{size:11},boxWidth:20}}}
    }
  });
}

function gdvRenderRankingChart(recs){
  const wrap=document.getElementById('gdv-ranking');
  if(!wrap) return;
  wrap.innerHTML=''; // clear first
  // For each group: avg presentes per encounter
  const groupData=S.groups.map(g=>{
    const gRecs=recs.filter(r=>r.grupoId===g.id);
    if(!gRecs.length) return null;
    let total=0;
    gRecs.forEach(r=>{
      Object.values(r.asistencia).forEach(v=>{
        if(v.state!=='presente') return;
        if(gdvFilSexo&&v.genero!==gdvFilSexo) return;
        total++;
      });
    });
    const avg=total/gRecs.length;
    return {name:g.name,avg,encounters:gRecs.length,total};
  }).filter(Boolean).sort((a,b)=>b.avg-a.avg);

  if(!groupData.length){
    wrap.innerHTML='<div class="empty">Sin datos para el período seleccionado</div>';
    return;
  }
  const maxAvg=groupData[0].avg||1;
  wrap.innerHTML=groupData.map((d,i)=>{
    const pct=Math.round(d.avg/maxAvg*100);
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    const barColor=i===0?'#F59E0B':i===1?'#9CA3AF':i===2?'#CD7C2F':'#1F4E79';
    return `<div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-size:13px;font-weight:600">${medal} #${i+1} ${d.name}</span>
        <span style="font-size:13px;color:#6B7280">
          <strong style="color:#1F4E79">${d.avg.toFixed(1)}</strong> prom · ${d.encounters} encuentro${d.encounters!==1?'s':''} · ${d.total} presentes
        </span>
      </div>
      <div class="pbar-bg">
        <div style="height:8px;border-radius:999px;background:${barColor};width:${pct}%;transition:width .3s"></div>
      </div>
    </div>`;
  }).join('');
}

function gdvRenderBarsFiltered(recs){
  const wrap=document.getElementById('gdv-bars');
  if(!wrap) return;
  wrap.innerHTML='';
  if(!recs.length){
    wrap.innerHTML='<div class="empty">Sin datos para el período seleccionado</div>';
    return;
  }
  // Aggregate ALL records in range per group (not just last)
  const groupData={};
  recs.forEach(r=>{
    if(!groupData[r.grupoId]) groupData[r.grupoId]={name:r.grupoName,totalPre:0,totalMiembros:0,encounters:0};
    const att=Object.values(r.asistencia||{});
    const pre=att.filter(v=>v&&v.state==='presente'&&(!gdvFilSexo||v.genero===gdvFilSexo)).length;
    const tot=gdvFilSexo?att.filter(v=>v&&v.genero===gdvFilSexo).length:att.length;
    groupData[r.grupoId].totalPre+=pre;
    groupData[r.grupoId].totalMiembros+=tot;
    groupData[r.grupoId].encounters++;
  });
  const rows=Object.values(groupData).map(d=>{
    const p=pct(d.totalPre,d.totalMiembros);
    const avgPre=d.encounters>0?(d.totalPre/d.encounters).toFixed(1):0;
    return{name:d.name,pre:d.totalPre,tot:d.totalMiembros,p,avgPre,encounters:d.encounters};
  }).sort((a,b)=>b.p-a.p);

  wrap.innerHTML=`
    <div style="font-size:11px;color:#6B7280;margin-bottom:12px;padding:6px 8px;background:#F9FAFB;border-radius:6px">
      📊 Promedio del período (${fmt(gdvFilDesde)||'inicio'} → ${fmt(gdvFilHasta)||'hoy'}) — presentes acumulados / miembros posibles
    </div>`+
  rows.map(r=>`
    <div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;flex-wrap:wrap;gap:4px">
        <span style="font-weight:500">${r.name}</span>
        <span style="color:#6B7280">${r.pre}/${r.tot} — <strong style="color:#1F4E79">${r.p}%</strong>
          <span style="font-size:11px;color:#9CA3AF"> · prom ${r.avgPre}/enc · ${r.encounters} enc.</span>
        </span>
      </div>
      <div class="pbar-bg"><div class="pbar-fill" style="width:${r.p}%;background:${r.p>=75?'#16A34A':r.p>=50?'#1F4E79':'#DC2626'}"></div></div>
    </div>`).join('');
}

    const ownGids=isGdVFacilitador()?getFacilitadorGroupIds():[];

      ? S.groups.filter(g=>ownGids.includes(Number(g.id)))
      : S.groups;
    groupsToShow.forEach(g=>{const o=document.createElement('option');o.value=g.id;o.textContent=g.name;sel.appendChild(o);});

      <div style="margin-top:6px;font-size:12px;color:#6B7280"><span style="color:#1565C0;font-weight:600">H: ${preH}</span> · <span style="color:#C0006A;font-weight:600">M: ${preM}</span> · ${r.facName}</div>

}

async function gdvSaveEditRec(){
  var id=window._gdvEditRecId;
  var r=S.records.find(x=>String(x.id)===String(id));
  if(!r||r.sinEncuentro){gdvCloseEditRec();return;}
  Object.keys(r.asistencia).forEach(function(k){
    var cb=document.getElementById('gdv-edit-att-'+k);
    if(cb) r.asistencia[k].state=cb.checked?'presente':'ausente';

  await saveK(SK.records,S.records);
  gdvCloseEditRec();
  gdvRenderRegistros();
  gdvRenderDashboard();
}

function ofSwitchTab(t,btn){
  document.querySelectorAll('.of-tab').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  ['alumnos','materias','participacion','pagos','asistencia'].forEach(s=>{
    const el=document.getElementById('of-sec-'+s);
    if(el) el.classList.toggle('active',s===t);
  });
  ofCurrentTab=t;
  if(t==='materias') ofRenderMaterias();
}

function ofRender(){
  const sub=document.getElementById('of-sub');
  if(sub) sub.textContent='Panel de administración — '+ANO;
  try{ofPopulateSelectors();}catch(e){console.error('ofPopulateSelectors',e);}
  try{ofRenderStats();}catch(e){console.error('ofRenderStats',e);}
  try{ofRenderPills();}catch(e){console.error('ofRenderPills',e);}
  try{ofRenderAlumnos();}catch(e){console.error('ofRenderAlumnos',e);}
  try{ofRenderMaterias();}catch(e){console.error('ofRenderMaterias',e);}
  try{ofRenderParticipacion();}catch(e){console.error('ofRenderParticipacion',e);}
  try{ofRenderPagos();}catch(e){console.error('ofRenderPagos',e);}
  try{ofRenderAsistencia();}catch(e){console.error('ofRenderAsistencia',e);}
}

function ofPopulateSelectors(){
  // Miembros selector in Alumnos tab
  const selM=document.getElementById('of-sel-miembro');
  if(selM){
    const yaAgregados=new Set(ofAlumnos.filter(a=>a.memberId).map(a=>a.memberId));
    selM.innerHTML='<option value="">— Elegir de base de Miembros —</option>'+
      S.members.filter(m=>m.estado==='Activo'&&!yaAgregados.has(m.id))
        .sort((a,b)=>fullName(a).localeCompare(fullName(b)))
        .map(m=>`<option value="${m.id}">${fullName(m)} (${m.genero==='H'?'H':'M'} · ${S.groups.find(g=>g.id===m.grupoId)?.name||'sin grupo'})</option>`)
        .join('');
  }
  // Profesor selector in Materias form
  const selP=document.getElementById('of-mf-profesor');
  if(selP){
    selP.innerHTML='<option value="">— Elegir profesor —</option>'+
      S.members.filter(m=>m.estado==='Activo')
        .sort((a,b)=>fullName(a).localeCompare(fullName(b)))
        .map(m=>`<option value="m:${m.id}">${fullName(m)}</option>`)
        .join('')+
      '<option value="ext:" disabled>──── Externos ────</option>'+
      ofAlumnos.filter(a=>a.tipo==='externo'||a.tipo==='invitado')
        .map(a=>`<option value="a:${a.id}">${a.nombre} ${a.apellido} (Invitado)</option>`)

}

function ofAgregarDesdeMiembro(){
  const sel=document.getElementById('of-sel-miembro');
  const mid=parseInt(sel.value);
  if(!mid){alert('Elegí un miembro de la lista');return;}
  const m=S.members.find(x=>x.id===mid);
  if(!m) return;
  if(ofAlumnos.find(a=>a.memberId===mid)){alert('Este miembro ya está en el curso');return;}
  ofAlumnos.push({
    id:Date.now(), memberId:mid,
    nombre:m.nombre, apellido:m.apellido,
    tel:m.tel||'', dni:'',
    tipo:'miembro',
    desde:todayAA(),
    mesComienzo:HOY.getMonth()
  });
  ofSave(); ofRender();
}

function ofAgregarExterno(){

function ofSaveMateria(){
  const nombre=document.getElementById('of-mf-nombre').value.trim();
  if(!nombre){alert('Ingresá el nombre de la materia');return;}
  const capitulos=document.getElementById('of-mf-temario').value
    .split('\n').map(t=>t.trim()).filter(Boolean);
  // Get alumnos selections
  const alumSels=[...document.querySelectorAll('.of-mat-alum-cb:checked')].map(cb=>parseInt(cb.value));
  const data={
    nombre,
    estado:document.getElementById('of-mf-estado').value,
    profesor:document.getElementById('of-mf-profesor').value,
    desde:document.getElementById('of-mf-desde').value,
    hasta:document.getElementById('of-mf-hasta').value,
    capitulos,
    alumnos:alumSels
  };
  if(ofEditMatId){
    const mat=ofMaterias.find(x=>x.id===ofEditMatId);
    // Preserve completados when editing
    data.completados=mat.completados||{};
    Object.assign(mat,data);

    ofMaterias.push({id:Date.now(),...data,completados:{}});

  ofSave(); ofCloseMateria(); ofRenderMaterias();
}

function ofProfesorNombre(val){
  if(!val) return '—';
  if(val.startsWith('m:')){
    const m=S.members.find(x=>x.id===parseInt(val.slice(2)));
    return m?fullName(m):'—';
  }
  if(val.startsWith('a:')){
    const a=ofAlumnos.find(x=>x.id===parseInt(val.slice(2)));
    return a?`${a.nombre} ${a.apellido} (Invitado)`:'—';
  }
  return val;

function ofRenderStats(){
  const el=document.getElementById('of-statsGrid');
  if(!el) return;
  const total=ofAlumnos.length;
  const activos=ofAlumnos.filter(a=>ofIsActivo(a.id,ofMesPago)).length;
  let pagados=0;
  ofAlumnos.forEach(a=>{
    if(ofIsActivo(a.id,ofMesPago)&&(ofPagos[`${a.id}_${ofMesPago}`]||{}).estado==='pagado') pagados++;
  });
  const encs=ofGetEncs(ofMesAsist);
  let totalP=0,den=0;
  ofAlumnos.forEach(a=>{
    if(!ofIsActivo(a.id,ofMesAsist)) return;
    encs.forEach(e=>{den++;if(ofAsistencia[`${a.id}_${e.id}`]==='P')totalP++;});
  });
  const p=den>0?Math.round(totalP/den*100):0;
  el.innerHTML=`
    <div class="of-stat"><div class="of-stat-label">Alumnos inscriptos</div><div class="of-stat-value">${total}</div><div class="of-stat-sub">${activos} activos ${MESES[ofMesPago].slice(0,3)}</div></div>
    <div class="of-stat"><div class="of-stat-label">Materias activas</div><div class="of-stat-value" style="color:#3C3489">${ofMateriasActivas().length}</div><div class="of-stat-sub">de ${ofMaterias.length} totales</div></div>
    <div class="of-stat"><div class="of-stat-label">Pagaron ${MESES[ofMesPago].slice(0,3)}</div><div class="of-stat-value" style="color:#15803d">${pagados}</div><div class="of-stat-sub">de ${activos} activos</div></div>
    <div class="of-stat"><div class="of-stat-label">Asistencia ${MESES[ofMesAsist].slice(0,3)}</div><div class="of-stat-value">${p}%</div><div class="of-stat-sub">${encs.length} encuentros</div></div>`;
}

function ofRenderParticipacion(){
  const wrap=document.getElementById('of-dashboard-wrap');
  if(!wrap) return;

  const materias=ofMateriasActivas();
  // Get all encounters
  const allEncs=[];
  Object.keys(ofEncuentros).forEach(function(k){
    (ofEncuentros[k]||[]).forEach(function(e){ allEncs.push(e); });
  });

  if(!ofAlumnos.length){
    wrap.innerHTML='<div style="text-align:center;padding:2rem;color:#9CA3AF">No hay alumnos inscriptos</div>';
    return;
  }

  var html='';

  // ── KPIs ──
  var totalAlumnos=ofAlumnos.length;
  var totalEncs=allEncs.length;
  var materiasActivas=materias.length;
  // Overall attendance %
  var totalP=0, totalReg=0;
  ofAlumnos.forEach(function(a){
    allEncs.forEach(function(e){
      var v=ofAsistencia[a.id+'_'+e.id]||'';
      if(v) totalReg++;
      if(v==='P') totalP++;
    });
  });
  var pctGeneral=totalReg>0?Math.round(totalP/totalReg*100):0;

  html+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:1.25rem">';
  html+='<div class="stat"><span class="stat-val">'+totalAlumnos+'</span><span class="stat-lbl">Alumnos</span></div>';
  html+='<div class="stat"><span class="stat-val">'+materiasActivas+'</span><span class="stat-lbl">Materias activas</span></div>';
  html+='<div class="stat"><span class="stat-val">'+totalEncs+'</span><span class="stat-lbl">Encuentros</span></div>';
  html+='<div class="stat"><span class="stat-val" style="color:'+(pctGeneral>=75?'#16A34A':pctGeneral>=50?'#1F4E79':'#DC2626')+'">'+pctGeneral+'%</span><span class="stat-lbl">% Asistencia</span></div>';
  html+='</div>';

  // ── Por Materia ──
  if(materias.length){
    materias.forEach(function(mat){
      var matEncs=allEncs.filter(function(e){return String(e.materia)===String(mat.id);});
      if(!matEncs.length) return;

      html+='<div class="card" style="margin-bottom:1rem;border-left:4px solid #7C3AED">';
      html+='<div style="font-size:14px;font-weight:700;color:#1F4E79;margin-bottom:.75rem">📚 '+mat.nombre+' <span style="font-size:11px;font-weight:400;color:#6B7280">('+matEncs.length+' encuentros)</span></div>';

      // Per-alumno stats for this materia
      var alumStats=ofAlumnos.map(function(a){
        var pres=matEncs.filter(function(e){return ofAsistencia[a.id+'_'+e.id]==='P';}).length;
        var ause=matEncs.filter(function(e){return ofAsistencia[a.id+'_'+e.id]==='A';}).length;
        var tard=matEncs.filter(function(e){return ofAsistencia[a.id+'_'+e.id]==='T';}).length;
        var pct=matEncs.length>0?Math.round(pres/matEncs.length*100):0;
        return {a:a,pres:pres,ause:ause,tard:tard,pct:pct};
      }).sort(function(x,y){return y.pct-x.pct;});

      alumStats.forEach(function(s){
        var barColor=s.pct>=75?'#16A34A':s.pct>=50?'#1F4E79':s.pct>=25?'#D97706':'#DC2626';
        html+='<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #F3F4F6;flex-wrap:wrap">';
        html+='<span style="font-size:13px;font-weight:600;flex:1;min-width:120px">'+s.a.nombre+' '+s.a.apellido+'</span>';
        html+='<div style="flex:2;min-width:100px">';
        html+='<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">';
        html+='<span style="color:#6B7280">P:'+s.pres+' A:'+s.ause+' T:'+s.tard+'</span>';
        html+='<strong style="color:'+barColor+'">'+s.pct+'%</strong></div>';
        html+='<div class="pbar-bg"><div style="height:6px;border-radius:999px;background:'+barColor+';width:'+s.pct+'%"></div></div>';
        html+='</div></div>';
      });
      html+='</div>';
    });
  } else {
    html+='<div style="text-align:center;padding:2rem;color:#9CA3AF">No hay materias activas. Agregá materias desde la tab Materias.</div>';
  }

  wrap.innerHTML=html;
}

function ofRenderPagos(){
  const el=document.getElementById('of-tbody-pagos');if(!el)return;
  if(!ofAlumnos.length){el.innerHTML='<tr><td colspan="7" style="text-align:center;padding:2rem;color:#666">No hay alumnos</td></tr>';return;}
  el.innerHTML=ofAlumnos.map(a=>{

    const p=ofPagos[k]||{estado:'pendiente',monto:'',fecha:'',materia:''};

    const obsIcon=`<button class="btn-of btn-of-sm" onclick="ofAbrirModalObsPago(${a.id},${ofMesPago})" title="Obs.">💬${obs?'<span style="color:#3C3489;font-size:10px">●</span>':''}</button>`;

function ofGetEncs(mes){return ofEncuentros[`${mes}_${ANO}`]||[];}
function ofEncKey(){return `${ofMesAsist}_${ANO}`;}

function ofAbrirModalEnc(){
  const el=document.getElementById('of-me-fecha');
  if(el) el.value=ofDateInput();
  ofUpdateFechaDisplay();
  const selMat=document.getElementById('of-me-materia');
  if(selMat){
    selMat.innerHTML='<option value="">— Elegir materia activa —</option>'+
      ofMateriasActivas().map(m=>`<option value="${m.id}">${m.nombre}</option>`).join('');
  }
  const selCap=document.getElementById('of-me-capitulo');
  if(selCap) selCap.innerHTML='<option value="">— Elegir capítulo (opcional) —</option>';
  const exChk=document.getElementById('of-me-esexamen');
  if(exChk) exChk.checked=false;
  ofEditEncId=null;
  document.getElementById('of-modalEnc').style.display='flex';
}

function ofUpdateFechaDisplay(){
  const el=document.getElementById('of-me-fecha');
  const disp=document.getElementById('of-me-fecha-display');
  if(el&&disp) disp.textContent=el.value?`📅 ${ofFmtDate(el.value)}`:'';
}

function ofUpdateCapitulos(){
  const matId=parseInt(document.getElementById('of-me-materia')?.value)||null;
  const mat=ofMaterias.find(x=>x.id===matId);
  const sel=document.getElementById('of-me-capitulo');
  if(!sel) return;
  sel.innerHTML='<option value="">— Elegir capítulo (opcional) —</option>'+
    (mat?.capitulos||[]).map(c=>`<option value="${c}">${c}</option>`).join('');
}

function ofUpdateCapitulosEdit(){
  const matId=parseInt(document.getElementById('of-me-edit-materia')?.value)||null;
  const mat=ofMaterias.find(x=>x.id===matId);
  const sel=document.getElementById('of-me-edit-capitulo');
  if(!sel) return;
  sel.innerHTML='<option value="">— Sin capítulo —</option>'+
    (mat?.capitulos||[]).map(c=>`<option value="${c}">${c}</option>`).join('');
}

function ofCerrarModal(){document.getElementById('of-modalEnc').style.display='none';}

function ofGuardarEnc(){
  const fecha=document.getElementById('of-me-fecha').value;
  if(!fecha){alert('Ingresá la fecha');return;}
  const matId=parseInt(document.getElementById('of-me-materia')?.value)||null;
  if(!matId){alert('Elegí una materia');return;}
  const capitulo=document.getElementById('of-me-capitulo')?.value||'';
  const esExamen=document.getElementById('of-me-esexamen')?.checked||false;
  const mat=ofMaterias.find(x=>x.id===matId);
  const k=ofEncKey();
  if(!ofEncuentros[k]) ofEncuentros[k]=[];
  const enc={id:Date.now(),fecha,
    materia:matId, materiaId:matId, materiaNombre:mat?.nombre||'',
    capitulo, esExamen};
  if(ofEditEncId){
    const allK=Object.keys(ofEncuentros);
    allK.forEach(key=>{
      const idx=ofEncuentros[key].findIndex(e=>e.id===ofEditEncId);
      if(idx>=0) ofEncuentros[key][idx]={...ofEncuentros[key][idx],...enc,id:ofEditEncId};
    });
    ofEditEncId=null;
  } else {
    if(!ofEncuentros[k]) ofEncuentros[k]=[];
    ofEncuentros[k].push(enc);
  }
  ofCerrarModal();ofSave();ofRenderAsistencia();ofRenderStats();
}

function ofAbrirModalEdit(eid){
  const enc=ofGetEncs(ofMesAsist).find(e=>e.id===eid);if(!enc)return;
  ofEditEncId=eid;
  document.getElementById('of-me-edit-fecha').value=enc.fecha;
  // Populate all materias for edit
  const selMat=document.getElementById('of-me-edit-materia');
  if(selMat){
    selMat.innerHTML='<option value="">— Sin materia —</option>'+
      ofMaterias.map(m=>`<option value="${m.id}"${m.id===enc.materiaId?' selected':''}>${m.nombre}${m.estado==='Inactivo'?' (inactiva)':''}</option>`).join('');
    ofUpdateCapitulosEdit();
    setTimeout(()=>{
      const selCap=document.getElementById('of-me-edit-capitulo');
      if(selCap&&enc.capitulo){
        [...selCap.options].forEach(o=>{if(o.value===enc.capitulo)o.selected=true;});
      }
    },50);
  }
  document.getElementById('of-modalEditEnc').style.display='flex';
}

function ofCerrarModalEdit(){document.getElementById('of-modalEditEnc').style.display='none';ofEditEncId=null;}

function ofGuardarEdicionEnc(){
  const k=ofEncKey();
  const fecha=document.getElementById('of-me-edit-fecha').value;
  const matId=parseInt(document.getElementById('of-me-edit-materia')?.value)||null;
  const mat=ofMaterias.find(x=>x.id===matId);
  const capitulo=document.getElementById('of-me-edit-capitulo')?.value||'';
  ofEncuentros[k]=(ofEncuentros[k]||[]).map(e=>e.id!==ofEditEncId?e:
    {...e,fecha,materiaId:matId,materiaNombre:mat?.nombre||'',capitulo});
  ofCerrarModalEdit();ofSave();ofRenderAsistencia();ofRenderStats();
}

function ofEliminarEncEdit(){
  if(!confirm('¿Eliminar este encuentro?'))return;
  const k=ofEncKey();
  ofEncuentros[k]=(ofEncuentros[k]||[]).filter(e=>e.id!==ofEditEncId);
  ofCerrarModalEdit();ofSave();ofRenderAsistencia();ofRenderStats();
}

function ofToggleAsist(aid,eid){
  const k=`${aid}_${eid}`;const ciclo=['','P','A','T'];
  ofAsistencia[k]=ciclo[(ciclo.indexOf(ofAsistencia[k]||'')+1)%ciclo.length];
  ofSave();ofRenderAsistencia();ofRenderStats();
}

function ofRenderAsistencia(){
  const matFil=document.getElementById('of-asist-materia-fil');
  // Populate materia filter dynamically
  if(matFil&&matFil.options.length<=1){
    ofMateriasActivas().forEach(m=>{
      const opt=document.createElement('option');
      opt.value=m.id; opt.textContent=m.nombre;
      matFil.appendChild(opt);
    });
  }
  const filterMat=matFil?.value||'';
  const filterFecha=document.getElementById('of-asist-fecha-fil')?.value||'';

  // Get all encounters
  let allEncs=Object.values(ofEncuentros||{}).reduce(function(acc,v){return acc.concat(v||[]);},[]);
  if(filterMat) allEncs=allEncs.filter(e=>String(e.materia||e.materiaId)===String(filterMat));
  if(filterFecha) allEncs=allEncs.filter(e=>e.fecha===filterFecha);
  allEncs.sort((a,b)=>b.fecha.localeCompare(a.fecha));

  const lista=document.getElementById('of-enc-lista-mes');
  if(!lista) return;

  if(!allEncs.length){
    lista.innerHTML='<div style="text-align:center;padding:2rem;color:#9CA3AF;font-size:13px">No hay encuentros con estos filtros</div>';
    ofRenderAsistenciaTable(null,null);return;
  }

  lista.innerHTML=allEncs.map(e=>{
    const mat=ofMaterias.find(m=>String(m.id)===String(e.materia||e.materiaId))||{nombre:'Sin materia',alumnos:[]};
    const alums=mat.alumnos||[];
    const presentes=alums.filter(aid=>ofAsistencia[`${aid}_${e.id}`]==='P').length;
    const semana=getISOWeek(e.fecha);
    const isExamen=e.esExamen||false;
    return `<div class="card" style="margin-bottom:.5rem;padding:10px 14px;cursor:pointer;border-left:4px solid ${isExamen?'#DC2626':'#7C3AED'}"
        onclick="ofSelectEnc('${e.id}','${mat.id}')">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700;color:#1F4E79">
            ${isExamen?'📝 EXAMEN — ':''}${mat.nombre}
          </div>
          <div style="font-size:12px;color:#6B7280;margin-top:2px">
            ${fmt(e.fecha)} · Semana ${semana}${e.capitulo?' · '+e.capitulo:''}
          </div>
        </div>
        <span class="badge b-ok">${presentes}/${alums.length} presentes</span>
      </div>
    </div>`;
  }).join('');

  if(allEncs.length){
    const e=allEncs[0];
    const mat=ofMaterias.find(m=>String(m.id)===String(e.materia||e.materiaId));
    ofSelectEnc(e.id, mat?.id);
  }
}

function ofClearAsistFil(){
  const mf=document.getElementById('of-asist-materia-fil');
  const ff=document.getElementById('of-asist-fecha-fil');
  if(mf){mf.innerHTML='<option value="">Todas las materias</option>';mf.value='';}
  if(ff) ff.value='';
  ofRenderAsistencia();
}

function ofSelectEnc(encId, matId){
  ofRenderAsistenciaTable(encId, matId);
}

function ofRenderAsistenciaTable(encId, matId){
  const wrap=document.getElementById('of-asist-tabla');
  if(!wrap) return;
  if(!encId){wrap.innerHTML='';return;}

  const mat=matId?ofMaterias.find(m=>String(m.id)===String(matId)):null;
  const alums=mat?(mat.alumnos||[]).map(id=>ofAlumnos.find(a=>a.id===id)).filter(Boolean):ofAlumnos;
  const allEncs=Object.values(ofEncuentros||{}).reduce(function(acc,v){return acc.concat(v||[]);},[]);
  const enc=allEncs.find(e=>String(e.id)===String(encId));
  if(!enc){wrap.innerHTML='';return;}

  const isExamen=enc.esExamen||false;

  let html=`<div class="card" style="margin-top:.75rem;border-left:4px solid ${isExamen?'#DC2626':'#7C3AED'}">
    <div style="font-size:13px;font-weight:700;color:#1F4E79;margin-bottom:1rem">
      ${isExamen?'📝 Examen — marcar Completado/Incompleto':'✅ Asistencia del encuentro'}
    </div>`;

  if(!alums.length){
    html+='<div style="color:#9CA3AF;font-size:13px">No hay alumnos asignados a esta materia. Editá la materia para asignarlos.</div>';
  } else {
    alums.forEach(a=>{
      if(isExamen){
        // For exam: show Completado / Incompleto toggle
        const comp=(mat?.completados||{})[a.id]||false;
        html+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F3F4F6">
          <span style="font-size:13px;font-weight:500">${a.nombre} ${a.apellido}</span>
          <button onclick="ofToggleCompletado('${matId}','${a.id}')"
            style="padding:5px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;
            background:${comp?'#D1FAE5':'#F3F4F6'};color:${comp?'#065F46':'#6B7280'}">
            ${comp?'✅ Completado':'⬜ Incompleto'}
          </button>
        </div>`;
      } else {
        const v=ofAsistencia[`${a.id}_${enc.id}`]||'';
        const colors={P:'#D1FAE5',A:'#FEE2E2',T:'#FEF3C7','':'#F3F4F6'};
        const tColors={P:'#065F46',A:'#991B1B',T:'#92400E','':'#6B7280'};
        const labels={P:'Presente',A:'Ausente',T:'Tardanza','':'Sin marcar'};
        html+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F3F4F6">
          <span style="font-size:13px;font-weight:500">${a.nombre} ${a.apellido}</span>
          <button onclick="ofToggleAsist('${a.id}','${enc.id}')"
            style="padding:5px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;
            background:${colors[v]};color:${tColors[v]}">
            ${labels[v]}
          </button>
        </div>`;
      }
    });
  }
  html+='</div>';
  wrap.innerHTML=html;
}

function ofToggleCompletado(matId, alumId){
  const mat=ofMaterias.find(m=>String(m.id)===String(matId));
  if(!mat) return;
  if(!mat.completados) mat.completados={};
  mat.completados[alumId]=!mat.completados[alumId];
  ofSave();
  // Re-render table
  const allEncs=Object.values(ofEncuentros||{}).reduce(function(acc,v){return acc.concat(v||[]);},[]);
  const examEnc=allEncs.find(e=>e.esExamen&&String(e.materia||e.materiaId)===String(matId));
  if(examEnc) ofRenderAsistenciaTable(examEnc.id, matId);
  showToast(mat.completados[alumId]?'✅ Completado':'⬜ Incompleto', mat.completados[alumId]?'#16A34A':'#6B7280');
}
function ofExportar(){
  alert(`Datos actuales:\n• Alumnos: ${ofAlumnos.length}\n• Materias: ${ofMaterias.length}\n\nUsá el botón 💾 Exportar del inicio para guardar todos los datos.`);
}

let nvSelectedId=null;
let nvFiltro='ultimos30'; // 'ultimos30' | 'mas30' | 'historico'

function renderNuevos(){
  const search=(document.getElementById('nv-search')?.value||'').toLowerCase();
  const fGrupo=parseInt(document.getElementById('nv-fil-grupo')?.value)||null;
  const fGen=document.getElementById('nv-fil-gen')?.value||'';

  const gsel=document.getElementById('nv-fil-grupo');
  if(gsel&&gsel.options.length<=1)
    S.groups.forEach(g=>{const o=document.createElement('option');o.value=g.id;o.textContent=g.name;gsel.appendChild(o);});

  const hoy=new Date(); hoy.setHours(0,0,0,0);
  const hace30=new Date(hoy); hace30.setDate(hace30.getDate()-30);

  let members;
  if(nvFiltro==='historico'){
    // Include both new-style (condicion='Historico') and old-style (estado='Baja') contacts
    members=S.members.filter(m=>m.condicion==='Historico'||m.estado==='Baja');
  } else {
    members=S.members.filter(m=>m.condicion==='Nuevo'&&m.estado!=='Baja');
    members=members.filter(m=>{
      const partes=(m.fechaRegistro||'').split('/');
      if(partes.length<3) return true; // sin fecha → mostrar siempre
      let yy=parseInt(partes[2]);
      if(yy<100) yy+=2000; // handle 2-digit year
      const fReg=new Date(yy,+partes[1]-1,+partes[0]);
      if(isNaN(fReg.getTime())) return true; // fecha inválida → mostrar siempre
      return nvFiltro==='ultimos30' ? fReg>=hace30 : fReg<hace30;
    });
  }
  if(search) members=members.filter(m=>fullName(m).toLowerCase().includes(search));
  if(fGrupo) members=members.filter(m=>m.grupoId===fGrupo);
  if(fGen)   members=members.filter(m=>m.genero===fGen);

  // Sort: unassigned seguimiento first, then by registration date
  members.sort(function(a,b){
    var aHas=a.seguimientoId?1:0;
    var bHas=b.seguimientoId?1:0;
    return aHas-bHas; // 0 (sin asignar) primero
  });

  const countEl=document.getElementById('nv-count');
  if(countEl) countEl.textContent=S.members.filter(m=>m.condicion==='Nuevo'&&m.estado!=='Baja').length;

  const wrap=document.getElementById('nv-list');
  if(!wrap) return;

  if(!members.length){
    wrap.innerHTML=`<div class="empty" style="background:#F9FAFB;border-radius:12px;padding:3rem">
      <div style="font-size:2.5rem;margin-bottom:1rem">🌱</div>
      <div style="font-size:14px;font-weight:600;color:#374151;margin-bottom:.5rem">Sin nuevos contactos</div>
      <div style="font-size:13px;color:#9CA3AF">Los miembros con Condición "Nuevo" aparecerán acá automáticamente</div>
    </div>`;
    return;
  }

  wrap.innerHTML=members.map(m=>{
    const allGids=[m.grupoId,...(m.grupoIds||[])].filter(Boolean).map(Number);
    const memberGroups=allGids.map(gid=>S.groups.find(x=>Number(x.id)===gid)).filter(Boolean);
    const genBg=m.genero==='H'?'#DBEAFE':'#FCE7F3';
    const genColor=m.genero==='H'?'#1E40AF':'#9D174D';
    const edad=saCalcEdad(m.fnac);
    // Seguimiento display
    const segNombre=m.seguimientoNombre||'';
    const segLabel=segNombre
      ?`<span style="color:#1F4E79;cursor:pointer;text-decoration:underline dotted" onclick="nvEditSeguimiento(${m.id})">${segNombre}</span>`
      :`<span style="color:#F59E0B;cursor:pointer;font-weight:600" onclick="nvEditSeguimiento(${m.id})">⏳ Pendiente</span>`;
    const origenBadge=m.origen==='QR / Formulario'
      ?'<span style="background:#EDE9FE;color:#5B21B6;font-size:10px;padding:1px 7px;border-radius:99px">📱 QR</span>'
      :m.origen==='Carga manual'
      ?'<span style="background:#E0F2FE;color:#0369A1;font-size:10px;padding:1px 7px;border-radius:99px">✏️ Manual</span>'
      :'';

    return `<div class="card" style="margin-bottom:.75rem;border-left:4px solid #16A34A;padding:12px 14px">
      <div style="display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap">
        <div style="width:40px;height:40px;border-radius:50%;background:#F0FDF4;border:2px solid #86EFAC;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#16A34A;flex-shrink:0">
          ${initials(fullName(m))}
        </div>
        <div style="flex:1;min-width:160px">
          <div style="font-weight:700;font-size:14px;color:#1F2937">${fullName(m)} ${origenBadge}</div>
          <div style="font-size:12px;color:#6B7280;margin-top:3px;display:flex;flex-wrap:wrap;gap:6px;align-items:center">
            ${memberGroups.length?memberGroups.map(gr=>`<span style="color:#374151">${gr.name}</span>`).join(' · '):'<span style="color:#F59E0B">Sin grupo</span>'}
            ${m.tel?`<span>· 📱 ${m.tel}</span>`:''}
            ${nvCalcEdad(m.fnac)!==null?`<span>· ${nvCalcEdad(m.fnac)} años</span>`:''}
            <span style="margin-left:auto;color:#9CA3AF;font-size:11px">📅 ${m.fechaRegistro||'Sin fecha'}</span>
          </div>
          <div style="font-size:12px;margin-top:5px;display:flex;flex-wrap:wrap;gap:10px">
            ${m.comoNosConocio?`<span style="color:#6B7280">🔗 ${m.comoNosConocio}</span>`:''}
            <span>👤 Seguimiento: ${segLabel}</span>
          </div>
          ${m.motivoContacto?`<div style="font-size:12px;color:#374151;margin-top:4px;font-style:italic">💬 ${m.motivoContacto}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
          <span style="background:#FEF3C7;color:#92400E;font-size:11px;padding:3px 10px;border-radius:99px;font-weight:600">🌱 Nuevo</span>
          <button class="btn btn-sm" onclick="nvAbrirEditar(${m.id})">✏️ Editar</button>
          ${canGestionarNuevos()||isContactar()?`<button class="btn btn-sm btn-primary" onclick="nvOpenPromote(${m.id})">Gestionar →</button>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

  const coms=(m.comentarios||[]).slice().sort((a,b)=>b.ts-a.ts);

async function nvPromover(condicion){
  if(!nvSelectedId) return;
  const m=S.members.find(x=>x.id===nvSelectedId);
  if(!m) return;
  const txtComentario=(document.getElementById('nv-comentario-txt')?.value||'').trim();
  if(!txtComentario||txtComentario.length<10){
    alert('El comentario es obligatorio (mín. 10 caracteres) para registrar cualquier cambio de condición.');
    document.getElementById('nv-comentario-txt')?.focus();
    return;
  }
  const condAnterior=m.condicion||'Nuevo';
  m.condicion=condicion;
  if(!m.comentarios) m.comentarios=[];
  const textoAccion=condicion==='Nuevo'
    ?`Mantenido como Nuevo (estaba: ${condAnterior})`
    :`Promovido/a de "${condAnterior}" a "${condicion}"`;
  m.comentarios.push({
    texto:`${textoAccion}. ${txtComentario}`,
    autor:currentUser?.name||'Sistema',
    ts:Date.now()
  });
  document.getElementById('nv-comentario-txt').value='';
  await saveK(SK.members,S.members);
  nvClosePromote();
  renderNuevos();
  showToast(condicion==='Nuevo'
    ?'Condición mantenida como Nuevo'
    :`✅ ${fullName(m)} promovido/a a ${condicion}`, '#16A34A');
}

function fmtFnacM(el){
  var v=el.value.replace(/[^0-9]/g,'');
  if(v.length>2) v=v.slice(0,2)+'/'+v.slice(2);
  if(v.length>5) v=v.slice(0,5)+'/'+v.slice(5,7);
  el.value=v;
}
function nvCalcEdad(fnac){
  if(!fnac) return null;
  // fnac format: DD/MM/AA or DD/MM/AAAA
  const parts=fnac.split('/');
  if(parts.length<3) return null;
  const dd=parseInt(parts[0]),mm=parseInt(parts[1]);
  let yy=parseInt(parts[2]);
  const hoy=new Date();
  if(yy<100){
    const curYY=hoy.getFullYear()%100;
    yy += (yy>curYY) ? 1900 : 2000;
  }
  let edad=hoy.getFullYear()-yy;
  const mDiff=hoy.getMonth()+1-mm;
  if(mDiff<0||(mDiff===0&&hoy.getDate()<dd)) edad--;
  return edad>=0&&edad<120?edad:null;
}

function nvCumplesBanner(){
  const hoy=new Date(); hoy.setHours(0,0,0,0); // compare at midnight
  const dd=hoy.getDate(), mm=hoy.getMonth()+1;
  const proximos=[];
  S.members.filter(Boolean).filter(m=>m.condicion==='Nuevo'&&m.estado!=='Baja'&&m.fnac).forEach(m=>{
    const parts=m.fnac.split('/');
    if(parts.length<3) return;
    const dNac=parseInt(parts[0]),mNac=parseInt(parts[1]);
    // Days until birthday this year
    const cumpleEsteAnio=new Date(hoy.getFullYear(),mNac-1,dNac);
    if(cumpleEsteAnio<hoy) cumpleEsteAnio.setFullYear(hoy.getFullYear()+1);
    const dias=Math.floor((cumpleEsteAnio-hoy)/(1000*60*60*24));
    if(dias<=15) proximos.push({nombre:m.nombre+' '+m.apellido,dias,dNac,mNac});
  });
  const wrap=document.getElementById('nv-cumples-wrap');
  if(!wrap) return;
  wrap.style.display='block';
  if(!proximos.length){
    wrap.innerHTML='<div style="font-size:13px;color:#92400E;font-weight:600">🎂 Sin cumpleaños en los próximos 15 días</div>';
    return;
  }
  proximos.sort((a,b)=>a.dias-b.dias);
  wrap.style.display='block';
  wrap.innerHTML='<div style="font-size:13px;color:#92400E;font-weight:600;margin-bottom:6px">🎂 Próximos cumpleaños en Nuevos</div>'+
    proximos.map(p=>{
      const cumpleDate=new Date(new Date().getFullYear()+(p.dias>0&&new Date().getMonth()+1>p.mNac?1:0),p.mNac-1,p.dNac);
      const diasSemana=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'][cumpleDate.getDay()];
      const fechaStr=diasSemana+' '+String(p.dNac).padStart(2,'0')+'/'+String(p.mNac).padStart(2,'0');
      const diasLabel=p.dias===0?'HOY':p.dias===1?'Mañana':'en '+p.dias+' días';
      return `<div style="display:flex;align-items:center;gap:12px;padding:5px 0;border-bottom:1px solid #FDE68A">
        <span style="font-size:13px;font-weight:600;color:#78350F;flex:1">🎂 ${p.nombre}</span>
        <span style="font-size:13px;font-weight:700;color:#B45309;min-width:80px">${diasLabel}</span>
        <span style="font-size:12px;color:#92400E">${fechaStr}</span>
      </div>`;
    }).join('');
}

async function nvSaveInlineForm(){
  try{
    const nombre=(document.getElementById('nv-mf-nombre')?.value||'').trim();
    const apellido=(document.getElementById('nv-mf-apellido')?.value||'').trim();
    const cel=(document.getElementById('nv-mf-cel')?.value||'').trim();
    const fnac=(document.getElementById('nv-mf-fnac')?.value||'').trim();
    const genero=document.getElementById('nv-mf-genero')?.value||'H';
    const barrio=(document.getElementById('nv-mf-barrio')?.value||'').trim();
    const como=document.getElementById('nv-mf-como')?.value||'';
    const motivo=(document.getElementById('nv-mf-motivo')?.value||'').trim();
    const segId=document.getElementById('nv-mf-seguimiento-id')?.value||'';
    const segLabel=document.getElementById('nv-mf-seguimiento-label')?.textContent||'';
    const err=document.getElementById('nv-form-error');
    if(!nombre||!apellido||!cel){
      const msg='Completá los campos obligatorios: Nombre, Apellido y Celular (*)';
      if(err){err.textContent=msg;err.style.display='block';}
      else alert(msg);
      return;
    }
    if(err) err.style.display='none';
    const nuevo={
      id:Date.now(),nombre,apellido,
      tel:cel,genero,grupoId:null,
      condicion:'Nuevo',estado:'Activo',
      dir:barrio,fnac,roles:[],
      comoNosConocio:como,
      motivoContacto:motivo,
      seguimientoId:segId?parseInt(segId):null,
      seguimientoNombre:segId?segLabel:'',
      fechaRegistro:todayAA(),
      origen:'Carga manual'
    };
    S.members.push(nuevo);
    // Save directly to localStorage - avoid full saveK to prevent stack overflow on large datasets
    try{
      localStorage.setItem('gdv_m5', JSON.stringify(S.members));
    }catch(saveErr){
      // If stringify fails (too large), try saving without formacion arrays
      const slim=S.members.map(function(m){
        var c=Object.assign({},m);
        if(c.formacion&&c.formacion.length>50) c.formacion=c.formacion.slice(-50);
        return c;
      });
      localStorage.setItem('gdv_m5', JSON.stringify(slim));
    }
    // Schedule Firebase upload via debounce
    if(window.fbReady){
      clearTimeout(window._fbSyncTimer);
      window._fbSyncTimer=setTimeout(function(){
        window.fbUpload&&window.fbUpload(false);
      },500);
    }
    nvCloseInlineForm();
    showToast('✅ '+nombre+' '+apellido+' agregado a Nuevos Contactos','#16A34A');
  }catch(e){
    console.error('nvSaveInlineForm error:',e);
    const stack=(e.stack||'').split('\n').slice(0,6).join('\n');
    alert('Error: '+e.message+'\n\nDónde:\n'+stack);
  }
}

let roleModalEditingId=null;
let roleModalCallback=null; // function to call after save to re-render

function openRoleModal(id, onSave){
  roleModalEditingId=id||null;
  roleModalCallback=onSave||null;
  document.getElementById('role-modal-title').textContent=id?'Editar función':'Nueva función';
  if(id){
    const r=S.roles.find(x=>x.id===id);
    if(!r) return;
    document.getElementById('rm-nombre').value=r.name;
    document.getElementById('rm-color').value=r.color;
    document.getElementById('rm-desc').value=r.desc||'';
  } else {
    document.getElementById('rm-nombre').value='';
    document.getElementById('rm-color').value='#1F4E79';
    document.getElementById('rm-desc').value='';
  }
  const overlay=document.getElementById('role-modal-overlay');
  overlay.style.display='flex';
}

function closeRoleModal(){
  document.getElementById('role-modal-overlay').style.display='none';
  roleModalEditingId=null;
}

async function saveRoleModal(){
  const name=document.getElementById('rm-nombre').value.trim();
  if(!name){alert('Ingresá un nombre para el rol');return;}
  const color=document.getElementById('rm-color').value;
  const desc=document.getElementById('rm-desc').value.trim();
  if(roleModalEditingId){
    Object.assign(S.roles.find(x=>x.id===roleModalEditingId),{name,color,desc});
  } else {
    const id=name.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'')+Date.now();
    S.roles.push({id,name,color,desc});
  }
  await saveK(SK.roles,S.roles);
  closeRoleModal();
  if(roleModalCallback) roleModalCallback();
}

async function deleteRoleGlobal(id, callback){
  const r=S.roles.find(x=>x.id===id);
  if(!confirm(`¿Eliminar el rol "${r?.name}"? Se quitará de todos los miembros.`)) return;
  S.roles=S.roles.filter(x=>x.id!==id);
  S.members.forEach(m=>{m.roles=(m.roles||[]).filter(rid=>rid!==id);});
  await saveK(SK.roles,S.roles);
  await saveK(SK.members,S.members);
  if(callback) callback();
}

// ════════════════════════════════════════════════════════════
function renderHomeCumples(){
  var wrap=document.getElementById('home-cumple-wrap');
  if(!wrap) return;

  var hoy=new Date(); hoy.setHours(0,0,0,0);
  var hoyMes=hoy.getMonth()+1;
  var hoyDia=hoy.getDate();

  // Get members with birthdate, calculate days until next birthday
  var conCumple=S.members.filter(function(m){
    return m.estado!=='Baja' && m.fnac && m.fnac.length>=7;
  }).map(function(m){
    var parts=m.fnac.split('-');
    var mes=parseInt(parts[1]);
    var dia=parseInt(parts[2]);
    var anio=parseInt(parts[0]);
    // Calculate age this year
    var edadEsteAnio=hoy.getFullYear()-anio;

    // Days until birthday this year
    var cumpleEsteAnio=new Date(hoy.getFullYear(), mes-1, dia);
    if(cumpleEsteAnio<hoy){
      // Already passed this year, calculate for next year
      cumpleEsteAnio=new Date(hoy.getFullYear()+1, mes-1, dia);
      edadEsteAnio++;
    }
    var diff=Math.floor((cumpleEsteAnio-hoy)/(1000*60*60*24));
    var g=S.groups.find(function(x){return x.id===m.grupoId;});
    return {
      nombre:m.nombre+' '+m.apellido,
      grupo:g?g.name:'',
      mes:mes, dia:dia,
      edad:edadEsteAnio,
      diff:diff,
      genero:m.genero
    };
  }).filter(function(m){ return m.diff<=15; })
    .sort(function(a,b){ return a.diff-b.diff; });

  if(!conCumple.length){
    wrap.innerHTML='<div class="card" style="border-left:4px solid #F59E0B;padding:10px 14px;font-size:13px;color:#92400E">🎂 Sin cumpleaños en los próximos 15 días</div>';
    return;
  }

  var html='<div class="card" style="border-left:4px solid #F59E0B">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">';
  html+='<div class="card-title" style="margin:0">🎂 Próximos cumpleaños <span style="font-size:12px;color:#6B7280;font-weight:400">(próximos 15 días)</span></div>';
  html+='<span style="font-size:12px;color:#F59E0B;font-weight:600">'+conCumple.length+' cumpleaños</span>';
  html+='</div>';

  conCumple.forEach(function(m){
    var badge='';
    var bgColor='#FFFBEB';
    if(m.diff===0){
      badge='<span style="background:#FEF3C7;color:#92400E;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600">🎉 ¡HOY!</span>';
      bgColor='#FEF9C3';
    } else if(m.diff===1){
      badge='<span style="background:#FEE2E2;color:#991B1B;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600">🔔 Mañana</span>';
    } else if(m.diff<=7){
      badge='<span style="background:#FEF3C7;color:#92400E;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600">En '+m.diff+' días</span>';
    } else {
      badge='<span style="background:#F3F4F6;color:#6B7280;font-size:11px;padding:2px 8px;border-radius:99px">En '+m.diff+' días</span>';
    }
    var genColor=m.genero==='H'?'#1E40AF':'#9D174D';
    var genBg=m.genero==='H'?'#DBEAFE':'#FCE7F3';
    html+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #FEF3C7;background:'+bgColor+';margin:0 -4px;padding:8px 4px">';
    html+='<div style="font-size:20px">🎂</div>';
    html+='<div style="flex:1">';
    html+='<div style="font-size:13px;font-weight:600;color:#1F2937">'+m.nombre;
    html+=' <span style="background:'+genBg+';color:'+genColor+';font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600">'+m.genero+'</span>';
    html+='</div>';
    html+='<div style="font-size:11px;color:#6B7280">'+m.grupo+(m.grupo?' · ':'')+m.dia+'/'+m.mes+' — cumple '+m.edad+' años</div>';
    html+='</div>';
    html+=badge;
    html+='</div>';
  });

  html+='</div>';
  wrap.innerHTML=html;
}

function enviarForm(){

  var a=document.getElementById('f-apellido').value.trim();

}

let discEditingPasoId=null;

function discTab(tab, btn){
  document.querySelectorAll('[id^="disc-tab-"]').forEach(function(b){b.className='btn btn-sm';});
  if(btn) btn.className='btn btn-primary btn-sm';
  var c=document.getElementById('disc-content');
  if(!c) return;
  if(tab==='dashboard') discRenderDashboard(c);
  else if(tab==='pasos') discRenderPasos(c);
  else if(tab==='cargar') discRenderCargar(c);
  else if(tab==='registros') discRenderRegistros(c);
}

function discRenderDashboard(c){
  // Determine which pasos to show
  var pasosToShow;
  if(isSuperAdmin()||canEjecutar('disc_pasos')||canEjecutar('disc_registros')){
    // Ver todos
    pasosToShow=S.discPasos;
  } else {
    // Discipulador solo ve su paso
    pasosToShow=S.discPasos.filter(function(p){
      return p.discipuladorId&&S.members.find(function(m){
        return m.id===p.discipuladorId&&fullName(m).toLowerCase()===currentUser.name.toLowerCase();
      });
    });
  }

  if(!pasosToShow.length){
    c.innerHTML='<div class="empty">No tenés ningún paso asignado como discipulador</div>';
    return;
  }

  var html='';
  pasosToShow.forEach(function(paso){
    var disc=paso.discipuladorId?S.members.find(function(m){return m.id===paso.discipuladorId;}):null;
    var mems=paso.miembros.map(function(id){return S.members.find(function(m){return m.id===id;});}).filter(Boolean);
    var recs=S.discRecords.filter(function(r){return r.pasoId===paso.id;});

    // Stats
    var totalEnc=recs.length;
    var capsUsadas=[...new Set(recs.map(function(r){return r.capitulo;}))];

    // Per member stats
    var memberStats=mems.map(function(m){
      var presencias=recs.filter(function(r){return r.asistencia[m.id]&&r.asistencia[m.id].state==='presente';}).length;
      var pct=totalEnc>0?Math.round(presencias/totalEnc*100):0;
      var completado=(paso.completados||{})[m.id]||false;
      return {m:m,presencias:presencias,pct:pct,completado:completado};
    });

    var completados=memberStats.filter(function(x){return x.completado;}).length;
    var isActivo=paso.estado==='Activo';

    html+='<div class="card" style="margin-bottom:1.25rem;border-left:4px solid '+(isActivo?'#7C3AED':'#9CA3AF')+'">';
    // Header
    html+='<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:1rem">';
    html+='<div>';
    var nivelColors={'Inicial':'#3B82F6','Intermedio':'#8B5CF6','Avanzado':'#EC4899'};
    var nc=nivelColors[paso.nivel]||'#6B7280';
    html+='<div style="display:flex;align-items:center;gap:8px">';
    html+='<div style="font-size:16px;font-weight:700;color:#1F4E79">'+paso.nombre+'</div>';
    html+='<span style="background:'+nc+'22;color:'+nc+';font-size:11px;padding:2px 10px;border-radius:99px;font-weight:600">'+(paso.nivel||'')+'</span>';
    html+='</div>';
    html+='<div style="font-size:12px;color:#6B7280;margin-top:3px">';
    html+='Discipulador: <strong>'+(disc?fullName(disc):'Sin asignar')+'</strong>';
    html+='</div></div>';
    html+='<span class="badge '+(isActivo?'b-ok':'b-muted')+'">'+(isActivo?'Activo':'Inactivo')+'</span>';
    html+='</div>';

    // KPIs
    html+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:1rem">';
    html+='<div class="stat" style="padding:10px"><span class="stat-val" style="font-size:1.5rem">'+mems.length+'</span><span class="stat-lbl">Alumnos</span></div>';
    html+='<div class="stat" style="padding:10px"><span class="stat-val" style="font-size:1.5rem">'+totalEnc+'</span><span class="stat-lbl">Encuentros</span></div>';
    html+='<div class="stat" style="padding:10px"><span class="stat-val" style="font-size:1.5rem;color:#7C3AED">'+capsUsadas.length+'/'+paso.capitulos.length+'</span><span class="stat-lbl">Caps. dados</span></div>';
    html+='<div class="stat" style="padding:10px"><span class="stat-val" style="font-size:1.5rem;color:#16A34A">'+completados+'/'+mems.length+'</span><span class="stat-lbl">Completados</span></div>';
    html+='</div>';

    // Member progress table
    if(mems.length){
      html+='<div style="font-size:12px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Progreso individual</div>';
      memberStats.forEach(function(ms){
        var barColor=ms.pct>=75?'#16A34A':ms.pct>=50?'#1F4E79':ms.pct>=25?'#D97706':'#DC2626';
        var genBg=ms.m.genero==='H'?'#DBEAFE':'#FCE7F3';
        var genColor=ms.m.genero==='H'?'#1E40AF':'#9D174D';
        html+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F3F4F6;flex-wrap:wrap">';
        html+='<span style="background:'+genBg+';color:'+genColor+';font-size:11px;padding:1px 7px;border-radius:4px;font-weight:600;flex-shrink:0">'+ms.m.genero+'</span>';
        html+='<span style="font-size:13px;font-weight:600;flex:1;min-width:120px">'+fullName(ms.m)+'</span>';
        html+='<div style="flex:2;min-width:100px">';
        html+='<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">';

async function discCheckAprobacion(pasoId, memberId){
  // Max 1 ausencia (Justificado = Presente)
  var records=S.discRecords.filter(function(r){return r.pasoId===pasoId;});
  var ausencias=records.filter(function(r){
    var att=r.asistencia&&r.asistencia[memberId];
    return att&&att.state==='ausente';
  }).length;
  return ausencias<=1;
}

async function discToggleCompletado(pasoId, memberId){
  var paso=S.discPasos.find(function(p){return p.id===pasoId;});
  if(!paso) return;
  if(!paso.completados) paso.completados={};
  var yaCompletado=paso.completados[memberId];

  if(!yaCompletado){
    // Validar aprobacion: max 1 ausencia
    var aprueba=await discCheckAprobacion(pasoId,memberId);
    if(!aprueba){
      if(isSuperAdmin()||canEjecutar('disc_pasos')){
        if(!confirm('Este miembro tiene más de 1 ausencia. Como Admin podés aprobar igual. ¿Confirmar Completado?')) return;
      } else {
        alert('El miembro tiene más de 1 ausencia. No cumple el requisito de aprobación.');
        return;
      }
    }
    paso.completados[memberId]=true;
    // Guardar fecha de completado (último encuentro de este paso)
    if(!paso.fechasCompletado) paso.fechasCompletado={};
    var records=S.discRecords.filter(function(r){return r.pasoId===pasoId;});
    var ultFecha=records.length?records.sort(function(a,b){return b.fecha.localeCompare(a.fecha);})[0].fecha:todayAA();
    paso.fechasCompletado[memberId]=ultFecha;
    // Auto-alimentar Formación del miembro
    var miembro=S.members.find(function(m){return m.id==memberId;});
    if(miembro){
      if(!miembro.formacion) miembro.formacion=[];
      var yaEnForm=miembro.formacion.find(function(f){return f.pasoId===pasoId&&f.fuente==='auto';});
      if(!yaEnForm){
        miembro.formacion.push({pasoId,pasoNombre:paso.nombre,fechaCompletado:ultFecha,fuente:'auto'});
        await saveK(SK.members,S.members);
      }
    }
  } else {
    paso.completados[memberId]=false;
  }

  await saveK(SK.discPasos,S.discPasos);
  var c=document.getElementById('disc-content');
  if(c) discRenderDashboard(c);
  showToast(paso.completados[memberId]?'✅ Marcado como Completado':'⬜ Marcado como Incompleto',
    paso.completados[memberId]?'#16A34A':'#6B7280');
}

function discToggleAtt(memberId){
  if(!discFacAtt[memberId]) return;
  var cur=discFacAtt[memberId].state;
  var next=cur==='ausente'?'presente':cur==='presente'?'justificado':'ausente';
  discFacAtt[memberId].state=next;
  var btn=document.getElementById('disc-att-'+memberId);
  if(btn){
    btn.style.background=next==='presente'?'#D1FAE5':next==='justificado'?'#FEF3C7':'#FEE2E2';
    btn.style.color=next==='presente'?'#065F46':next==='justificado'?'#92400E':'#991B1B';
    btn.textContent=next==='presente'?'Presente':next==='justificado'?'Justificado':'Ausente';
  }
}

async function discGuardarAsistencia(){
  var pasoId=discSelectedPasoId;
  var fecha=document.getElementById('disc-fecha').value;
  var capitulo=document.getElementById('disc-sel-cap').value;
  if(!pasoId||!fecha||!capitulo){
    alert('Completá Paso, Fecha y Capítulo');return;
  }
  if(!Object.keys(discFacAtt).length){alert('No hay miembros en este paso');return;}

  // Check for duplicate week (same paso + same ISO week)
  var semana=getISOWeek(fecha);
  var anio=new Date(fecha).getFullYear();
  var yaExiste=S.discRecords.find(function(r){
    if(r.pasoId!==pasoId) return false;
    return getISOWeek(r.fecha)===semana && new Date(r.fecha).getFullYear()===anio;
  });
  if(yaExiste){
    if(isSuperAdmin()||canEjecutar('disc_pasos')){
      if(!confirm('Ya existe un registro para la Semana '+semana+' en este Paso. Como Admin podés guardar igual para corregir errores. ¿Continuar?')) return;
    } else {
      alert('Ya existe un registro para la Semana '+semana+' en este Paso. Contactá al Admin si hay un error.');
      return;
    }
  }

  var paso=S.discPasos.find(function(p){return p.id===pasoId;});
  S.discRecords.push({
    id:Date.now(),pasoId,pasoNombre:paso?paso.nombre:'',
    fecha,capitulo,asistencia:{...discFacAtt},ts:new Date().toISOString()
  });
  await saveK(SK.discRecords,S.discRecords);
  var al=document.getElementById('disc-alert');
  al.textContent='✅ Asistencia guardada correctamente.';
  al.classList.remove('hidden');
  setTimeout(function(){al.classList.add('hidden');},3000);
}

function discRenderRegistros(c){
  var recs=[...S.discRecords].sort(function(a,b){return b.fecha.localeCompare(a.fecha);});
  if(!recs.length){
    c.innerHTML='<div class="empty">Sin registros de asistencia cargados aún</div>';
    return;
  }
  var html='<div style="font-size:14px;font-weight:600;color:#1F4E79;margin-bottom:1rem">'+recs.length+' registros</div>';
  recs.forEach(function(r){
    var att=Object.values(r.asistencia||{});
    var presentes=att.filter(function(v){return v.state==='presente';}).length;
    html+='<div class="card" style="margin-bottom:.75rem;padding:12px">';
    html+='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
    html+='<span style="font-weight:600">'+(r.fecha?fmt(r.fecha):'—')+'</span>';
    html+='<span class="badge b-muted">'+r.pasoNombre+'</span>';
    html+='<span style="flex:1;font-size:13px;color:#6B7280">'+r.capitulo+'</span>';
    html+='<span class="badge b-ok">'+presentes+'/'+att.length+' presentes</span>';
    html+='<button class="btn btn-sm" onclick="discEditRecord('+r.id+')">✏️</button>';
    html+='<button class="btn btn-sm btn-danger" onclick="discDeleteRecord('+r.id+')">🗑</button>';
    html+='</div>';
    html+='<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px">';
    att.forEach(function(v){
      html+='<span style="font-size:11px;padding:2px 8px;border-radius:4px;background:'+(v.state==='presente'?'#D1FAE5':'#FEE2E2')+';color:'+(v.state==='presente'?'#065F46':'#991B1B')+'">'+v.name+'</span>';
    });
    html+='</div></div>';
  });
  c.innerHTML=html;
}
