      <option value="15:00 hs">15:00 hs</option><option value="16:00 hs">16:00 hs</option>
      <option value="17:00 hs">17:00 hs</option><option value="18:00 hs">18:00 hs</option>
      <option value="18:30 hs">18:30 hs</option><option value="19:00 hs">19:00 hs</option>
      <option value="19:30 hs">19:30 hs</option><option value="20:00 hs">20:00 hs</option>
      <option value="20:30 hs">20:30 hs</option><option value="21:00 hs">21:00 hs</option>
      <option value="21:30 hs">21:30 hs</option><option value="22:00 hs">22:00 hs</option>
    </select>
    <label style="font-size:13px;color:#4B5563;display:block;margin:10px 0 4px">Facilitador</label>
    <select id="cfg-gf-fac" style="width:100%" onchange="cfgCheckFac2()"></select>
    <div id="cfg-gf-fac2-row" style="display:none">
      <label style="font-size:13px;color:#4B5563;display:block;margin:8px 0 4px">Facilitador 2</label>
      <select id="cfg-gf-fac2" style="width:100%"></select>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem">
      <button class="btn" onclick="cfgCloseGroupForm()">Cancelar</button>
      <button class="btn btn-primary" onclick="cfgSaveGroup()">Guardar</button>
    </div>
  </div>
</div>
    <div id="nv-form-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;align-items:center;justify-content:center;padding:1rem">
      <div style="background:#fff;border-radius:14px;padding:1.5rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.2)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
          <div style="font-size:15px;font-weight:700;color:#1F4E79">+ Nuevo contacto</div>
          <button class="btn btn-sm" onclick="nvCloseInlineForm()">✕</button>
        </div>
        <div class="error" id="nv-form-error" style="display:none;background:#FEE2E2;color:#991B1B;border-radius:8px;padding:10px;font-size:13px;margin-bottom:12px"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div><label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:4px">Nombre *</label>
            <input type="text" id="nv-mf-nombre" placeholder="Nombre"></div>
          <div><label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:4px">Apellido *</label>
            <input type="text" id="nv-mf-apellido" placeholder="Apellido"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px">
          <div><label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:4px">Celular *</label>
            <input type="tel" id="nv-mf-cel" placeholder="11 1234-5678" inputmode="numeric"></div>
          <div><label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:4px">Fecha nacimiento <span style="font-weight:400;color:#9CA3AF">(opcional)</span></label>
            <input type="text" id="nv-mf-fnac" placeholder="DD/MM/AA" maxlength="8" inputmode="numeric" oninput="fmtFnacM(this)"></div>
        </div>
        <div class="form-row" style="margin-top:8px">
          <div><label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:4px">Género *</label>
            <select id="nv-mf-genero" style="width:100%"><option value="">—</option><option value="H">Hombre</option><option value="M">Mujer</option></select>
          </div>
          <div><label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:4px">DNI <span style="font-weight:400;color:#9CA3AF">(opcional)</span></label>
            <input type="text" id="nv-mf-dni" placeholder="Ej: 12345678" maxlength="9" inputmode="numeric" onkeypress="return /[0-9]/.test(event.key)" style="width:100%"></div>
        </div>
        <div style="margin-top:10px"><label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:4px">Barrio / Ciudad *</label>
          <input type="text" id="nv-mf-barrio" placeholder="Desde donde nos escribe..."></div>
        <div style="margin-top:10px"><label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:4px">Grupo / Comunidad <span style="font-weight:400;color:#9CA3AF">(opcional)</span></label>
          <select id="nv-mf-grupo" style="width:100%">
            <option value="">— Sin asignar —</option>
          </select>
        </div>
        <div style="margin-top:10px"><label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:4px">¿Cómo nos conociste? *</label>
          <select id="nv-mf-como">
            <option value="">— Seleccioná —</option>
            <option>Por un amigo o familiar</option>
            <option>Instagram (@iglesiavng)</option>
            <option>YouTube</option>
            <option>Pasé por la iglesia</option>
            <option>Google / Internet</option>
            <option>Volante o folleto</option>
            <option>Contacto en las calles</option>
            <option>Otro</option>
          </select>
        </div>
        <div style="margin-top:10px">
          <label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:4px">Seguimiento asignado</label>
          <div style="display:flex;gap:8px;align-items:center">
            <div id="nv-mf-seguimiento-label" style="flex:1;font-size:13px;color:#6B7280;padding:8px 12px;border:1.5px solid #E5E7EB;border-radius:8px;cursor:pointer;background:#F9FAFB"
              onclick="nvOpenSeguimientoSelector()">Pendiente de asignar</div>
            <button class="btn btn-sm" onclick="nvOpenSeguimientoSelector()">Asignar →</button>
          </div>
          <input type="hidden" id="nv-mf-seguimiento-id">
        </div>
        <div style="margin-top:10px"><label style="font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:4px">Motivo <span style="font-weight:400;color:#9CA3AF">(opcional)</span></label>
          <textarea id="nv-mf-motivo" placeholder="Motivo de contacto, situación especial..." style="width:100%;padding:8px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:13px;min-height:70px;resize:vertical"></textarea>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
          <button class="btn" onclick="nvCloseInlineForm()">Cancelar</button>
          <button class="btn btn-primary" onclick="nvSaveInlineForm()">Guardar contacto</button>
        </div>
      </div>
    </div>
<div id="cfg-ng-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;padding:1rem"></div>
</body>
</html>
